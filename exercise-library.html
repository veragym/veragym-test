<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 트레이너">
<meta name="theme-color" content="#3b82f6">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VERA GYM | 운동 라이브러리</title>
<style>
/* ── Reset & Base ─────────────────────────────────────── */
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;
  background:#080e1a; color:#fff;
  min-height:100dvh;
  overscroll-behavior:none;
}

/* ── Header ──────────────────────────────────────────── */
.header {
  background:#0d1525; border-bottom:1px solid #1e3a5f44;
  padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header-title { font-size:16px; font-weight:800; }
.header-title span { color:#3b82f6; }
.header-sub { font-size:11px; color:#4a6580; margin-top:2px; }
.btn-logout { background:none; border:1px solid #1e3a5f44; border-radius:8px; color:#4a6580; font-size:12px; padding:6px 12px; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.btn-logout:hover { border-color:#3b82f644; color:#3b82f6; }

/* ── Top Tab Navigation ──────────────────────────────── */
.tabs { display:flex; background:#0d1525; border-bottom:1px solid #1e3a5f44; position:sticky; top:57px; z-index:99; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab-btn { flex:none; min-width:70px; padding:13px 16px; font-size:12px; font-weight:600; color:#4a6580; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:inherit; }
.tab-btn.active { color:#3b82f6; border-bottom-color:#3b82f6; }

/* ── 검색 + 필터 영역 ─────────────────────────────────── */
.search-area {
  padding:14px 14px 0;
  position:sticky; top:100px; z-index:90;
  background:#080e1a;
}
.search-wrap { position:relative; margin-bottom:12px; }
.ex-search {
  width:100%; background:#0d1525; border:1.5px solid #1e3a5f55;
  border-radius:10px; padding:11px 40px 11px 14px;
  font-size:14px; color:#fff; outline:none; font-family:inherit;
  transition:border-color 0.2s; display:block;
}
.ex-search:focus { border-color:#3b82f666; }
.ex-search::placeholder { color:#3a5878; }
.btn-x {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:#3a5878; font-size:16px;
  cursor:pointer; padding:0; line-height:1; display:none;
}

/* 필터 라벨 + 칩 */
.filter-row { margin-bottom:10px; }
.filter-label { font-size:10px; color:#3a5878; letter-spacing:1.2px; margin-bottom:6px; font-weight:600; }
.chips { display:flex; flex-wrap:wrap; gap:5px; }
.chip {
  background:#0d1525; border:1.5px solid #1e3a5f55;
  border-radius:20px; padding:5px 13px;
  font-size:12px; color:#3a5878; cursor:pointer;
  transition:all 0.15s; white-space:nowrap; font-family:inherit;
}
.chip:hover { border-color:#3b82f655; color:#60a5fa; }
.chip.active { background:#3b82f622; border-color:#3b82f688; color:#60a5fa; font-weight:700; }

/* ── 뷰 탭 (전체 / 내 수업) ───────────────────────────── */
.view-tabs {
  display:flex; border-bottom:1px solid #1e3a5f44;
  padding:0 14px;
}
.view-tab {
  flex:1; min-width:0; padding:11px 4px; text-align:center;
  font-size:12px; font-weight:600; color:#3a5878;
  cursor:pointer; border-bottom:2px solid transparent;
  transition:all 0.15s; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.view-tab.active { color:#3b82f6; border-bottom-color:#3b82f6; }

/* ── 통계 바 ─────────────────────────────────────────── */
.stat-bar { padding:10px 14px; font-size:12px; color:#3a5878; }
.stat-bar span { color:#60a5fa; font-weight:700; }

/* ── 운동 카드 (admin.html 레이아웃 기반) ────────────── */
.ex-list { padding:0 14px; }
.ex-card {
  background:#0d1525; border:1px solid #1e3a5f44;
  border-radius:10px; padding:12px 14px; margin-bottom:7px;
}
.ex-card-row { display:flex; align-items:center; gap:12px; }
.ex-thumb {
  width:52px; height:52px; border-radius:8px;
  background:#141f35; display:flex; align-items:center;
  justify-content:center; font-size:22px; flex-shrink:0; overflow:hidden;
}
.ex-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.ex-info { flex:1; min-width:0; }
.ex-name { font-size:14px; font-weight:600; }
.ex-en { font-size:11px; color:#3a5878; margin-top:2px; }
.ex-tags { margin-top:5px; display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.ex-tag-tool {
  background:#3b82f618; border:1px solid #3b82f633;
  border-radius:6px; padding:2px 8px; font-size:10px; color:#60a5fa99;
}
.ex-tag-part {
  background:transparent; border:1px solid #1e3a5f55;
  border-radius:6px; padding:2px 8px; font-size:10px; color:#3a5878;
}
.ex-tag-cnt { font-size:10px; color:#1e3a5f; }
/* weight_mode 배지 */
.ex-tag-wm { border-radius:6px; padding:2px 8px; font-size:10px; font-weight:600; }
.ex-tag-wm-single { background:#1a3a2022; border:1px solid #4ade8044; color:#4ade80; }
.ex-tag-wm-total  { background:#1e3a5f22; border:1px solid #3b82f644; color:#60a5fa; }

/* 버튼 영역 */
.ex-btns { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }

/* 즐겨찾기 ★ */
.btn-fav {
  background:none; border:none; font-size:20px; cursor:pointer;
  color:#1e3a5f; padding:2px; line-height:1;
  transition:color 0.15s, transform 0.15s;
}
.btn-fav.active { color:#f5c518; }
.btn-fav:active { transform:scale(1.3); }

/* 내 운동으로 추가 */
.btn-add {
  background:#3b82f622; border:1px solid #3b82f644;
  border-radius:8px; padding:6px 10px;
  font-size:11px; font-weight:700; color:#60a5fa;
  cursor:pointer; white-space:nowrap; font-family:inherit;
  transition:all 0.15s;
}
.btn-add:hover { background:#3b82f633; border-color:#3b82f688; }
.btn-add.added {
  background:#2a0e0e; border-color:#7f1d1d; color:#f87171; cursor:pointer;
}
.btn-add.added:hover { background:#3a1010; border-color:#f87171; color:#fca5a5; }

/* 더 보기 */
.btn-more {
  width:100%; background:#0d1525; border:1px solid #1e3a5f44;
  border-radius:10px; padding:12px; color:#3a5878; font-size:13px;
  cursor:pointer; margin:4px 0; font-family:inherit; transition:all 0.15s;
}
.btn-more:hover { border-color:#3b82f644; color:#60a5fa; }

/* 로딩 / 빈 상태 */
.empty { text-align:center; padding:60px 20px; color:#3a5878; font-size:14px; }
.loading { text-align:center; padding:40px; color:#3a5878; font-size:14px; }



/* ── 운동 상세 모달 ─────────────────────────────────── */
.modal-bg {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72);
  z-index:200; align-items:flex-end;
}
.modal-bg.open { display:flex; }
.modal {
  background:#0d1525; border-radius:20px 20px 0 0;
  padding:24px 20px 40px; width:100%; max-height:90dvh;
  overflow-y:auto; animation:slideUp 0.28s ease;
  border-top:1px solid #1e3a5f66;
}
@keyframes slideUp {
  from { transform:translateY(100%); }
  to   { transform:translateY(0); }
}
.modal-img {
  width:100%; max-height:260px; object-fit:cover;
  border-radius:12px; background:#141f35; margin-bottom:16px; display:block;
}
.modal-no-img {
  width:100%; height:160px; background:#141f35;
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:42px; margin-bottom:16px;
}
.modal-name { font-size:22px; font-weight:800; margin-bottom:4px; }
.modal-en   { font-size:13px; color:#4a6580; margin-bottom:14px; }
.modal-tags { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:16px; }
.modal-tag-tool {
  background:#3b82f622; border:1px solid #3b82f644;
  border-radius:8px; padding:4px 12px; font-size:12px; color:#60a5fa; font-weight:600;
}
.modal-tag-part {
  background:#1e3a5f22; border:1px solid #1e3a5f55;
  border-radius:8px; padding:4px 12px; font-size:12px; color:#4a6580;
}
.modal-tag-wm-single { background:#1a3a2033; border:1px solid #4ade8055; border-radius:8px; padding:4px 12px; font-size:12px; color:#4ade80; font-weight:600; }
.modal-tag-wm-total  { background:#1e3a5f33; border:1px solid #60a5fa44; border-radius:8px; padding:4px 12px; font-size:12px; color:#60a5fa; font-weight:600; }
.modal-section-title {
  font-size:11px; font-weight:700; color:#4a6580;
  letter-spacing:1px; margin-bottom:8px;
}
.modal-muscles { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.modal-muscle-chip {
  background:#3b82f611; border:1px solid #3b82f633;
  border-radius:16px; padding:5px 12px;
  font-size:12px; color:#60a5fa;
}
.modal-close {
  width:100%; background:#141f35; border:1px solid #1e3a5f44;
  border-radius:12px; padding:13px; color:#4a6580;
  font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;
  margin-top:8px; transition:all 0.15s;
}
.modal-close:hover { border-color:#3b82f644; color:#60a5fa; }

/* 토스트 */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#141f35; color:#60a5fa; border:1px solid #3b82f644;
  padding:10px 18px; border-radius:10px;
  font-size:13px; font-weight:600; opacity:0; transition:opacity 0.3s;
  z-index:999; white-space:nowrap; pointer-events:none;
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div>
    <div class="header-title">VERA<span>GYM트레이너</span></div>
    <div class="header-sub" id="trainerInfo">불러오는 중...</div>
  </div>
  <button class="btn-logout" onclick="doLogout()">로그아웃</button>
</div>

<!-- 상단 탭 네비게이션 -->
<div class="tabs" id="topTabs">
  <button class="tab-btn" onclick="location.href='trainer-dash.html'">내 회원</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=logs'">수업일지</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=schedule'">일정</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=revenue'">매출관리</button>
  <button class="tab-btn active" onclick="location.href='exercise-library.html'">운동DB</button>
  <button class="tab-btn" onclick="location.href='trainer-dash.html?tab=requests'">요청사항</button>
  <button class="tab-btn" onclick="location.href='image-card.html'">이미지생성</button>
</div>

<!-- 수업작성에서 온 경우: 돌아가기 바 (JS로 표시) -->
<div id="returnBar" style="display:none; background:#1a3a5c; padding:10px 16px; border-bottom:1px solid #3b82f655; align-items:center; gap:10px; position:sticky; top:100px; z-index:89;">
  <button onclick="returnToSession()" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;">← 수업으로 돌아가기</button>
  <span style="font-size:12px;color:#60a5fa;">라이브러리에 운동을 추가한 후 돌아가세요</span>
</div>

<!-- 검색 + 필터 -->
<div class="search-area">
  <div class="search-wrap">
    <input type="text" class="ex-search" id="searchInput"
           placeholder="운동명 검색 (한/영)" oninput="onSearch()" autocomplete="off">
    <button class="btn-x" id="btnX" onclick="clearSearch()">✕</button>
  </div>

  <!-- 도구 필터 -->
  <div class="filter-row">
    <div class="filter-label">도구</div>
    <div class="chips" id="toolChips"></div>
  </div>

  <!-- 부위 필터 -->
  <div class="filter-row" style="margin-bottom:12px">
    <div class="filter-label">부위</div>
    <div class="chips" id="partChips"></div>
  </div>
</div>

<!-- 뷰 탭 -->
<div class="view-tabs">
  <div class="view-tab active" id="tabAll"     onclick="switchView('all')">전체 운동</div>
  <div class="view-tab"        id="tabMine"    onclick="switchView('mine')">내 운동 <span id="myCount" style="font-size:11px;opacity:0.75;">0</span></div>
  <div class="view-tab"        id="tabRoutine" onclick="switchView('routine')">루틴 폴더</div>
</div>

<div class="stat-bar" id="statBar"></div>

<!-- 운동 목록 -->
<div class="ex-list" id="exList">
  <div class="loading">운동 목록 불러오는 중...</div>
</div>

<!-- 루틴 목록 -->
<div id="routineSection" style="display:none; padding:12px;">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <button onclick="openNewRoutineModal()"
      style="padding:9px 16px;background:#3b82f6;border:none;border-radius:8px;
             color:#fff;font-size:13px;font-weight:600;cursor:pointer;">+ 새 루틴</button>
  </div>
  <div id="routineList"></div>
</div>

<!-- 운동 상세 모달 -->
<div class="modal-bg" id="exModal" onclick="closeExModal(event)">
  <div class="modal" id="exModalContent">
    <div id="exModalBody"></div>
    <button class="modal-close" onclick="closeExModal()">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="routine-utils.js"></script>
<script>
init_db();

// ─── 상태 ───
let trainer     = null;
let allExs      = [];
let myLibIds    = new Set();
let favIds      = new Set();
let useCountMap = {};
let curView     = 'all';
let filterTool  = '';
let filterPart  = '';
let showCount   = 50;
let searchTm    = null;
let _memberMode = false; // 회원 토큰으로 접근 시 true (read-only)

const TOOLS = ['전체','핀 머신','플레이트 머신','스미스머신','바벨','덤벨','케이블','케틀벨','소도구','밴드','체중','머신'];
const PARTS = ['전체','가슴','등','어깨','팔','코어','하체','전신'];

// ─── 초기화 ───
let _initRunning = false;
async function init() {
  if (_initRunning) return;          // 중복 호출 방지
  _initRunning = true;
  try {
    // 회원 토큰으로 접근했는지 확인
    const _p = new URLSearchParams(location.search);
    // 트레이너 세션이 있으면 회원 토큰 무시 (같은 브라우저에서 회원 앱 테스트 시 오작동 방지)
    const { data: { session: _trainerSession }, error: authErr } = await db.auth.getSession();
    if (authErr) console.warn('세션 확인 실패:', authErr.message);
    const memberToken = _trainerSession
      ? null  // 트레이너 로그인 상태 → 항상 트레이너 모드
      : (_p.get('token') || _p.get('t') || localStorage.getItem('vg_member_token'));
    if (memberToken) {
      _memberMode = true;
      // 회원 모드: sessionStorage 캐시 클리어 후 강제 로드
      sessionStorage.removeItem('vg_exdb_cache_v2');
      // 회원 모드: 그린 테마 CSS 주입 (실제 클래스명 기준)
      const memberStyle = document.createElement('style');
      memberStyle.textContent = `
        body { background:#080e08 !important; }
        .header { background:#0d1a0d !important; border-bottom-color:#1a3a1a44 !important; }
        .header-title span { color:#4ade80 !important; }
        .header-sub { color:#3a5840 !important; }
        .btn-logout { border-color:#1a3a1a44 !important; color:#3a5840 !important; }
        .btn-logout:hover { border-color:#4ade8044 !important; color:#4ade80 !important; }
        .tabs { background:#0d1a0d !important; border-bottom-color:#1a3a1a44 !important; }
        .tab-btn { flex:1 !important; min-width:0 !important; text-align:center !important; color:#3a5840 !important; border-bottom-color:transparent !important; padding:13px 10px !important; }
        .tab-btn.active { color:#4ade80 !important; border-bottom-color:#4ade80 !important; }
        .search-area { background:#080e08 !important; }
        .ex-search { background:#0d1a0d !important; border-color:#1a3a1a55 !important; }
        .ex-search:focus { border-color:#4ade80 !important; }
        .ex-search::placeholder { color:#2a4a2a !important; }
        .filter-label { color:#2a4a2a !important; }
        .chip { background:#0d1a0d !important; border-color:#1a3a1a55 !important; color:#3a5840 !important; }
        .chip:hover { border-color:#4ade8033 !important; color:#86efac !important; }
        .chip.active { background:#4ade8022 !important; border-color:#4ade8066 !important; color:#4ade80 !important; }
        .view-tabs { display:none !important; }
        .stat-bar { color:#3a5840 !important; }
        .stat-bar span { color:#4ade80 !important; }
        .ex-card { background:#0d1a0d !important; border-color:#1a3a1a44 !important; }
        .ex-card:hover, .ex-card:active { border-color:#4ade8044 !important; }
        .ex-thumb { background:#111f11 !important; }
        .ex-en { color:#3a5840 !important; }
        .ex-tag-tool { background:#4ade8011 !important; border-color:#4ade8033 !important; color:#86efac !important; }
        .ex-tag-part { border-color:#1a3a1a55 !important; color:#3a5840 !important; }
        .ex-tag-cnt { color:#1a3a1a !important; }
        .btn-more { background:#0d1a0d !important; border-color:#1a3a1a44 !important; color:#4ade80 !important; }
        .empty, .loading { color:#2a4a2a !important; }
      `;
      document.head.appendChild(memberStyle);
      // 회원 모드 UI: 헤더 텍스트 교체, 로그아웃 버튼 숨김
      document.querySelector('.header-title').innerHTML = 'VERA<span>GYM</span>';
      document.getElementById('trainerInfo').textContent = '운동 라이브러리';
      document.querySelector('.btn-logout').style.display = 'none';
      // 탭을 회원용으로 교체, 내 운동 탭 숨김
      document.getElementById('topTabs').innerHTML = `
        <button class="tab-btn" onclick="location.href='member-view.html'">수업일지</button>
        <button class="tab-btn" onclick="location.href='member-view.html#schedule'">일정</button>
        <button class="tab-btn active">운동DB</button>
        <button class="tab-btn" onclick="location.href='member-view.html#anatomy'">해부도</button>
      `;
      document.getElementById('tabMine').style.display = 'none';
      await loadAllExercises();
      buildFilters();
      renderList();
      return;
    }
    // 트레이너 모드
    trainer = await requireTrainer();
    if (!trainer) return;
    const el = document.getElementById('trainerInfo');
    if (el) el.textContent = `${trainer.name} · ${trainer.gym_location}`;
    await Promise.all([loadAllExercises(), loadMyLib()]);
    buildFilters();
    // ?view= 파라미터로 특정 탭 직접 진입
    const _vp = new URLSearchParams(location.search).get('view');
    if (_vp === 'mine' || _vp === 'routine') { switchView(_vp); }
    else { renderList(); }
  } finally {
    _initRunning = false;
  }
}

// ─── 전체 운동 DB 로드 (sessionStorage 5분 캐싱) ───
const _EX_CACHE_KEY = 'vg_exdb_cache_v5'; // v5: 페이지네이션 수정
const _EX_CACHE_TTL = 5 * 60 * 1000; // 5분

async function loadAllExercises() {
  // 캐시 확인 (비어있는 캐시는 무시)
  try {
    const raw = sessionStorage.getItem(_EX_CACHE_KEY);
    if (raw) {
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts < _EX_CACHE_TTL && Array.isArray(data) && data.length > 0) {
        allExs = data;
        return;
      }
    }
  } catch (_) {}

  // 캐시 없거나 만료 → Supabase 에서 로드 (페이지네이션)
  const PAGE = 500;
  let all = [], page = 0, loadError = null;
  while (true) {
    const { data, error } = await db
      .from('exercise_refs')
      .select('id,name_ko,name_en,part_unified,tool_unified,image_url,muscles_detail,weight_mode')
      .eq('is_active', true)
      .order('name_ko', { ascending: true })
      .range(page * PAGE, (page + 1) * PAGE - 1);
    if (error) { console.error('운동 DB 오류:', error.message); loadError = error.message; break; }
    if (!data || data.length === 0) break;
    all.push(...data);
    if (data.length < PAGE) break;
    page++;
  }

  if (loadError && all.length === 0) {
    // 로드 실패 시 캐시에 저장하지 않고 오류 표시
    showToast('운동 목록 로드 실패: ' + loadError);
    return;
  }

  allExs = all;

  // 데이터가 있을 때만 sessionStorage 에 저장
  if (all.length > 0) {
    try {
      sessionStorage.setItem(_EX_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: all }));
    } catch (_) {} // 저장 실패 시 무시 (용량 초과 등)
  }
}

// ─── 내 운동 목록 로드 ───
async function loadMyLib() {
  const { data, error } = await db
    .from('trainer_exercises')
    .select('exercise_ref_id,is_favorite,use_count')
    .eq('trainer_id', trainer.id);
  if (error) console.error('내 목록 오류:', error.message);
  myLibIds    = new Set((data||[]).map(r => r.exercise_ref_id));
  favIds      = new Set((data||[]).filter(r => r.is_favorite).map(r => r.exercise_ref_id));
  useCountMap = Object.fromEntries((data||[]).map(r => [r.exercise_ref_id, r.use_count||0]));
  document.getElementById('myCount').textContent = myLibIds.size;
}

// ─── 필터 칩 빌드 ───
function buildFilters() {
  const makeChips = (elId, arr, curSel, fn) => {
    document.getElementById(elId).innerHTML = arr.map(v => {
      const active = (curSel === v) || (!curSel && v === '전체');
      return `<button class="chip${active?' active':''}" onclick="${fn}('${v}')">${v}</button>`;
    }).join('');
  };
  makeChips('toolChips', TOOLS, filterTool || '전체', 'setTool');
  makeChips('partChips', PARTS, filterPart || '전체', 'setPart');
}

function setTool(v) { filterTool = (v==='전체') ? '' : v; buildFilters(); showCount=50; renderList(); }
function setPart(v) { filterPart = (v==='전체') ? '' : v; buildFilters(); showCount=50; renderList(); }

// ─── 검색 ───
function onSearch() {
  const val = document.getElementById('searchInput').value;
  document.getElementById('btnX').style.display = val ? '' : 'none';
  clearTimeout(searchTm);
  searchTm = setTimeout(() => { showCount=50; renderList(); }, 150);
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('btnX').style.display = 'none';
  showCount=50; renderList();
}

// ─── 뷰 전환 ───
function switchView(v) {
  curView = v;
  document.getElementById('tabAll').classList.toggle('active',     v==='all');
  document.getElementById('tabMine').classList.toggle('active',    v==='mine');
  document.getElementById('tabRoutine').classList.toggle('active', v==='routine');

  const isRoutine = v === 'routine';
  document.getElementById('exList').style.display       = isRoutine ? 'none' : '';
  document.getElementById('statBar').style.display      = isRoutine ? 'none' : '';
  document.getElementById('routineSection').style.display = isRoutine ? '' : 'none';

  if (isRoutine) { renderRoutines(); return; }
  showCount = 50; renderList();
}

// ─── 루틴 렌더 ───
async function renderRoutines() {
  const wrap = document.getElementById('routineList');
  wrap.innerHTML = '<div class="loading">불러오는 중...</div>';
  if (!trainer) { wrap.innerHTML = '<div class="loading">로그인이 필요합니다</div>'; return; }

  const routines = await routineList(trainer.id);
  if (routines.length === 0) {
    wrap.innerHTML = `
      <div style="padding:32px;text-align:center;color:#8aa8c4;font-size:14px;line-height:1.8;">
        저장된 루틴이 없습니다.<br>
        수업일지에서 운동 구성 후<br>
        <b style="color:#e0eaf4;">루틴으로 저장</b> 버튼을 눌러보세요.
      </div>`;
    return;
  }

  const rows = await Promise.all(routines.map(async r => {
    const exs = await routineExercises(r.id);
    return { ...r, exs };
  }));

  wrap.innerHTML = rows.map(r => `
    <div style="background:#1a2636;border-radius:10px;padding:14px 16px;
                margin-bottom:10px;border:1px solid #2a3a4a;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:14px;font-weight:700;color:#e0eaf4;">${r.name}</span>
        <button onclick="deleteRoutineConfirm('${r.id}','${r.name.replace(/'/g,'&#39;')}')"
          style="background:none;border:none;color:#ef4444;font-size:13px;cursor:pointer;padding:2px 6px;">
          삭제
        </button>
      </div>
      <div style="font-size:12px;color:#8aa8c4;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">
        ${r.exs.length === 0
          ? '<span style="color:#4a6580;">운동 없음</span>'
          : r.exs.map(e => `
            <span style="background:#0d1b2a;padding:3px 8px;border-radius:12px;display:inline-flex;align-items:center;gap:4px;">
              ${e.name_ko}
              <span onclick="removeRoutineExercise('${e.id}','${e.name_ko.replace(/'/g,'&#39;').replace(/"/g,'&quot;')}')"
                style="color:#ef4444;cursor:pointer;font-size:11px;line-height:1;">✕</span>
            </span>`).join('')
        }

        <span style="font-size:11px;color:#4a6580;">${r.exs.length}개 운동 · ${r.created_at.slice(0,10)}</span>
        <button onclick="openRoutineAddExerciseModal('${r.id}','${r.name.replace(/'/g,'&#39;')}',${r.exs.length})"
          style="background:#1e3a5a;border:1px solid #2a5a7a55;border-radius:8px;
                 color:#60a5fa;font-size:12px;font-weight:600;padding:5px 12px;cursor:pointer;">
          운동 추가
        </button>
      </div>
    </div>
  `).join('');
}

async function deleteRoutineConfirm(routineId, name) {
  if (!confirm(`"${name}" 루틴을 삭제할까요?`)) return;
  const ok = await routineDelete(routineId);
  showToast(ok ? '루틴 삭제됨' : '삭제 실패');
  if (ok) renderRoutines();
}

async function removeRoutineExercise(rowId, exerciseName) {
  if (!confirm(`"${exerciseName}" 운동을 루틴에서 제거할까요?`)) return;
  const ok = await routineExerciseRemove(rowId);
  showToast(ok ? '운동 제거됨' : '제거 실패');
  if (ok) renderRoutines();
}

    <div style="background:#0d1525;width:100%;flex:1;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top);">

    );

          </div>
          <span id="routineAddIcon_${ex.id}" style="font-size:18px;color:#3b82f6;flex-shrink:0;">＋</span>
        </div>`;
    });

    if (!total) {
      wrap.innerHTML = '<div style="text-align:center;color:#4a6580;padding:24px;font-size:13px;">운동이 없어요</div>';
      return;
    }

    let html = rows.join('');
    if (total > window._raeShowCount) {
      const remain = total - window._raeShowCount;
      html += `<div style="text-align:center;padding:16px 0;">
        <button onclick="window._raeShowCount+=50;renderRoutineAddList()"
          style="background:#1a2636;border:1px solid #1e3a5f55;border-radius:8px;color:#a0b8d0;
                 font-size:13px;padding:9px 24px;cursor:pointer;font-family:inherit;">
          더 보기 (${remain}개 남음)
        </button>
      </div>`;
    }
    wrap.innerHTML = html;
  };

  renderRoutineAddList();
}

window.addExToRoutine = async function(routineId, key) {
  const ex = window._routineAddExMap?.[key];
  if (!ex) return;
  const row = document.getElementById('routineAddRow_' + ex.id);
  const icon = document.getElementById('routineAddIcon_' + ex.id);
  if (row) { row.style.opacity = '0.5'; row.style.pointerEvents = 'none'; }
  const ok = await routineExerciseAppend(routineId, trainer.id, {
    refId:       ex.id,
    name_ko:     ex.name_ko || ex.name_en,
    part:        ex.part_unified || '',
    tool:        ex.tool_unified || '',
    weight_mode: ex.weight_mode || defaultWeightMode(ex.tool_unified || ''),
  }, window._routineAddExCount ?? 0);
  if (ok) {
    window._routineAddExCount = (window._routineAddExCount ?? 0) + 1;
    showToast(`"${ex.name_ko || ex.name_en}" 추가됨`);
    if (icon) { icon.textContent = '✓'; icon.style.color = '#22c55e'; }
    if (row)  { row.style.opacity = '1'; row.style.background = '#0a2010'; }
  } else {
    if (row) { row.style.opacity = '1'; row.style.pointerEvents = ''; }
    showToast('추가 실패');
  }
};

// ─── 목록 렌더 ───
function renderList() {
  const wrap = document.getElementById('exList');
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();

  let list = allExs;
  if (curView === 'mine') list = list.filter(e => myLibIds.has(e.id));
  if (filterTool) list = list.filter(e => e.tool_unified === filterTool);
  if (filterPart) list = list.filter(e => e.part_unified === filterPart);
  if (q) list = list.filter(e =>
    (e.name_ko||'').toLowerCase().includes(q) ||
    (e.name_en||'').toLowerCase().includes(q)
  );

  // 정렬: 즐겨찾기 → use_count → 내 목록 → 나머지
  list = [...list].sort((a, b) => {
    const aM   = myLibIds.has(a.id) ? 0 : 1;
    const bM   = myLibIds.has(b.id) ? 0 : 1;
    const aFav = favIds.has(a.id)   ? 0 : 1;
    const bFav = favIds.has(b.id)   ? 0 : 1;
    const aC   = useCountMap[a.id]  || 0;
    const bC   = useCountMap[b.id]  || 0;
    if (aM   !== bM)   return aM   - bM;
    if (aFav !== bFav) return aFav - bFav;
    if (bC   !== aC)   return bC   - aC;
    return 0;
  });

  const total = allExs.length;
  document.getElementById('statBar').innerHTML =
    `<span>${list.length}</span>${list.length===total ? '개 운동' : `개 / 전체 ${total}개`}`;

  if (!list.length) {
    wrap.innerHTML = `<div class="empty">해당하는 운동이 없어요</div>`;
    return;
  }

  const items = list.slice(0, showCount);
  wrap.innerHTML = items.map(ex => {
    const isMine = myLibIds.has(ex.id);
    const isFav  = favIds.has(ex.id);
    const cnt    = useCountMap[ex.id] || 0;
    const thumb  = ex.image_url
      ? `<div class="ex-thumb"><img src="${ex.image_url}" loading="lazy" onerror="this.parentElement.textContent=''"></div>`
      : `<div class="ex-thumb"></div>`;
    return `
      <div class="ex-card" onclick="openExDetail('${ex.id}')" style="cursor:pointer">
        <div class="ex-card-row">
          ${thumb}
          <div class="ex-info">
            <div class="ex-name">${ex.name_ko || ex.name_en}</div>
            ${(ex.name_en && ex.name_en !== ex.name_ko) ? `<div class="ex-en">${ex.name_en}</div>` : ''}
            <div class="ex-tags">
              ${ex.tool_unified ? `<span class="ex-tag-tool">${ex.tool_unified}</span>` : ''}
              ${ex.part_unified ? `<span class="ex-tag-part">${ex.part_unified}</span>` : ''}
              ${cnt > 0 ? `<span class="ex-tag-cnt">${cnt}회 사용</span>` : ''}
              <span class="ex-tag-wm ${ex.weight_mode === 'single' ? 'ex-tag-wm-single' : 'ex-tag-wm-total'}">${ex.weight_mode === 'single' ? '한쪽' : '양손'}</span>
            </div>
          </div>
          <div class="ex-btns">
            ${_memberMode ? '' : `
            ${curView === 'mine' ? `
            <button class="btn-fav ${isFav?'active':''}"
                    onclick="event.stopPropagation();toggleFavorite('${ex.id}',${isFav})">${isFav?'★':'☆'}</button>` : ''}
            <button class="btn-add ${isMine?'added':''}"
                    onclick="event.stopPropagation();toggleUse('${ex.id}',${isMine})">
              ${isMine ? '추가됨 / 해제' : '＋ 추가'}
            </button>`}
          </div>
        </div>
      </div>`;
  }).join('') +
  (list.length > showCount
    ? `<button class="btn-more" onclick="loadMore()">더 보기 (${list.length-showCount}개 남음)</button>`
    : '');
}

function loadMore() { showCount += 50; renderList(); }

// ─── 운동 상세 모달 ───
function openExDetail(id) {
  // id는 HTML onclick에서 문자열로 전달되므로 String() 변환으로 타입 불일치 방지
  const ex = allExs.find(e => String(e.id) === String(id));
  if (!ex) return;

  const imgHtml = ex.image_url
    ? `<img class="modal-img" src="${ex.image_url}" onerror="this.style.display='none'">`
    : `<div class="modal-no-img">🏋️</div>`;

  const muscles = (ex.muscles_detail || '').split('.').map(s => s.trim()).filter(Boolean);
  const muscleHtml = muscles.length
    ? `<div class="modal-section-title">주요 근육</div>
       <div class="modal-muscles">${muscles.map(m => `<span class="modal-muscle-chip">${m}</span>`).join('')}</div>`
    : '';

  document.getElementById('exModalBody').innerHTML = `
    ${imgHtml}
    <div class="modal-name">${ex.name_ko || ex.name_en}</div>
    ${(ex.name_en && ex.name_en !== ex.name_ko) ? `<div class="modal-en">${ex.name_en}</div>` : ''}
    <div class="modal-tags">
      ${ex.tool_unified ? `<span class="modal-tag-tool">${ex.tool_unified}</span>` : ''}
      ${ex.part_unified ? `<span class="modal-tag-part">${ex.part_unified}</span>` : ''}
      <span class="${ex.weight_mode === 'single' ? 'modal-tag-wm-single' : 'modal-tag-wm-total'}">${ex.weight_mode === 'single' ? '한쪽 무게 입력' : '양손 무게 입력'}</span>
    </div>
    ${muscleHtml}
  `;
  document.getElementById('exModal').classList.add('open');
}

function closeExModal(e) {
  if (e && e.target !== document.getElementById('exModal')) return;
  document.getElementById('exModal').classList.remove('open');
}

// ─── 내 운동으로 추가 / 제거 ───
async function toggleUse(refId, isMine) {
  if (isMine) {
    if (!confirm('운동 라이브러리에서 제거할까요?')) return;
    const { error } = await db.from('trainer_exercises')
      .delete().eq('trainer_id', trainer.id).eq('exercise_ref_id', refId);
    if (error) { showToast('오류: ' + error.message); return; }
    myLibIds.delete(refId); favIds.delete(refId);
    showToast('목록에서 제거됨');
  } else {
    const { error } = await db.from('trainer_exercises')
      .insert({ trainer_id: trainer.id, exercise_ref_id: refId });
    if (error) { showToast('오류: ' + error.message); return; }
    myLibIds.add(refId);
    showToast('라이브러리에 추가됨');
  }
  document.getElementById('myCount').textContent = myLibIds.size;
  renderList();
}

// ─── 즐겨찾기 토글 ───
async function toggleFavorite(refId, isFav) {
  // 내 목록에 없으면 자동 추가 + 즐겨찾기
  if (!myLibIds.has(refId)) {
    const { error } = await db.from('trainer_exercises')
      .insert({ trainer_id: trainer.id, exercise_ref_id: refId, is_favorite: true });
    if (error) { showToast('오류: ' + error.message); return; }
    myLibIds.add(refId); favIds.add(refId);
    document.getElementById('myCount').textContent = myLibIds.size;
    showToast('즐겨찾기 & 라이브러리에 추가됨');
    renderList(); return;
  }
  const newVal = !isFav;
  const { error } = await db.from('trainer_exercises')
    .update({ is_favorite: newVal })
    .eq('trainer_id', trainer.id).eq('exercise_ref_id', refId);
  if (error) { showToast('오류: ' + error.message); return; }
  if (newVal) { favIds.add(refId);    showToast('즐겨찾기 추가됨'); }
  else        { favIds.delete(refId); showToast('즐겨찾기 해제됨'); }
  renderList();
}


// ─── 토스트 ───
let _toastTm = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(_toastTm);
  _toastTm = setTimeout(() => t.style.opacity = '0', 2200);
}

// ─── 수업 작성에서 온 경우 처리 ───
const _returnTo = new URLSearchParams(location.search).get('returnTo');
if (_returnTo) {
  const bar = document.getElementById('returnBar');
  bar.style.display = 'flex';
  // 검색영역 top 을 returnBar 높이(~45px)만큼 더 내림
  document.querySelector('.search-area').style.top = '145px';
}
function returnToSession() {
  if (_returnTo) location.href = decodeURIComponent(_returnTo);
}

init();

// ─── 로그아웃 ───────────────────────────────────────────────
async function doLogout() {
  await db.auth.signOut();
  localStorage.removeItem('vg_trainer');
  localStorage.removeItem('vg_exdb_cache_v2');
  sessionStorage.removeItem('vg_session_draft');
  location.replace('trainer-login.html');
}

// ─── bfcache 복원 시 재초기화 ───────────────────────────────
// bfcache가 _initRunning=true 상태를 그대로 얼려서 저장하면,
// 복원 후 init() 호출해도 즉시 return되는 deadlock이 발생한다.
// pageshow 에서 플래그를 강제 리셋 후 항상 재초기화.
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    _initRunning = false;   // deadlock 방지: 고착된 플래그 리셋
    init();
  }
});
</script>
