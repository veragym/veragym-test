<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 트레이너">
<meta name="theme-color" content="#3b82f6">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>VERA GYM | 일정</title>
<style>
/* === Reset & Base === */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;background:#080e1a;color:#fff;min-height:100dvh;padding-bottom:0;overscroll-behavior:none}

/* === Header === */
.header{background:#0d1525;border-bottom:1px solid #1e3a5f44;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:800}.header-title span{color:#3b82f6}
.header-sub{font-size:11px;color:#4a6580;margin-top:1px}
.btn-logout{background:none;border:1px solid #1e3a5f44;border-radius:8px;color:#4a6580;font-size:12px;padding:6px 12px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-logout:hover{border-color:#3b82f644;color:#3b82f6}

/* === Date Nav === */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:#0d1525;border-bottom:1px solid #1e3a5f22;position:sticky;top:57px;z-index:99}
.date-range{font-size:13px;font-weight:700;color:#60a5fa;letter-spacing:.3px}
.nav-arrow{background:#141f35;border:1px solid #1e3a5f55;border-radius:8px;color:#60a5fa;font-size:13px;padding:6px 13px;cursor:pointer;font-weight:700;font-family:inherit;transition:all .15s}
.nav-arrow:active{opacity:.7}

/* === Calendar === */
.cal-scroll{overflow-y:auto;overflow-x:hidden;height:calc(100dvh - 57px - 43px - 56px)}
table.cal{width:100%;border-collapse:collapse;table-layout:fixed}

/* Column widths */
table.cal colgroup col.tc{width:44px}
table.cal colgroup col.dc{width:calc((100% - 44px)/4)}

/* Sticky header row */
table.cal thead th{background:#0a1220;padding:7px 2px;text-align:center;border-bottom:1.5px solid #1e3a5f55;position:sticky;top:0;z-index:10}
table.cal thead th.time-hdr{width:44px;border-right:1px solid #1e3a5f33}
.day-hdr-inner{font-size:11px;font-weight:600;color:#4a6580;line-height:1.4}
.day-hdr-inner.today{color:#3b82f6}
.day-hdr-inner .dname{font-size:10px;font-weight:500;margin-bottom:1px}
.day-hdr-inner .ddate{font-size:13px;font-weight:800}
.day-hdr-inner .off-dot{display:inline-block;width:5px;height:5px;background:#f87171;border-radius:50%;margin-left:3px;vertical-align:middle}

/* Time label cells */
td.tl{width:44px;font-size:10px;color:#253a52;text-align:right;padding:0 5px 0 0;vertical-align:top;padding-top:3px;height:44px;border-right:1px solid #1e3a5f22;white-space:nowrap}

/* Slot cells */
td.slot{height:44px;border:.5px solid transparent;border-bottom:.5px solid #1e3a5f18;vertical-align:top;transition:background .1s}
td.slot.s-empty{cursor:pointer}
td.slot.s-empty:active{background:#1e3a5f44}
td.slot.s-empty:hover{background:#1e3a5f22}
td.slot.s-off{background:#070b14;cursor:default}
td.slot.s-scheduled{background:rgba(59,130,246,.18);border-left:3px solid #3b82f6;cursor:pointer}
td.slot.s-completed{background:rgba(34,197,94,.13);border-left:3px solid #22c55e;cursor:pointer}
td.slot.s-noshow{background:rgba(245,158,11,.13);border-left:3px solid #f59e0b;cursor:pointer}
td.slot.today-bg{background:rgba(29,78,216,.06)}
td.slot.today-bg.s-empty:hover{background:rgba(29,78,216,.15)}

.slot-inner{padding:3px 4px;height:100%;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.slot-name{font-size:11px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.slot-lbl{font-size:9px;color:#4a6580;margin-top:1px;white-space:nowrap}



/* === Modal Base === */
.modal-bg{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#0d1525;border-radius:24px 24px 0 0;border-top:1px solid #1e3a5f44;width:100%;max-width:520px;padding:0 20px calc(28px + env(safe-area-inset-bottom));max-height:92dvh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:#1e3a5f;border-radius:99px;margin:14px auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px}

/* Form fields */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#4a6580;margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:#080e1a;border:1.5px solid #1e3a5f44;border-radius:10px;padding:11px 13px;font-size:14px;color:#fff;outline:none;font-family:inherit;transition:border-color .2s;resize:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#3b82f6}
.field select option{background:#0d1525}
.field-val{font-size:14px;font-weight:700;color:#60a5fa;padding:6px 0 8px}

/* Info rows */
.info-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;font-size:13px}
.info-lbl{color:#4a6580;flex-shrink:0;width:44px;padding-top:1px}
.info-val{color:#e2e8f0;font-weight:600;flex:1}
.info-memo{color:#64748b;font-weight:400}

/* Status badge */
.st-tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.st-scheduled{background:#3b82f622;border:1px solid #3b82f644;color:#60a5fa}
.st-completed{background:#22c55e22;border:1px solid #22c55e44;color:#4ade80}
.st-noshow{background:#f59e0b22;border:1px solid #f59e0b44;color:#fbbf24}
.st-cancelled{background:#33333322;border:1px solid #44444444;color:#888}

/* Buttons */
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;background:#141f35;border:1px solid #1e3a5f44;border-radius:12px;padding:13px;font-size:15px;color:#4a6580;cursor:pointer;font-weight:600;font-family:inherit}
.btn-primary{flex:2;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:12px;padding:13px;font-size:15px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-noshow{flex:1;background:#f59e0b22;border:1.5px solid #f59e0b44;border-radius:12px;padding:13px;font-size:14px;color:#f59e0b;cursor:pointer;font-weight:700;font-family:inherit;transition:all .15s}
.btn-noshow:hover{background:#f59e0b33}
.btn-complete{flex:2;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:12px;padding:13px;font-size:14px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit}
.btn-complete:disabled,.btn-noshow:disabled{opacity:.4;cursor:default}

/* Error box */
.err-box{display:none;background:#1a0d0d;border:1px solid #5a2020;border-radius:8px;padding:10px 13px;font-size:13px;color:#f87171;margin-bottom:10px}

/* Loading overlay */
.loading-ov{display:none;position:fixed;inset:0;background:#00000088;z-index:300;align-items:center;justify-content:center}
.loading-ov.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid #1e3a5f;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1a2840;color:#60a5fa;border:1px solid #3b82f633;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;white-space:nowrap}

/* ── Bottom Nav ── */
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">VERA<span>GYM</span></div>
    <div class="header-sub" id="trainerName">로딩 중...</div>
  </div>
  <button class="btn-logout" onclick="doLogout()">로그아웃</button>
</div>

<!-- Date Navigation -->
<div class="date-nav">
  <button class="nav-arrow" onclick="moveDays(-4)">&#8249; 이전</button>
  <span id="calRange" class="date-range"></span>
  <button class="nav-arrow" onclick="moveDays(4)">다음 &#8250;</button>
</div>

<!-- Calendar -->
<div class="cal-scroll" id="calScroll">
  <table class="cal">
    <colgroup>
      <col class="tc">
      <col class="dc"><col class="dc"><col class="dc"><col class="dc">
    </colgroup>
    <thead>
      <tr>
        <th class="time-hdr"></th>
        <th id="dh0"><div class="day-hdr-inner" id="dhi0"></div></th>
        <th id="dh1"><div class="day-hdr-inner" id="dhi1"></div></th>
        <th id="dh2"><div class="day-hdr-inner" id="dhi2"></div></th>
        <th id="dh3"><div class="day-hdr-inner" id="dhi3"></div></th>
      </tr>
    </thead>
    <tbody id="calBody"></tbody>
  </table>
</div>

<!-- Create Booking Modal -->
<div class="modal-bg" id="createModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">예약 등록</div>
    <div class="err-box" id="createErr"></div>
    <div class="field">
      <label>날짜 / 시간</label>
      <div class="field-val" id="createDateDisplay"></div>
    </div>
    <div class="field">
      <label>회원 선택</label>
      <select id="memberSel"><option value="">회원 선택</option></select>
    </div>
    <div class="field">
      <label>수업 시간</label>
      <select id="durationSel">
        <option value="30">30분</option>
        <option value="60" selected>60분</option>
        <option value="90">90분</option>
      </select>
    </div>
    <div class="field">
      <label>메모 (선택)</label>
      <textarea id="memoInput" rows="2" placeholder="특이사항, 운동 목표 등"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('createModal')">취소</button>
      <button class="btn-primary" id="btnSave" onclick="saveBooking()">예약 등록</button>
    </div>
  </div>
</div>

<!-- Action Modal (View / Complete / Noshow) -->
<div class="modal-bg" id="actionModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="actTitle">수업 상세</div>
    <div class="info-row"><span class="info-lbl">날짜</span><span class="info-val" id="actDate">-</span></div>
    <div class="info-row"><span class="info-lbl">시간</span><span class="info-val" id="actTime">-</span></div>
    <div class="info-row"><span class="info-lbl">상태</span><span id="actStatus">-</span></div>
    <div class="info-row"><span class="info-lbl">회차</span><span class="info-val" id="actSession">-</span></div>
    <div class="info-row"><span class="info-lbl">메모</span><span class="info-val info-memo" id="actMemo">-</span></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('actionModal')">닫기</button>
      <button class="btn-noshow"  id="btnNoshow"  onclick="markDone('noshow')">노쇼</button>
      <button class="btn-complete" id="btnComplete" onclick="markDone('completed')">완료 처리</button>
    </div>
  </div>
</div>

<div class="loading-ov" id="loadingOv"><div class="spinner"></div></div>
<div id="toast"></div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
// ── 상수 ──────────────────────────────────────────────────
const DAY_KO = ['일','월','화','수','목','금','토'];

// 06:00 ~ 23:00, 30분 슬롯 생성
const SLOTS = [];
for (let h = 6; h <= 23; h++) {
  SLOTS.push(p2(h) + ':00');
  if (h < 23) SLOTS.push(p2(h) + ':30');
}

// ── State ──────────────────────────────────────────────────
let trainer   = null;
let members   = [];   // [{id, name, activeContract}]
let schedData = [];   // 현재 4일 예약 데이터
let offDays   = new Set();   // 'YYYY-MM-DD'
let holidays  = new Set();   // 'YYYY-MM-DD'
let startDate = null; // 뷰 시작일 (자정)
let createSlot  = null; // {day: Date, time: 'HH:MM'}
let actionSched = null; // 액션 대상 스케줄

// ── 유틸 ──────────────────────────────────────────────────
function p2(n) { return String(n).padStart(2,'0'); }
function dayStart(d) { const r = new Date(d); r.setHours(0,0,0,0); return r; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function toLocalISO(d) { return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function utcToLocalDate(s) { return toLocalISO(new Date(s)); }
function utcToLocalTime(s) { const d = new Date(s); return `${p2(d.getHours())}:${p2(d.getMinutes())}`; }
function fmtShort(d)  { return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtFull(d) {
  return `${d.getMonth()+1}/${d.getDate()}(${DAY_KO[d.getDay()]}) ${p2(d.getHours())}:${p2(d.getMinutes())}`;
}
const ST_LABEL = {scheduled:'예약',completed:'완료',noshow:'노쇼',cancelled:'취소'};
const ST_CLS   = {scheduled:'st-scheduled',completed:'st-completed',noshow:'st-noshow',cancelled:'st-cancelled'};

function showLoad(v) { document.getElementById('loadingOv').classList.toggle('show',v); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
function showToast(msg, ms=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', ms);
}

// ── 초기화 ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  init_db();
  trainer = await requireTrainer();
  if (!trainer) return;
  document.getElementById('trainerName').textContent = trainer.name + ' 트레이너';

  startDate = dayStart(new Date());
  showLoad(true);
  try {
    await autoComplete();
    await refreshAll();
  } finally {
    showLoad(false);
  }
});

// 48시간 경과 scheduled → completed 자동 처리
async function autoComplete() {
  const cutoff = new Date(Date.now() - 48*3600*1000).toISOString();
  const { data } = await db.from('schedules')
    .select('id,contract_id,member_id')
    .eq('trainer_id', trainer.id)
    .eq('status', 'scheduled')
    .lt('scheduled_at', cutoff);
  if (data?.length) {
    await db.from('schedules')
      .update({ status:'completed', updated_at: new Date().toISOString() })
      .in('id', data.map(s=>s.id));
    // 계약 완료 여부 체크 (자동완료 시에도 계약 상태 갱신)
    for (const s of data) {
      if (s.contract_id && s.member_id) {
        await checkContractCompletion(s.contract_id, s.member_id);
      }
    }
  }
}

// ── 데이터 로드 ───────────────────────────────────────────
async function refreshAll() {
  const endDate  = addDays(startDate, 4);
  const fromDate = toLocalISO(startDate);
  const toDate   = toLocalISO(addDays(startDate, 3));

  const [schR, memR, offR, holR] = await Promise.all([
    db.from('schedules')
      .select('id,contract_id,member_id,scheduled_at,duration_min,status,memo,workout_log_id,members(name)')
      .eq('trainer_id', trainer.id)
      .gte('scheduled_at', startDate.toISOString())
      .lt('scheduled_at', endDate.toISOString())
      .neq('status', 'cancelled'),
    db.from('members')
      .select('id,name')
      .eq('trainer_id', trainer.id)
      .eq('is_active', true)
      .order('name'),
    db.from('trainer_off_days')
      .select('off_date').eq('trainer_id', trainer.id)
      .gte('off_date', fromDate).lte('off_date', toDate),
    db.from('public_holidays')
      .select('holiday_date')
      .gte('holiday_date', fromDate).lte('holiday_date', toDate)
  ]);

  schedData = schR.data || [];

  // 회원별 활성 계약 로드
  const memList = memR.data || [];
  const memIds  = memList.map(m=>m.id);
  let cMap = {};
  if (memIds.length) {
    const { data: cData } = await db.from('pt_contracts')
      .select('id,member_id,total_sessions')
      .in('member_id', memIds).eq('status','active');
    (cData||[]).forEach(c => cMap[c.member_id] = c);
  }
  members  = memList.map(m => ({ ...m, activeContract: cMap[m.id]||null }));
  offDays  = new Set((offR.data||[]).map(d=>d.off_date));
  holidays = new Set((holR.data||[]).map(d=>d.holiday_date));

  renderCal();
  // 오전 9시로 스크롤 (초기 1회)
  const sc = document.getElementById('calScroll');
  if (sc.scrollTop === 0) {
    setTimeout(() => { sc.scrollTop = (9-6)*2*44 - 4; }, 60);
  }
}

// ── 캘린더 렌더링 ─────────────────────────────────────────
function renderCal() {
  const days     = [0,1,2,3].map(i => addDays(startDate, i));
  const todayISO = toLocalISO(new Date());

  document.getElementById('calRange').textContent = `${fmtShort(days[0])} ~ ${fmtShort(days[3])}`;

  // 헤더 업데이트
  days.forEach((d, i) => {
    const iso    = toLocalISO(d);
    const isToday = iso === todayISO;
    const isOff   = offDays.has(iso) || holidays.has(iso) || d.getDay()===0;
    const el = document.getElementById(`dhi${i}`);
    el.className = 'day-hdr-inner' + (isToday?' today':'');
    el.innerHTML =
      `<div class="dname">${DAY_KO[d.getDay()]}${isOff?'<span class="off-dot"></span>':''}</div>`+
      `<div class="ddate">${d.getMonth()+1}/${d.getDate()}</div>`;
  });

  // 슬롯 맵 구성 (로컬 시간 기준)
  const slotMap = {};
  schedData.forEach(s => {
    const key = `${utcToLocalDate(s.scheduled_at)}T${utcToLocalTime(s.scheduled_at)}`;
    slotMap[key] = s;
  });

  // rowspan 점유 추적: `${dayIdx}:${slotIdx}` → true
  const occ = {};
  const tbody = document.getElementById('calBody');
  tbody.innerHTML = '';

  SLOTS.forEach((time, ti) => {
    const tr = document.createElement('tr');

    // 시간 레이블 (정시만)
    const tdT = document.createElement('td');
    tdT.className = 'tl';
    tdT.textContent = time.endsWith(':00') ? time : '';
    tr.appendChild(tdT);

    days.forEach((day, di) => {
      if (occ[`${di}:${ti}`]) return; // rowspan 점유된 셀 skip

      const iso   = toLocalISO(day);
      const sched = slotMap[`${iso}T${time}`];
      const isOff = offDays.has(iso) || holidays.has(iso) || day.getDay()===0;
      const isToday = iso === todayISO;

      const td = document.createElement('td');

      if (sched) {
        const span = Math.max(1, Math.ceil((sched.duration_min||60)/30));
        if (span > 1) {
          td.rowSpan = span;
          for (let k=1; k<span; k++) occ[`${di}:${ti+k}`] = true;
        }
        td.className = `slot s-${sched.status}${isToday?' today-bg':''}`;
        td.innerHTML = `<div class="slot-inner">
          <div class="slot-name">${sched.members?.name||'-'}</div>
          <div class="slot-lbl">${ST_LABEL[sched.status]||sched.status} · ${sched.duration_min||60}m</div>
        </div>`;
        td.onclick = () => openActionModal(sched);
      } else if (isOff) {
        td.className = `slot s-off${isToday?' today-bg':''}`;
      } else {
        td.className = `slot s-empty${isToday?' today-bg':''}`;
        td.onclick = () => openCreateModal(day, time);
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

// ── 날짜 이동 ─────────────────────────────────────────────
function moveDays(n) {
  startDate = addDays(startDate, n);
  showLoad(true);
  autoComplete().then(() => refreshAll()).finally(() => showLoad(false));
}

// ── 예약 생성 모달 ────────────────────────────────────────
function openCreateModal(day, time) {
  createSlot = { day, time };
  document.getElementById('createDateDisplay').textContent =
    `${day.getMonth()+1}/${day.getDate()}(${DAY_KO[day.getDay()]}) ${time}`;

  const sel = document.getElementById('memberSel');
  sel.innerHTML = '<option value="">회원 선택</option>';
  let cnt = 0;
  members.forEach(m => {
    if (!m.activeContract) return;
    cnt++;
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.dataset.contractId = m.activeContract.id;
    opt.textContent = m.name;
    sel.appendChild(opt);
  });
  if (!cnt) sel.innerHTML = '<option value="">활성 계약 회원 없음</option>';

  document.getElementById('memoInput').value = '';
  document.getElementById('durationSel').value = '60';
  document.getElementById('createErr').style.display = 'none';
  document.getElementById('btnSave').disabled = false;
  openModal('createModal');
}

async function saveBooking() {
  const memberId = document.getElementById('memberSel').value;
  if (!memberId) { showErr('createErr','회원을 선택하세요'); return; }

  const sel = document.getElementById('memberSel');
  const contractId = sel.options[sel.selectedIndex].dataset.contractId;
  if (!contractId) { showErr('createErr','활성 계약이 없는 회원입니다'); return; }

  const duration = parseInt(document.getElementById('durationSel').value);
  const memo     = document.getElementById('memoInput').value.trim();

  const [h, m_] = createSlot.time.split(':').map(Number);
  const dt = new Date(createSlot.day);
  dt.setHours(h, m_, 0, 0);

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  try {
    const { error } = await db.from('schedules').insert({
      contract_id: contractId,
      trainer_id:  trainer.id,
      member_id:   memberId,
      scheduled_at: dt.toISOString(),
      duration_min: duration,
      status: 'scheduled',
      memo: memo || null
    });
    if (error) {
      if (error.code === '23505') showErr('createErr','해당 시간에 이미 예약이 있습니다');
      else showErr('createErr', '등록 실패: ' + error.message);
      btn.disabled = false;
      return;
    }
    closeModal('createModal');
    showToast('예약이 등록되었습니다');
    await refreshAll();
  } catch(e) {
    showErr('createErr', '오류: ' + e.message);
    btn.disabled = false;
  }
}

// ── 수업 액션 모달 (완료 / 노쇼) ─────────────────────────
async function openActionModal(sched) {
  actionSched = sched;
  const dt = new Date(sched.scheduled_at);

  document.getElementById('actTitle').textContent = sched.members?.name || '수업 상세';
  document.getElementById('actDate').textContent  = `${dt.getMonth()+1}/${dt.getDate()}(${DAY_KO[dt.getDay()]})`;
  document.getElementById('actTime').textContent  = `${p2(dt.getHours())}:${p2(dt.getMinutes())} (${sched.duration_min||60}분)`;
  document.getElementById('actStatus').innerHTML  =
    `<span class="st-tag ${ST_CLS[sched.status]||''}">${ST_LABEL[sched.status]||sched.status}</span>`;
  document.getElementById('actMemo').textContent  = sched.memo || '없음';

  // 회차 표시
  try {
    const { count } = await db.from('schedules')
      .select('id',{count:'exact',head:true})
      .eq('contract_id', sched.contract_id)
      .in('status',['completed','noshow']);
    const { data: c } = await db.from('pt_contracts')
      .select('total_sessions').eq('id', sched.contract_id).single();
    const used = count||0;
    document.getElementById('actSession').textContent =
      sched.status === 'scheduled'
        ? `${used+1}/${c?.total_sessions||24}회차 예정`
        : `${used}/${c?.total_sessions||24}회차 소진`;
  } catch { document.getElementById('actSession').textContent = '-'; }

  const isScheduled = sched.status === 'scheduled';
  document.getElementById('btnComplete').style.display = isScheduled ? '' : 'none';
  document.getElementById('btnNoshow').style.display   = isScheduled ? '' : 'none';
  document.getElementById('btnComplete').disabled = false;
  document.getElementById('btnNoshow').disabled   = false;
  openModal('actionModal');
}

async function markDone(newStatus) {
  if (!actionSched) return;
  const btnId = newStatus === 'completed' ? 'btnComplete' : 'btnNoshow';
  document.getElementById(btnId).disabled = true;
  try {
    const { error } = await db.from('schedules')
      .update({ status: newStatus, updated_at: new Date().toISOString() })
      .eq('id', actionSched.id);
    if (error) throw error;

    await checkContractCompletion(actionSched.contract_id, actionSched.member_id);
    closeModal('actionModal');
    showToast(newStatus === 'completed' ? '수업 완료 처리되었습니다' : '노쇼 처리되었습니다');
    await refreshAll();
  } catch(e) {
    showToast('처리 실패: ' + e.message);
    document.getElementById(btnId).disabled = false;
  }
}

// 계약 완료 여부 체크 및 다음 계약 자동 활성화
async function checkContractCompletion(contractId, memberId) {
  const { count } = await db.from('schedules')
    .select('id',{count:'exact',head:true})
    .eq('contract_id', contractId)
    .in('status',['completed','noshow']);

  const { data: c } = await db.from('pt_contracts')
    .select('id,status,total_sessions,contract_order')
    .eq('id', contractId).single();

  if (!c || count < c.total_sessions || c.status === 'completed') return;

  await db.from('pt_contracts').update({status:'completed'}).eq('id', contractId);

  // 다음 계약 (inactive) 자동 active
  const { data: next } = await db.from('pt_contracts')
    .select('id')
    .eq('member_id', memberId)
    .eq('contract_order', c.contract_order + 1)
    .eq('status', 'inactive')
    .maybeSingle();

  if (next) {
    await db.from('pt_contracts')
      .update({ status:'active', started_at: new Date().toISOString() })
      .eq('id', next.id);
    showToast('계약 완료! 다음 계약이 자동 활성화되었습니다');
  } else {
    showToast('전체 계약이 완료되었습니다');
  }
}

  await db.auth.signOut();
  localStorage.removeItem('vg_trainer');
  location.replace('trainer-login.html');
}
