function openSchedModal(schedId,date,time){
  const sel=document.getElementById('schedMember');
  sel.innerHTML='<option value="">-- 회원 없음 --</option>';
  (myMembersForSched||[]).forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.name;sel.appendChild(o);});
  document.getElementById('timePickerDrop').style.display='none';
  if(schedId){
    db.from('schedules').select('id,sched_date,start_time,end_time,type,notes,member_id,status,color,pt_product_id').eq('id',schedId).single().then(({data})=>{
      if(!data)return;
      document.getElementById('schedDate').value=data.sched_date;
      const st=toHM(data.start_time);
      setStartTime(st);
      // 수정 시 종료 시간은 DB 값 유지 (사용자가 설정한 값)
      const et=toHM(data.end_time)||calcEndTime(st);
      document.getElementById('schedEnd').value=et;
      document.getElementById('schedEndDisplay').textContent=formatKorTime(et);
      document.getElementById('schedType').value=data.type||'PT';
      if(data.type==='SPT'){
        // SPT: notes는 schedMemberText(회원/내용 텍스트 입력)에 세팅
        document.getElementById('schedMemberText').value=data.notes||'';
        document.getElementById('schedNotes').value='';
      }else{
        document.getElementById('schedMemberText').value='';
        document.getElementById('schedNotes').value=data.notes||'';
      }
      sel.value=data.member_id||'';
      onSchedTypeChange();
      document.getElementById('schedDeleteBtn').style.display='block';
      document.getElementById('schedModalTitle').textContent='일정 수정';
    });
  }else{
    document.getElementById('schedDate').value='';
    document.getElementById('schedNotes').value='';
    document.getElementById('schedMemberText').value='';
    document.getElementById('schedType').value='PT';
    sel.value='';document.getElementById('schedDeleteBtn').style.display='none';
    document.getElementById('schedDate').value=date||'';
    setStartTime(time||'09:00');
    onSchedTypeChange();
    document.getElementById('schedModalTitle').textContent='일정 추가';
  }
  _schedEditId=schedId||null;
  document.getElementById('schedModalErr').style.display='none';
  document.getElementById('schedModal').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeSchedModal(){
  document.getElementById('schedModal').style.display='none';
  document.getElementById('timePickerDrop').style.display='none';
  document.body.style.overflow='';_schedEditId=null;
}
async function saveSchedule(){
  const btn=document.getElementById('schedSaveBtn'),errEl=document.getElementById('schedModalErr');
  const date=document.getElementById('schedDate').value.trim();
  const start=document.getElementById('schedStart').value.trim();
  errEl.style.display='none';
  if(!date){errEl.textContent='날짜를 입력해주세요.';errEl.style.display='block';return;}
  if(!start){errEl.textContent='시작 시간을 입력해주세요.';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='저장 중...';
  const selType=document.getElementById('schedType').value||'PT';
  // PT만 드롭다운 회원 연결 / SPT·기타는 member_id 없음
  const selMember=(selType==='PT')?document.getElementById('schedMember').value||null:null;
  // PT 유형 + 회원 선택 시 active pt_product 자동 연결
  let ptProductId=null;
  if(selType==='PT'&&selMember){
    const{data:prods}=await db.from('pt_products').select('id,remaining_sessions').eq('member_id',selMember).eq('status','active').gt('remaining_sessions',0).order('contract_date',{ascending:true}).limit(1);
    if(prods&&prods.length){
      const p=prods[0];
      const{count:schedCnt}=await db.from('schedules').select('*',{count:'exact',head:true}).eq('pt_product_id',p.id).eq('status','scheduled');
      if((schedCnt||0)<p.remaining_sessions){ptProductId=p.id;}
      else{errEl.textContent='현재 상품의 잔여 수업이 모두 예약되어 있습니다. 완료 후 다음 상품으로 예약 가능합니다.';errEl.style.display='block';btn.disabled=false;btn.textContent='저장';return;}
    }
  }
  // notes: SPT는 schedMemberText(회원/내용 입력칸)에서 읽음, 나머지는 schedNotes에서 읽음
  const notesVal = selType==='SPT'
    ? document.getElementById('schedMemberText').value.trim()||null
    : selType==='PT' ? null
    : document.getElementById('schedNotes').value.trim()||null;
  const payload={trainer_id:me.id,sched_date:date,start_time:start,end_time:document.getElementById('schedEnd').value||null,type:selType,notes:notesVal,color:TYPE_COLORS[selType]||'#6c63ff',member_id:selMember,pt_product_id:ptProductId};
  let error;
  if(_schedEditId){({error}=await db.from('schedules').update(payload).eq('id',_schedEditId));}
  else{({error}=await db.from('schedules').insert({...payload,status:'scheduled'}));}
  btn.disabled=false;btn.textContent='저장';
  if(error){errEl.textContent=error.message;errEl.style.display='block';return;}
  closeSchedModal();showToast(_schedEditId?'일정 수정 완료':'일정 추가 완료');await loadScheduleView();
}
let _deleteConfirmPending = false;
async function deleteSchedule(){
  if(!_schedEditId) return;
  const btn = document.getElementById('schedDeleteBtn');
  if(!_deleteConfirmPending){
    _deleteConfirmPending = true;
    btn.textContent = '정말 삭제?';
    btn.style.background = '#ff4d4f';
    btn.style.borderColor = '#ff4d4f';
    btn.style.color = '#fff';

    return;

  if(error){showToast('삭제 실패: '+error.message);return;}

}

// ══════════════════════════════════════════════════════════════
// 이미지생성 탭
// ══════════════════════════════════════════════════════════════
let igExercises = [];   // { name, part, tool, image_url, sets:[{weight,reps}] }
let _igExCache  = [];   // 전체 운동 목록 캐시

async function igLoadExCache() {
  if (_igExCache.length) return;
  const { data, error } = await db.from('exercise_refs')
    .select('id,name_ko,name_en,part_unified,tool_unified,image_url')
    .eq('is_active', true).order('name_ko');
  if (error) { showToast('운동 목록 로드 실패'); return; }
  _igExCache = data || [];
}

let _igSearchTimer = null;
function igSearchEx() {
  clearTimeout(_igSearchTimer);
  _igSearchTimer = setTimeout(async () => {
    const q = (document.getElementById('igExSearch').value || '').trim().toLowerCase();
    const res = document.getElementById('igExResults');
    if (!q) { res.style.display = 'none'; return; }
    await igLoadExCache();
    const hits = _igExCache.filter(e =>
      (e.name_ko || '').toLowerCase().includes(q) ||
      (e.name_en || '').toLowerCase().includes(q)
    ).slice(0, 8);
    if (!hits.length) { res.style.display = 'none'; return; }
    res.innerHTML = hits.map(e =>
      `<div class="ig-result" onclick="igAddExById('${e.id}')">
        <div class="ig-result-name">${e.name_ko || e.name_en}</div>
        <div class="ig-result-sub">${[e.part_unified, e.tool_unified].filter(Boolean).join(' · ')}</div>
       </div>`
    ).join('');
    res.style.display = 'block';
  }, 180);
}

document.addEventListener('click', e => {
  const res = document.getElementById('igExResults');
  if (res && !res.contains(e.target) && e.target.id !== 'igExSearch') {
    res.style.display = 'none';
  }
});

function igAddExById(id) {
  const ex = _igExCache.find(e => e.id === id);
  if (!ex) return;
  igExercises.push({
    name:       ex.name_ko || ex.name_en || '운동',
    part:       ex.part_unified || '',
    tool:       ex.tool_unified || '',
    image_url:  ex.image_url || null,
    weight_mode: 'total',
    sets:       [{ weight: 0, reps: 10 }]
  });
  document.getElementById('igExSearch').value = '';
  document.getElementById('igExResults').style.display = 'none';
  igRenderList();
}

function igRenderList() {
  const wrap = document.getElementById('igExList');
  if (!igExercises.length) {
    wrap.innerHTML = '<div class="ig-empty">운동을 검색해서 추가하세요</div>'; return;
  }
  wrap.innerHTML = igExercises.map((ex, i) => `
    <div class="ig-ex-card">
      <div class="ig-ex-head">
        <div class="ig-ex-num">${i + 1}</div>
        <div style="flex:1">
          <div class="ig-ex-name">${ex.name}</div>
          ${ex.part || ex.tool ? `<div class="ig-ex-sub">${[ex.part, ex.tool].filter(Boolean).join(' · ')}</div>` : ''}
        </div>
        <button class="ig-ex-del" onclick="igRemoveEx(${i})">✕</button>
      </div>
      <div class="ig-sets-hdr"><span>세트</span><span>무게(kg)</span><span>횟수</span><span></span></div>
      ${ex.sets.map((s, si) => `
        <div class="ig-set-row">
          <div class="ig-set-num">${si + 1}</div>
          <input class="ig-set-input" type="number" step="0.5" min="0" value="${s.weight}"
                 onchange="igUpdSet(${i},${si},'weight',this.value)">
          <input class="ig-set-input" type="number" min="1" value="${s.reps}"
                 onchange="igUpdSet(${i},${si},'reps',this.value)">
          <div class="ig-set-row-end">
            <button class="wm-chip ${ex.weight_mode === 'single' ? 'wm-single' : 'wm-total'}" onclick="igToggleWeightMode(${i})">${ex.weight_mode === 'single' ? '한쪽' : '양손'}</button>
            <button class="ig-del-set" onclick="igDelSet(${i},${si})"
                    ${ex.sets.length <= 1 ? 'style="opacity:0;pointer-events:none"' : ''}>−</button>
          </div>
        </div>`).join('')}
      <button class="ig-add-set" onclick="igAddSet(${i})">＋ 세트 추가</button>
    </div>`).join('');
}

function igRemoveEx(i) { igExercises.splice(i, 1); igRenderList(); }
function igAddSet(i) {
  const last = igExercises[i].sets.at(-1) || { weight: 0, reps: 10 };
  igExercises[i].sets.push({ weight: last.weight, reps: last.reps });
  igRenderList();
}
function igDelSet(i, si) {
  if (igExercises[i].sets.length <= 1) return;
  igExercises[i].sets.splice(si, 1);
  igRenderList();
}
function igUpdSet(i, si, field, val) {
  igExercises[i].sets[si][field] = field === 'weight' ? parseFloat(val) || 0 : parseInt(val) || 0;
}
function igToggleWeightMode(idx) {
  igExercises[idx].weight_mode = igExercises[idx].weight_mode === 'single' ? 'total' : 'single';
  igRenderList();
}

// ── 캔버스 생성 ──────────────────────────────────────────────
async function igBuildCanvas() {
  const memberName  = (document.getElementById('ig-member').value  || '').trim();
  const programName = (document.getElementById('ig-program').value || '').trim();
  if (!memberName)         { showToast('회원명을 입력해주세요'); return null; }
  if (!igExercises.length) { showToast('운동을 하나 이상 추가해주세요'); return null; }
  showToast('이미지 생성 중...');

  // 운동 이미지 로드 (CORS 실패 → null)
  const imgMap = {};
  await Promise.all(igExercises.map(async (ex, i) => {
    if (!ex.image_url) return;
    imgMap[i] = await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => resolve(img);
      img.onerror = () => resolve(null);
      setTimeout(() => resolve(null), 4000);
      img.src = ex.image_url;
    });
  }));

  // ── 상수 ─────────────────────────────────────────────────
  const W = 1080, PAD = 52, COL = 1080 - 52 * 2;
  const HEADER_H = 148, FOOTER_H = 72;
  const EX_TOP = 48, NAME_H = 68, SET_HDR = 38, SET_ROW = 40, EX_SEP = 32;

  // ── 전체 높이 계산 ────────────────────────────────────────
  let totalH = HEADER_H + EX_TOP;
  igExercises.forEach((ex, i) => {
    if (imgMap[i]) totalH += Math.round(COL * 9 / 16) + 18;
    totalH += NAME_H + SET_HDR + ex.sets.length * SET_ROW;
    totalH += i < igExercises.length - 1 ? EX_SEP + 24 : EX_SEP;
  });
  totalH += FOOTER_H + 20;

  // ── 캔버스 ───────────────────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  function rRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  // ── 배경 + 헤더 ──────────────────────────────────────────
  ctx.fillStyle = '#080e1a'; ctx.fillRect(0, 0, W, totalH);
  ctx.fillStyle = '#0d1525'; ctx.fillRect(0, 0, W, HEADER_H);
  ctx.fillStyle = '#1e3a5f33'; ctx.fillRect(0, HEADER_H - 1, W, 1);

  // 로고
  const FONT = '-apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
  ctx.font = `bold 46px ${FONT}`;
  ctx.fillStyle = '#ffffff'; ctx.fillText('VERA', PAD, 64);
  const vW = ctx.measureText('VERA').width;
  ctx.fillStyle = '#3b82f6'; ctx.fillText('GYM', PAD + vW + 6, 64);

  // 회원명 + 프로그램명
  ctx.font = `bold 36px ${FONT}`;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`'${memberName}'님`, PAD, 114);
  if (programName) {
    const nmW = ctx.measureText(`'${memberName}'님`).width;
    ctx.fillStyle = '#3b82f6';
    ctx.fillText(`  '${programName}' 프로그램`, PAD + nmW, 114);
  }

  // ── 운동 목록 ─────────────────────────────────────────────
  let y = HEADER_H + EX_TOP;
  for (let i = 0; i < igExercises.length; i++) {
    const ex = igExercises[i];
    const cat = [ex.part, ex.tool].filter(Boolean).join(' · ');

    // 운동 이미지
    if (imgMap[i]) {
      const imgH = Math.round(COL * 9 / 16);
      rRect(PAD, y, COL, imgH, 14); ctx.save(); ctx.clip();
      const img = imgMap[i];
      const scale = Math.min(COL / img.naturalWidth, imgH / img.naturalHeight);
      const iW = img.naturalWidth * scale, iH = img.naturalHeight * scale;
      ctx.fillStyle = '#0d1a2e'; ctx.fillRect(PAD, y, COL, imgH);
      ctx.drawImage(img, PAD + (COL - iW) / 2, y + (imgH - iH) / 2, iW, iH);
      ctx.restore();
      y += imgH + 18;
    }

    // 번호 + 이름
    ctx.font = `bold 32px ${FONT}`;
    ctx.fillStyle = '#3b82f6'; ctx.textAlign = 'left';
    ctx.fillText(`${i + 1}.`, PAD, y + 32);
    const numW = ctx.measureText(`${i + 1}. `).width + 2;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(ex.name, PAD + numW, y + 32);
    if (cat) {
      ctx.font = `22px ${FONT}`; ctx.fillStyle = '#4a6580';
      ctx.fillText(cat, PAD + numW, y + 58);
    }
    y += NAME_H;

    // 세트 헤더
    const colW = COL / 3;
    ctx.fillStyle = '#0a1525'; rRect(PAD, y, COL, SET_HDR, 8); ctx.fill();
    ctx.font = `20px ${FONT}`; ctx.fillStyle = '#3a5878'; ctx.textAlign = 'center';
    ctx.fillText('세트', PAD + colW * 0.5, y + 26);
    ctx.fillText('무게 (kg)', PAD + colW * 1.5, y + 26);
    ctx.fillText('횟수', PAD + colW * 2.5, y + 26);
    ctx.textAlign = 'left'; y += SET_HDR;

    // 세트 행
    ex.sets.forEach((s, si) => {
      ctx.fillStyle = si % 2 === 0 ? '#0d1a2e' : '#091422';
      ctx.fillRect(PAD, y, COL, SET_ROW);
      ctx.textAlign = 'center'; ctx.font = `24px ${FONT}`;
      ctx.fillStyle = '#5a7898'; ctx.fillText(String(si + 1), PAD + colW * 0.5, y + 28);
      ctx.fillStyle = '#ffffff';
      const wDisp = (ex.weight_mode === 'single' && s.weight > 0)
        ? `${s.weight}×2`
        : (s.weight !== 0 ? String(s.weight) : '─');
      ctx.fillText(wDisp, PAD + colW * 1.5, y + 28);
      ctx.fillText(s.reps   !== 0 ? String(s.reps)   : '─', PAD + colW * 2.5, y + 28);
      ctx.textAlign = 'left'; y += SET_ROW;
    });

    // 구분선
    if (i < igExercises.length - 1) {
      y += 16; ctx.fillStyle = '#1e3a5f33'; ctx.fillRect(PAD, y, COL, 1); y += EX_SEP;
    } else { y += EX_SEP; }
  }

  // ── 푸터 ─────────────────────────────────────────────────
  const fy = totalH - FOOTER_H;
  ctx.fillStyle = '#1e3a5f22'; ctx.fillRect(0, fy, W, 1);
  ctx.font = `22px ${FONT}`; ctx.fillStyle = '#2a4060'; ctx.textAlign = 'center';
  ctx.fillText('VERA GYM | 트레이너 맞춤 프로그램', W / 2, fy + 44);
  ctx.textAlign = 'left';

  return canvas;
}

// ── 저장 ────────────────────────────────────────────────────
async function igGenerateAndSave() {
  const canvas = await igBuildCanvas();
  if (!canvas) return;
  canvas.toBlob(blob => {
    if (!blob) { showToast('이미지 생성 실패'); return; }
    const memberName = (document.getElementById('ig-member').value || '').trim();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `veragym_${memberName || 'workout'}.png`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('이미지 저장 완료 ✓');
  }, 'image/png');
}

// ── 공유 (Web Share API → 갤러리 저장 fallback) ────────────
async function igGenerateAndShare() {
  const canvas = await igBuildCanvas();
  if (!canvas) return;
  canvas.toBlob(async blob => {
    if (!blob) { showToast('이미지 생성 실패'); return; }
    const memberName = (document.getElementById('ig-member').value || '').trim();
    const file = new File([blob], `veragym_${memberName || 'workout'}.png`, { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'VERA GYM 운동 기록' });
      } catch (e) {
        if (e.name !== 'AbortError') igFallbackDownload(blob, memberName);
      }
    } else {
      igFallbackDownload(blob, memberName);
      showToast('공유 미지원 환경 — 이미지 저장했어요');
    }
  }, 'image/png');
}

function igFallbackDownload(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `veragym_${name || 'workout'}.png`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

    <div id="schedMemberTextRow" style="display:none;margin-bottom:14px;"><label style="display:block;font-size:12px;color:#aaa;margin-bottom:6px;">회원</label>
      <input id="schedMemberText" type="text" placeholder="회원명을 입력해주세요" style="width:100%;background:#2a2a3e;border:1px solid #3a3a5c;border-radius:8px;color:#fff;padding:10px 12px;font-size:14px;box-sizing:border-box;outline:none;font-family:inherit;"></div>
    <div id="schedNotesRow" style="margin-bottom:20px;display:none;"><label id="schedNotesLabel" style="display:block;font-size:12px;color:#aaa;margin-bottom:6px;">내용</label>
      <textarea id="schedNotes" rows="3" placeholder="" style="width:100%;background:#2a2a3e;border:1px solid #3a3a5c;border-radius:8px;color:#fff;padding:10px 12px;font-size:14px;box-sizing:border-box;outline:none;resize:vertical;font-family:inherit;"></textarea></div>
    <div style="display:flex;gap:10px;">
      <button id="schedDeleteBtn" onclick="deleteSchedule()" style="display:none;flex:1;background:#3a1a1a;border:1px solid #ff4d4f55;color:#ff4d4f;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;">삭제</button>
      <button id="schedSaveBtn" onclick="saveSchedule()" style="flex:2;background:#6c63ff;border:none;color:#fff;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;">저장</button>
    </div>
  </div>
</div>

<!-- ===== 일정 상세/액션 모달 ===== -->
<div id="schedInfoModal" style="display:none;position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,0.55);align-items:flex-end;justify-content:center;" onclick="if(event.target===this)closeSchedInfo()">
  <div style="background:#1e1e2e;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:0 20px calc(28px + env(safe-area-inset-bottom));box-sizing:border-box;max-height:85dvh;overflow-y:auto;animation:slideUp .22s ease;">
    <div style="width:36px;height:4px;background:#3a3a5c;border-radius:99px;margin:14px auto 20px;"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div id="siMember" style="font-size:18px;font-weight:800;color:#fff;"></div>
      <div id="siStatus"></div>
    </div>
    <div style="background:#141428;border-radius:12px;padding:14px 16px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2a2a3c;">
        <span style="font-size:12px;color:#6a6a8a;">날짜/시간</span>
        <span id="siDateTime" style="font-size:13px;color:#fff;font-weight:600;"></span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2a2a3c;">
        <span style="font-size:12px;color:#6a6a8a;">유형</span>
        <span id="siType" style="font-size:13px;color:#fff;font-weight:600;"></span>
      </div>
      <div id="siSessionRow" style="display:flex;justify-content:space-between;padding:5px 0;">
        <span style="font-size:12px;color:#6a6a8a;">PT 회차</span>
        <span id="siSession" style="font-size:13px;color:#fff;font-weight:600;"></span>
      </div>
    </div>
    <div id="siErr" style="display:none;background:#ff4d4f22;color:#ff4d4f;border:1px solid #ff4d4f55;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:10px;"></div>
    <div id="siActions" style="display:flex;flex-direction:column;gap:10px;margin-top:14px;"></div>
  </div>
</div>




<!-- ── 수업일지 연결 모달 ───────────────────────────────────── -->
<div id="linkLogModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center;" onclick="if(event.target===this)linkLogSkip()">
  <div style="background:#1e1e2e;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:0 20px calc(28px + env(safe-area-inset-bottom));box-sizing:border-box;max-height:80dvh;overflow-y:auto;animation:slideUp .22s ease;">
    <div style="width:36px;height:4px;background:#3a3a5c;border-radius:99px;margin:14px auto 18px;"></div>
    <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:4px;">수업일지 연결</div>
    <div id="linkLogSubtitle" style="font-size:12px;color:#6a6a8a;margin-bottom:16px;"></div>
    <div id="linkLogList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px;"></div>
    <div style="display:flex;gap:10px;padding-bottom:4px;">
      <button onclick="linkLogWrite()" style="flex:1;background:#3b82f622;border:1.5px solid #3b82f655;color:#60a5fa;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">지금 작성</button>
      <button onclick="linkLogSkip()" style="flex:1;background:#ffffff11;border:1.5px solid #ffffff22;color:#888;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">나중에</button>
    </div>
  </div>
</div>



</body>
</html>
