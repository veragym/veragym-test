<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest-member.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 멤버">
<meta name="theme-color" content="#4ade80">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERA GYM Member | 내 수업 일지</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #0f0f0f; color: #fff;
    min-height: 100dvh; padding-bottom: 40px;
  }

  /* ─── 헤더 ─── */
  .header {
    background: linear-gradient(135deg, #0f2a1a 0%, #0f0f0f 60%);
    border-bottom: 1px solid #1a2a1a;
    padding: 24px 20px 20px;
  }
  .gym-badge {
    display: inline-block; background: #4ade8022;
    border: 1px solid #4ade8044; border-radius: 20px;
    padding: 4px 12px; font-size: 11px; color: #4ade80;
    margin-bottom: 10px; letter-spacing: 0.5px;
  }
  .member-greet { font-size: 22px; font-weight: 800; }
  .member-greet span { color: #4ade80; }
  .trainer-info { font-size: 13px; color: #666; margin-top: 6px; }

  /* ─── 통계 바 ─── */
  .stats-row {
    display: flex; gap: 10px;
    padding: 16px 20px; border-bottom: 1px solid #1a1a1a;
    overflow-x: auto;
  }
  .stat-box {
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 12px; padding: 12px 16px;
    flex-shrink: 0; min-width: 90px; text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 800; color: #4ade80; }
  .stat-label { font-size: 11px; color: #555; margin-top: 3px; }

  /* ─── 섹션 제목 ─── */
  .sec-title { font-size: 13px; color: #555; padding: 16px 20px 8px; font-weight: 600; letter-spacing: 0.3px; }

  /* ─── 세션 카드 ─── */
  .sess-list { padding: 0 16px; }
  .sess-card {
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 16px; margin-bottom: 10px; overflow: hidden;
  }
  .sess-head {
    padding: 16px 18px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .sess-head:hover { background: #1f1f1f; }
  .sess-left .sess-num-badge {
    display: inline-block; background: #0f2a1a;
    border: 1px solid #4ade8033; border-radius: 20px;
    padding: 3px 10px; font-size: 11px; color: #4ade80;
    margin-bottom: 6px;
  }
  .sess-left .sess-date { font-size: 16px; font-weight: 700; }
  .sess-left .sess-ex-cnt { font-size: 12px; color: #555; margin-top: 3px; }
  .chevron { color: #333; font-size: 18px; transition: transform 0.2s; }
  .chevron.open { transform: rotate(90deg); }

  /* ─── 운동 상세 ─── */
  .sess-body { display: none; border-top: 1px solid #222; }
  .sess-body.open { display: block; }

  .ex-item { padding: 14px 18px; border-bottom: 1px solid #1a1a1a; }
  .ex-item:last-child { border-bottom: none; }
  .ex-item-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .ex-icon { font-size: 20px; }
  .ex-item-name { font-size: 14px; font-weight: 700; }
  .ex-item-cat { font-size: 11px; color: #555; margin-top: 2px; }

  /* 세트 테이블 */
  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th {
    font-size: 11px; color: #555; padding: 4px 8px;
    text-align: center; font-weight: 500;
  }
  .sets-table td {
    font-size: 14px; color: #ddd; padding: 6px 8px;
    text-align: center; border-top: 1px solid #1a1a1a;
  }
  .sets-table .set-cell { color: #666; font-size: 12px; }

  /* 코멘트 */
  .ex-comment-box {
    background: #111; border-left: 2px solid #4ade80;
    border-radius: 0 8px 8px 0;
    padding: 8px 12px; margin-top: 10px;
    font-size: 13px; color: #aaa; line-height: 1.5;
  }

  /* 총평 */
  .sess-notes {
    background: #111; margin: 0 18px 14px;
    border-radius: 10px; padding: 12px 14px;
    font-size: 13px; color: #aaa; line-height: 1.6;
    border: 1px solid #222;
  }
  .sess-notes-label {
    font-size: 11px; color: #4ade80; margin-bottom: 6px; font-weight: 600;
  }

  /* ─── 빈 상태 / 로딩 ─── */
  .empty { text-align: center; padding: 60px 20px; color: #444; }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .loading { text-align: center; padding: 40px; color: #555; }

  /* ─── 에러 화면 ─── */
  .error-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100dvh; padding: 40px 20px; text-align: center;
  }
  .error-screen .icon { font-size: 60px; margin-bottom: 20px; }
  .error-screen h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  .error-screen p { font-size: 14px; color: #666; line-height: 1.6; }
</style>
</head>
<body>

<!-- 메인 콘텐츠 (토큰 확인 후 표시) -->
<div id="mainContent" style="display:none">
  <!-- 헤더 -->
  <div class="header">
    <div class="gym-badge" id="gymBadge">베라짐 미사점</div>
    <div class="member-greet">안녕하세요, <span id="memberNameHdr"></span>님</div>
    <div class="trainer-info" id="trainerInfo"></div>
  </div>

  <!-- 통계 -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="statTotal">-</div>
      <div class="stat-label">총 수업</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statMonth">-</div>
      <div class="stat-label">이번 달</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statExTypes">-</div>
      <div class="stat-label">운동 종류</div>
    </div>
  </div>

  <!-- 수업 목록 -->
  <div class="sec-title">수업 기록</div>
  <div id="sessList" class="sess-list">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<!-- 에러 화면 (토큰 오류) -->
<div id="errorScreen" style="display:none" class="error-screen">
  <h2>접근할 수 없어요</h2>
  <p>유효하지 않은 링크예요.<br>트레이너에게 링크를 다시 받아보세요.</p>
</div>

<!-- 로딩 화면 -->
<div id="loadingScreen" class="error-screen">
  <h2 style="color:#555">로딩 중...</h2>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
init_db();
// ─── PWA 뒤로가기 버튼 앱 종료 방지 ───
(function() {
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', function() {
    history.pushState(null, '', location.href);
  });
})();

// ─── 토큰 캐시 ───
let _memberToken = null;
const _logDetailCache = {};

// ─── 초기화 ───
async function init() {
  // URL 토큰 우선, 없으면 저장된 토큰 사용 (PWA 홈화면 재방문 대응)
  let token = new URLSearchParams(location.search).get('token');
  if (token) {
    localStorage.setItem('vg_member_token', token); // 기기에 저장
  } else {
    token = localStorage.getItem('vg_member_token'); // 저장된 토큰 불러오기
  }
  if (!token) { showError(); return; }
  _memberToken = token;

  // 회원 정보 조회
  const { data, error } = await db.rpc('member_get_by_token', { p_token: token });
  if (error || !data || !data.length) { showError(); return; }

  const info = data[0];

  // 화면 세팅
  document.getElementById('gymBadge').textContent      = `베라짐 ${info.gym_location}`;
  document.getElementById('memberNameHdr').textContent = info.member_name;
  document.getElementById('trainerInfo').textContent   = info.trainer_name ? `담당 트레이너 · ${info.trainer_name}` : '';

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display   = 'block';

  // 수업 기록 로드
  await loadSessions(token);
}

// ─── 수업 기록 로드 ───
async function loadSessions(token) {
  const { data: logs, error } = await db.rpc('member_get_logs', { p_token: token });

  if (error || !logs) {
    document.getElementById('sessList').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><div>수업 기록을 불러오지 못했어요</div></div>`;
    return;
  }

  // 통계 계산
  const thisMonth = new Date().toISOString().slice(0, 7);
  const monthLogs = logs.filter(s => s.session_date?.startsWith(thisMonth)).length;
  const allExNames = new Set();
  logs.forEach(s => (s.ex_details || []).forEach(e => e.name && allExNames.add(e.name)));

  document.getElementById('statTotal').textContent   = logs.length;
  document.getElementById('statMonth').textContent   = monthLogs;
  document.getElementById('statExTypes').textContent = allExNames.size;

  // 목록 렌더
  const wrap = document.getElementById('sessList');
  if (!logs.length) {
    wrap.innerHTML = `<div class="empty">아직 수업 기록이 없어요.</div>`;
    return;
  }

  // log_id → index 매핑 저장 (detail 로딩에 사용)
  window._logsData = logs;

  wrap.innerHTML = logs.map((s, i) => {
    const exCount   = s.ex_count || (s.ex_details?.length) || 0;
    const dateStr   = fmtDate(s.session_date);
    const exPreview = (s.ex_details || []).slice(0, 3).map(e => e.name).filter(Boolean).join(', ');

    return `
      <div class="sess-card">
        <div class="sess-head" onclick="toggleSess(${i}, '${s.log_id}')">
          <div class="sess-left">
            <div class="sess-date">${dateStr}</div>
            <div class="sess-ex-cnt">운동 ${exCount}종목${exPreview ? ' · ' + exPreview : ''}</div>
          </div>
          <div class="chevron" id="chev${i}">›</div>
        </div>
        <div class="sess-body" id="sessBody${i}">
          ${s.notes ? `
            <div style="padding:14px 18px 0">
              <div class="sess-notes">
                <div class="sess-notes-label">트레이너 총평</div>
                ${s.notes}
              </div>
            </div>` : ''}
          <div id="sessDetail${i}"></div>
        </div>
      </div>
    `;
  }).join('');
}

// ─── 아코디언 (지연 로딩) ───
async function toggleSess(i, logId) {
  const body   = document.getElementById(`sessBody${i}`);
  const chev   = document.getElementById(`chev${i}`);
  const isOpen = body.classList.toggle('open');
  chev.classList.toggle('open', isOpen);

  if (!isOpen) return;

  const detailEl = document.getElementById(`sessDetail${i}`);
  if (detailEl.dataset.loaded) return; // 이미 로딩됨

  // 로딩 표시
  detailEl.innerHTML = '<div class="loading" style="padding:16px">불러오는 중...</div>';

  const { data: exs, error } = await db.rpc('member_get_log_detail', {
    p_token: _memberToken,
    p_log_id: logId
  });

  detailEl.dataset.loaded = '1';

  if (error || !exs || !exs.length) {
    detailEl.innerHTML = '<div style="padding:10px 18px 14px;color:#444;font-size:13px">운동 기록이 없어요</div>';
    return;
  }

  detailEl.innerHTML = exs
    .sort((a, b) => (a.order_index ?? 0) - (b.order_index ?? 0))
    .map(ex => {
      const name     = ex.name_ko || ex.custom_name || '운동';
      const category = [ex.part_unified, ex.tool_unified].filter(Boolean).join(' · ');
      const sets     = Array.isArray(ex.sets_data) ? ex.sets_data : [];

      const setsHtml = sets.length ? `
        <table class="sets-table">
          <tr><th>세트</th><th>무게(kg)</th><th>횟수</th></tr>
          ${sets.map((set, si) => `
            <tr>
              <td class="set-cell">${si + 1}세트</td>
              <td>${set.weight ?? '-'}</td>
              <td>${set.reps ?? '-'}</td>
            </tr>
          `).join('')}
        </table>
      ` : '<div style="font-size:12px;color:#444;padding:4px 0">세트 정보 없음</div>';

      return `
        <div class="ex-item">
          <div class="ex-item-head">
            <div>
              <div class="ex-item-name">${name}</div>
              ${category ? `<div class="ex-item-cat">${category}</div>` : ''}
            </div>
          </div>
          ${setsHtml}
        </div>
      `;
    }).join('');
}

// ─── 에러 화면 ───
function showError() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display   = 'flex';
}

// ─── 시작 ───
init();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/trainer/service-worker.js')
      .catch(() => {});
  });
}
</script>
</body>
</html>
