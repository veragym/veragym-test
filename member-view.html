<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest-member.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 멤버">
<meta name="theme-color" content="#4ade80">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VERA GYM | 내 수업</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────── */
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; background:#080e08; color:#fff; min-height:100dvh; overscroll-behavior:none; padding-bottom:0; }

/* ── Header ──────────────────────────────────────────────── */
.header { background:#0d1a0d; border-bottom:1px solid #1a3a1a44; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header-title { font-size:16px; font-weight:800; }
.header-title span { color:#4ade80; }
.header-sub { font-size:11px; color:#3a5840; }

/* ── Top Tab Navigation ──────────────────────────────────── */
.tabs { display:flex; background:#0d1a0d; border-bottom:1px solid #1a3a1a44; position:sticky; top:57px; z-index:99; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab-btn { flex:1; min-width:60px; padding:13px 10px; font-size:12px; font-weight:600; color:#3a5840; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:inherit; text-align:center; }
.tab-btn.active { color:#4ade80; border-bottom-color:#4ade80; }

/* ── Tab Content ─────────────────────────────────────────── */
.tab-content { display:none; padding:16px 14px; }
.tab-content.active { display:block; }

/* ── Stats Row ───────────────────────────────────────────── */
.stats-row { display:flex; gap:10px; padding:0 0 16px; overflow-x:auto; }
.stat-box { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:12px; padding:12px 16px; flex:1; text-align:center; }
.stat-num { font-size:22px; font-weight:800; color:#4ade80; }
.stat-label { font-size:11px; color:#3a5840; margin-top:3px; }

/* ── Section Header ──────────────────────────────────────── */
.sec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.sec-title { font-size:15px; font-weight:700; }
.sec-count { font-size:12px; color:#2a4a2a; margin-left:6px; }
.divider-label { font-size:11px; font-weight:700; color:#4ade80; letter-spacing:1px; margin:16px 0 10px; display:flex; align-items:center; gap:8px; }
.divider-label::after { content:''; flex:1; height:1px; background:#1a3a1a44; }

/* ── Log Cards (수업일지) ─────────────────────────────────── */
.sess-card { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:14px; margin-bottom:10px; overflow:hidden; }
.sess-head { padding:16px 18px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:background 0.15s; }
.sess-head:active { background:#111f11; }
.sess-date { font-size:15px; font-weight:700; }
.sess-sub { font-size:12px; color:#3a5840; margin-top:3px; }
.sess-num-badge { display:inline-block; background:#0d2a0d; border:1px solid #4ade8033; border-radius:20px; padding:2px 9px; font-size:11px; color:#4ade80; margin-bottom:5px; }
.chevron { color:#1a3a1a; font-size:18px; transition:transform 0.2s; flex-shrink:0; }
.chevron.open { transform:rotate(90deg); }
.sess-body { display:none; border-top:1px solid #1a3a1a22; }
.sess-body.open { display:block; }
.sess-notes { background:#0a140a; margin:14px 18px 0; border-radius:10px; padding:12px 14px; font-size:13px; color:#7a9a7a; line-height:1.6; border:1px solid #1a3a1a33; }
.sess-notes-label { font-size:11px; color:#4ade80; margin-bottom:6px; font-weight:600; }
.ex-item { padding:14px 18px; border-bottom:1px solid #1a3a1a22; }
.ex-item:last-child { border-bottom:none; }
.ex-item-name { font-size:14px; font-weight:700; }
.ex-item-cat { font-size:11px; color:#3a5840; margin-top:2px; }
.sets-table { width:100%; border-collapse:collapse; margin-top:8px; }
.sets-table th { font-size:11px; color:#3a5840; padding:4px 8px; text-align:center; font-weight:500; }
.sets-table td { font-size:14px; color:#ddd; padding:6px 8px; text-align:center; border-top:1px solid #1a3a1a33; }
.sets-table .set-cell { color:#3a5840; font-size:12px; }
.mv-photo-btn { display:inline-flex; align-items:center; gap:5px; background:#0d2a0d; border:1px solid #4ade8044; border-radius:8px; padding:7px 12px; font-size:12px; font-weight:600; color:#4ade80; cursor:pointer; font-family:inherit; margin-top:10px; }

/* ── Schedule Cards (일정) ───────────────────────────────── */
.sched-card { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:14px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; }
.sched-date-block { text-align:center; background:#111f11; border:1px solid #1a3a1a44; border-radius:10px; padding:8px 12px; flex-shrink:0; min-width:52px; }
.sched-month { font-size:10px; color:#4ade80; font-weight:700; letter-spacing:0.5px; }
.sched-day { font-size:22px; font-weight:800; line-height:1; }
.sched-weekday { font-size:10px; color:#3a5840; margin-top:1px; }
.sched-info { flex:1; min-width:0; }
.sched-type-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-bottom:5px; }
.sched-type-PT  { background:#4ade8022; border:1px solid #4ade8044; color:#4ade80; }
.sched-type-SPT { background:#86efac22; border:1px solid #86efac44; color:#86efac; }
.sched-time { font-size:14px; font-weight:700; }
.sched-trainer { font-size:12px; color:#3a5840; margin-top:3px; }
.sched-status { font-size:11px; font-weight:600; flex-shrink:0; }
.sched-status.done { color:#3a5840; }
.sched-status.upcoming { color:#4ade80; }

/* ── 운동DB (내장) ────────────────────────────────────────── */
#tab-exlib { padding:0; }
.ex-search-area { padding:12px 14px 0; position:sticky; top:100px; z-index:90; background:#080e08; }
.ex-search-wrap { position:relative; margin-bottom:10px; }
.ex-search-input {
  width:100%; background:#0d1a0d; border:1.5px solid #1a3a1a55;
  border-radius:10px; padding:11px 38px 11px 14px;
  font-size:14px; color:#fff; outline:none; font-family:inherit;
  transition:border-color 0.2s;
}
.ex-search-input:focus { border-color:#4ade8055; }
.ex-search-input::placeholder { color:#2a4a2a; }
.ex-btn-x { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#2a4a2a; font-size:16px; cursor:pointer; padding:0; line-height:1; display:none; }
.ex-filter-row { margin-bottom:8px; }
.ex-filter-label { font-size:10px; color:#2a4a2a; letter-spacing:1.2px; margin-bottom:6px; font-weight:600; }
.ex-chips { display:flex; flex-wrap:wrap; gap:5px; }
.ex-chip { background:#0d1a0d; border:1.5px solid #1a3a1a55; border-radius:20px; padding:5px 13px; font-size:12px; color:#3a5840; cursor:pointer; transition:all 0.15s; white-space:nowrap; font-family:inherit; }
.ex-chip:hover { border-color:#4ade8033; color:#86efac; }
.ex-chip.active { background:#4ade8022; border-color:#4ade8066; color:#4ade80; font-weight:700; }
.ex-stat-bar { padding:8px 14px; font-size:12px; color:#3a5840; }
.ex-stat-bar span { color:#4ade80; font-weight:700; }
.ex-list { padding:0 14px 16px; }
.ex-card { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:10px; padding:12px 14px; margin-bottom:7px; cursor:pointer; transition:border-color 0.15s; }
.ex-card:active { border-color:#4ade8044; }
.ex-card-row { display:flex; align-items:center; gap:12px; }
.ex-thumb { width:52px; height:52px; border-radius:8px; background:#111f11; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; overflow:hidden; }
.ex-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.ex-info { flex:1; min-width:0; }
.ex-name { font-size:14px; font-weight:600; }
.ex-en-name { font-size:11px; color:#3a5840; margin-top:2px; }
.ex-tags { margin-top:5px; display:flex; gap:5px; flex-wrap:wrap; }
.ex-tag-tool { background:#4ade8011; border:1px solid #4ade8033; border-radius:6px; padding:2px 8px; font-size:10px; color:#86efac; }
.ex-tag-part { background:transparent; border:1px solid #1a3a1a55; border-radius:6px; padding:2px 8px; font-size:10px; color:#3a5840; }
.ex-btn-more { width:100%; background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:10px; padding:12px; color:#4ade80; font-size:13px; cursor:pointer; margin:4px 0; font-family:inherit; transition:all 0.15s; }
.ex-btn-more:active { border-color:#4ade8044; }

/* ── 운동DB 서브탭 ─────────────────────────────────────── */
.ex-sub-tabs { display:flex; border-bottom:1px solid #1a3a1a44; position:sticky; top:100px; z-index:91; background:#080e08; }
.ex-sub-tab { flex:1; padding:11px 6px; font-size:12px; font-weight:600; color:#3a5840; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; font-family:inherit; text-align:center; transition:all 0.2s; }
.ex-sub-tab.active { color:#4ade80; border-bottom-color:#4ade80; }
.ex-sub-tab span { font-size:11px; color:#2a4a2a; margin-left:2px; }
.ex-sub-content { display:none; }
.ex-sub-content.active { display:block; }
/* 내 운동 카드 추가 버튼 */
.ex-card-add { position:absolute; right:12px; top:50%; transform:translateY(-50%); width:30px; height:30px; border-radius:50%; border:1.5px solid #4ade8044; background:none; color:#4ade80; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.ex-card-add.added { background:#4ade8022; color:#4ade80; }
.ex-card-row { position:relative; }
/* 루틴 섹션 */
.rt-empty { padding:30px 14px; text-align:center; color:#2a4a2a; font-size:13px; }
.rt-card { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:10px; margin:0 14px 8px; overflow:hidden; }
.rt-card-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; }
.rt-card-name { font-size:14px; font-weight:600; }
.rt-card-count { font-size:11px; color:#3a5840; }
.rt-card-body { padding:0 16px 14px; display:none; }
.rt-card-body.open { display:block; }
.rt-ex-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-top:1px solid #1a3a1a22; font-size:13px; }
.rt-ex-idx { color:#3a5840; font-size:11px; min-width:18px; }
.rt-btn-del { background:none; border:none; color:#ef444488; font-size:11px; cursor:pointer; margin-left:auto; padding:4px 8px; }
.rt-add-btn { display:block; margin:12px 14px; padding:12px; background:#0d1a0d; border:1.5px dashed #1a3a1a55; border-radius:10px; color:#3a5840; font-size:13px; text-align:center; cursor:pointer; font-family:inherit; }
.rt-add-btn:active { border-color:#4ade8044; color:#4ade80; }

/* ── 운동 상세 모달 ──────────────────────────────────────── */
.ex-modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:300; align-items:flex-end; }
.ex-modal-bg.open { display:flex; }
.ex-modal { background:#0d1a0d; border-radius:20px 20px 0 0; padding:20px 20px calc(32px + env(safe-area-inset-bottom)); width:100%; max-height:90dvh; overflow-y:auto; animation:slideUp .25s ease; border-top:1px solid #1a3a1a66; position:relative; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.ex-modal-close { position:absolute; top:14px; right:16px; background:none; border:none; color:#4ade80; font-size:22px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; padding:0; }
.ex-modal-img { width:100%; max-height:240px; object-fit:cover; border-radius:12px; background:#111f11; margin-bottom:16px; display:block; }
.ex-modal-no-img { width:100%; height:140px; background:#111f11; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:16px; }
.ex-modal-name { font-size:22px; font-weight:800; margin-bottom:4px; }
.ex-modal-en { font-size:13px; color:#3a5840; margin-bottom:14px; }
.ex-modal-tags { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px; }
.ex-modal-tag-tool { background:#4ade8022; border:1px solid #4ade8044; border-radius:8px; padding:4px 12px; font-size:12px; color:#4ade80; font-weight:600; }
.ex-modal-tag-part { background:#1a3a1a22; border:1px solid #1a3a1a55; border-radius:8px; padding:4px 12px; font-size:12px; color:#3a5840; }
.ex-modal-sec-title { font-size:11px; font-weight:700; color:#3a5840; letter-spacing:1px; margin-bottom:8px; }
.ex-modal-muscles { display:flex; flex-wrap:wrap; gap:6px; }
.ex-modal-muscle-chip { background:#4ade8011; border:1px solid #4ade8033; border-radius:16px; padding:5px 12px; font-size:12px; color:#86efac; }

/* ── 운동일지 탭 ───────────────────────────────────────── */
.wlog-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.wlog-add-btn { background:#4ade8022; border:1.5px solid #4ade8066; border-radius:8px; padding:7px 16px; color:#4ade80; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
.wlog-card { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:10px; padding:14px 16px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
.wlog-card:active { border-color:#4ade8044; }
.wlog-card-date { font-size:13px; font-weight:600; color:#4ade80; }
.wlog-card-sub { font-size:12px; color:#3a5840; margin-top:4px; }
.wlog-card-notes { font-size:11px; color:#2a4a2a; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wlog-detail { display:none; margin-top:10px; padding-top:10px; border-top:1px solid #1a3a1a33; }
.wlog-detail.open { display:block; }
.wlog-detail-ex { padding:6px 0; }
.wlog-detail-exname { font-size:13px; font-weight:600; margin-bottom:4px; }
/* 작성 뷰 */
.wlog-write { display:none; }
.wlog-write.open { display:block; }
.wlog-write-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #1a3a1a44; margin-bottom:12px; }
.wlog-write-title { font-size:16px; font-weight:700; }
.wlog-write-cancel { background:none; border:none; color:#3a5840; font-size:13px; cursor:pointer; font-family:inherit; }
.wlog-date-row { margin-bottom:14px; }
.wlog-date-input { background:#0d1a0d; border:1.5px solid #1a3a1a55; border-radius:8px; padding:10px 14px; color:#fff; font-size:14px; font-family:inherit; width:100%; }
.wlog-ex-card { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:10px; margin-bottom:8px; overflow:hidden; }
.wlog-ex-head { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; }
.wlog-ex-name { font-size:14px; font-weight:600; }
.wlog-ex-del { background:none; border:none; color:#ef444488; font-size:18px; cursor:pointer; padding:0 4px; }
.wlog-sets { padding:0 14px 10px; }
.wlog-set-row { display:grid; grid-template-columns:32px 1fr 1fr 28px; gap:6px; align-items:center; margin-bottom:4px; }
.wlog-set-num { font-size:11px; color:#3a5840; text-align:center; }
.wlog-set-input { background:#080e08; border:1px solid #1a3a1a44; border-radius:6px; padding:8px; font-size:14px; color:#fff; text-align:center; font-family:inherit; width:100%; }
.wlog-set-del { background:none; border:none; color:#ef444444; font-size:14px; cursor:pointer; padding:0; }
.wlog-set-header { display:grid; grid-template-columns:32px 1fr 1fr 28px; gap:6px; margin-bottom:6px; padding:0 14px; }
.wlog-set-header span { font-size:10px; color:#2a4a2a; text-align:center; font-weight:600; }
.wlog-add-set { width:100%; background:none; border:1px dashed #1a3a1a44; border-radius:6px; padding:6px; color:#3a5840; font-size:12px; cursor:pointer; margin-top:4px; font-family:inherit; }
.wlog-notes-area { margin:12px 0; }
.wlog-notes-input { width:100%; background:#0d1a0d; border:1.5px solid #1a3a1a55; border-radius:8px; padding:10px 14px; color:#fff; font-size:13px; min-height:60px; resize:vertical; font-family:inherit; }
.wlog-bottom-bar { display:flex; flex-wrap:wrap; gap:6px; margin:14px 0 8px; }
.wlog-bottom-btn { flex:1; min-width:90px; background:#0d1a0d; border:1.5px solid #1a3a1a55; border-radius:8px; padding:10px 8px; color:#3a5840; font-size:12px; text-align:center; cursor:pointer; font-family:inherit; font-weight:600; }
.wlog-bottom-btn:active { border-color:#4ade8044; color:#4ade80; }
.wlog-save-btn { width:100%; background:#4ade8022; border:1.5px solid #4ade8066; border-radius:10px; padding:14px; color:#4ade80; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:6px; }
.wlog-save-btn:active { background:#4ade8044; }
/* 운동 추가 피커 모달 */
.wlog-picker-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:310; }
.wlog-picker-bg.open { display:flex; flex-direction:column; }
.wlog-picker { background:#0a140a; border-radius:20px 20px 0 0; margin-top:auto; max-height:85dvh; overflow-y:auto; padding:16px; animation:slideUp .25s ease; }
.wlog-picker-search { width:100%; background:#0d1a0d; border:1.5px solid #1a3a1a55; border-radius:10px; padding:11px 14px; font-size:14px; color:#fff; font-family:inherit; margin-bottom:10px; }
.wlog-picker-item { display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid #1a3a1a22; cursor:pointer; }
.wlog-picker-item:active { background:#4ade8011; }
.wlog-picker-name { font-size:13px; font-weight:600; }
.wlog-picker-sub { font-size:11px; color:#3a5840; }
/* 루틴 피커/저장 모달 */
.wlog-rt-modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:320; align-items:center; justify-content:center; }
.wlog-rt-modal-bg.open { display:flex; }
.wlog-rt-modal { background:#0d1a0d; border-radius:16px; padding:24px 20px; width:calc(100% - 40px); max-width:360px; }
.wlog-rt-modal-title { font-size:16px; font-weight:700; margin-bottom:14px; }
.wlog-rt-modal input[type=text] { width:100%; background:#080e08; border:1.5px solid #1a3a1a55; border-radius:8px; padding:10px 14px; color:#fff; font-size:14px; font-family:inherit; margin-bottom:12px; }
.wlog-rt-modal-btns { display:flex; gap:8px; }
.wlog-rt-modal-btns button { flex:1; padding:10px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; border:none; }
.wlog-rt-cancel { background:#1a3a1a44; color:#3a5840; }
.wlog-rt-ok { background:#4ade8022; color:#4ade80; border:1.5px solid #4ade8066 !important; }

/* ── 통계 탭 ───────────────────────────────────────────── */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
.stat-card { background:#0d1a0d; border:1px solid #1a3a1a44; border-radius:10px; padding:16px 14px; text-align:center; }
.stat-card-num { font-size:28px; font-weight:800; color:#4ade80; }
.stat-card-label { font-size:11px; color:#3a5840; margin-top:4px; }
.stat-section { margin-bottom:20px; }
.stat-section-title { font-size:13px; font-weight:700; color:#3a5840; margin-bottom:10px; letter-spacing:0.5px; }
.stat-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.stat-bar-name { font-size:12px; color:#ddd; min-width:80px; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.stat-bar-fill { height:20px; background:linear-gradient(90deg,#4ade8033,#4ade8066); border-radius:4px; min-width:2px; transition:width .3s; }
.stat-bar-cnt { font-size:11px; color:#3a5840; min-width:28px; }
.stat-trend-row { display:flex; align-items:flex-end; gap:4px; height:100px; padding:0 4px; }
.stat-trend-col { flex:1; display:flex; flex-direction:column; align-items:center; }
.stat-trend-bar { width:100%; background:#4ade8044; border-radius:4px 4px 0 0; min-height:2px; transition:height .3s; }
.stat-trend-label { font-size:9px; color:#2a4a2a; margin-top:4px; }
.stat-trend-num { font-size:10px; color:#4ade80; margin-bottom:2px; }

/* ── Anatomy Tab ─────────────────────────────────────────── */
.anatomy-view { display:flex; justify-content:center; margin-top:4px; }
.anatomy-img { width:100%; max-width:300px; border-radius:12px; display:block; }

/* ── Photo Viewer ────────────────────────────────────────── */
.mv-viewer-bg { display:none; position:fixed; inset:0; background:#000000f2; z-index:500; flex-direction:column; align-items:center; justify-content:center; padding:20px 16px calc(env(safe-area-inset-bottom)+20px); }
.mv-viewer-bg.open { display:flex; }
.mv-viewer-title { font-size:14px; font-weight:700; color:#fff; margin-bottom:14px; text-align:center; flex-shrink:0; }
.mv-viewer-imgs { display:flex; gap:10px; width:100%; max-width:440px; flex:1; min-height:0; }
.mv-photo-slot { flex:1; min-width:0; background:#111; border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
.mv-photo-slot img { width:100%; height:auto; display:block; max-height:calc(100dvh - 140px); object-fit:contain; flex:1; }
.mv-photo-label { font-size:11px; color:#555; padding:5px 6px; text-align:center; flex-shrink:0; }
.modal-close-x { position:absolute; top:14px; right:16px; background:none; border:none; color:#4ade80; font-size:22px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; padding:0; line-height:1; }

/* ── Loading / Error / Empty ─────────────────────────────── */
.loading { text-align:center; padding:40px; color:#2a4a2a; }
.empty { text-align:center; padding:40px 20px; color:#2a4a2a; font-size:14px; line-height:1.8; }
.error-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:40px 20px; text-align:center; }
.error-screen h2 { font-size:20px; font-weight:700; margin-bottom:10px; }
.error-screen p { font-size:14px; color:#555; line-height:1.6; }

/* ── Toast ───────────────────────────────────────────────── */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#111f11; color:#4ade80; border:1px solid #4ade8044; border-radius:10px; padding:10px 18px; font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .3s; z-index:9999; white-space:nowrap; }
</style>
</head>
<body>

<!-- 에러 화면 -->
<div id="errorScreen" style="display:none" class="error-screen">
  <div style="font-size:52px;margin-bottom:20px">🔒</div>
  <h2>접근할 수 없어요</h2>
  <p>유효하지 않은 링크예요.<br>트레이너에게 링크를 다시 받아보세요.</p>
</div>

<!-- 로딩 화면 -->
<div id="loadingScreen" class="error-screen">
  <h2 style="color:#3a5840">로딩 중...</h2>
</div>

<!-- 메인 콘텐츠 -->
<div id="mainContent" style="display:none">

  <!-- ── Header ─────────────────────────────────────────── -->
  <div class="header">
    <div>
      <div class="header-title">VERA<span>GYM</span></div>
      <div class="header-sub" id="headerSub">베라짐 회원</div>
      <div id="tokenDaysHdr" style="font-size:10px;color:#2a4a2a;margin-top:2px;font-weight:600"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:15px;font-weight:800" id="memberNameHdr">회원</div>
      <div style="font-size:11px;color:#3a5840;margin-top:2px" id="trainerInfoHdr"></div>
    </div>
  </div>

  <!-- ── Tab Navigation ─────────────────────────────────── -->
  <div class="tabs">
    <button class="tab-btn active" id="nav-logs"     onclick="switchTab('logs',this)">수업일지</button>
    <button class="tab-btn"        id="nav-schedule" onclick="switchTab('schedule',this)">일정</button>
    <button class="tab-btn"        id="nav-wlog"     onclick="switchTab('wlog',this);wlogInit()">운동일지</button>
    <button class="tab-btn"        id="nav-stats"    onclick="switchTab('stats',this);statsInit()">통계</button>
    <button class="tab-btn"        id="nav-exlib"    onclick="switchTab('exlib',this);lazyLoadEx()">운동DB</button>
    <button class="tab-btn"        id="nav-anatomy"  onclick="switchTab('anatomy',this)">해부도</button>
  </div>

  <!-- ── Tab: 수업일지 ───────────────────────────────────── -->
  <div id="tab-logs" class="tab-content active">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="statTotal">-</div><div class="stat-label">총 수업</div></div>
      <div class="stat-box"><div class="stat-num" id="statMonth">-</div><div class="stat-label">이번 달</div></div>
      <div class="stat-box"><div class="stat-num" id="statExTypes">-</div><div class="stat-label">운동 종류</div></div>
    </div>
    <div class="sec-header">
      <div><span class="sec-title">수업 기록</span><span class="sec-count" id="logCount"></span></div>
    </div>
    <div id="sessList"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- ── Tab: 일정 ───────────────────────────────────────── -->
  <div id="tab-schedule" class="tab-content">
    <div id="schedList"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- ── Tab: 운동일지 ─────────────────────────────────── -->
  <div id="tab-wlog" class="tab-content">
    <!-- 목록 뷰 -->
    <div id="wlogListView">
      <div class="wlog-header">
        <div><span class="sec-title">운동일지</span><span class="sec-count" id="wlogCount"></span></div>
        <button class="wlog-add-btn" onclick="wlogStartNew()">+ 작성</button>
      </div>
      <div id="wlogList"><div class="loading">불러오는 중...</div></div>
    </div>
    <!-- 작성 뷰 -->
    <div id="wlogWriteView" class="wlog-write">
      <div class="wlog-write-header">
        <span class="wlog-write-title">운동일지 작성</span>
        <button class="wlog-write-cancel" onclick="wlogCancel()">취소</button>
      </div>
      <div class="wlog-date-row">
        <input type="date" id="wlogDate" class="wlog-date-input">
      </div>
      <div class="wlog-set-header"><span></span><span>무게(kg)</span><span>횟수</span><span></span></div>
      <div id="wlogExList"></div>
      <div class="wlog-notes-area">
        <textarea id="wlogNotes" class="wlog-notes-input" placeholder="메모 (선택)" rows="2"></textarea>
      </div>
      <div class="wlog-bottom-bar">
        <button class="wlog-bottom-btn" onclick="wlogOpenExPicker()">+ 운동 추가</button>
        <button class="wlog-bottom-btn" onclick="wlogOpenRoutinePicker()">루틴 불러오기</button>
        <button class="wlog-bottom-btn" onclick="wlogSaveAsRoutine()">루틴으로 저장</button>
      </div>
      <button class="wlog-save-btn" onclick="wlogSave()">저장</button>
    </div>
  </div>

  <!-- ── Tab: 통계 ───────────────────────────────────────── -->
  <div id="tab-stats" class="tab-content">
    <div id="statsContent"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- ── Tab: 운동DB (내장) ─────────────────────────────── -->
  <div id="tab-exlib" class="tab-content">
    <!-- 서브탭 -->
    <div class="ex-sub-tabs">
      <button class="ex-sub-tab active" id="exSubBtnAll" onclick="exSwitchSub('all')">전체운동</button>
      <button class="ex-sub-tab" id="exSubBtnMine" onclick="exSwitchSub('mine')">내 운동 <span id="myExCount">0</span></button>
      <button class="ex-sub-tab" id="exSubBtnRoutine" onclick="exSwitchSub('routine')">루틴</button>
    </div>
    <!-- 전체운동 + 내 운동 (공유 검색/필터 영역) -->
    <div id="exSubExercise" class="ex-sub-content active">
      <div class="ex-search-area">
        <div class="ex-search-wrap">
          <input type="text" class="ex-search-input" id="exSearchInput"
                 placeholder="운동명 검색 (한/영)" oninput="exOnSearch()" autocomplete="off">
          <button class="ex-btn-x" id="exBtnX" onclick="exClearSearch()">✕</button>
        </div>
        <div class="ex-filter-row">
          <div class="ex-filter-label">도구</div>
          <div class="ex-chips" id="exToolChips"></div>
        </div>
        <div class="ex-filter-row">
          <div class="ex-filter-label">부위</div>
          <div class="ex-chips" id="exPartChips"></div>
        </div>
      </div>
      <div class="ex-stat-bar" id="exStatBar"></div>
      <div class="ex-list" id="exList"><div class="loading">불러오는 중...</div></div>
    </div>
    <!-- 루틴 -->
    <div id="exSubRoutine" class="ex-sub-content">
      <div id="routineList"><div class="loading">불러오는 중...</div></div>
      <button class="rt-add-btn" onclick="rtStartNew()">+ 새 루틴 만들기</button>
    </div>
  </div>

  <!-- ── Tab: 해부도 ─────────────────────────────────────── -->
  <div id="tab-anatomy" class="tab-content">
    <div class="sec-header"><span class="sec-title">해부도</span></div>
    <div class="ex-filter-row">
      <div class="ex-filter-label">종류</div>
      <div class="ex-chips">
        <button class="ex-chip active" id="btnTypeMuscle" onclick="setAnatomyType('muscle')">근육</button>
        <button class="ex-chip" id="btnTypeBone" onclick="setAnatomyType('bone')">뼈</button>
      </div>
    </div>
    <div id="anatomyMuscleViews" class="ex-filter-row">
      <div class="ex-filter-label">방향</div>
      <div class="ex-chips">
        <button class="ex-chip active" id="btnMuscleFront" onclick="showAnatomyImg('muscle-front')">정면</button>
        <button class="ex-chip" id="btnMuscleBack" onclick="showAnatomyImg('muscle-back')">후면</button>
      </div>
    </div>
    <div id="anatomyBoneViews" class="ex-filter-row" style="display:none">
      <div class="ex-filter-label">방향</div>
      <div class="ex-chips">
        <button class="ex-chip active" id="btnBoneFront" onclick="showAnatomyImg('bone-front')">정면</button>
        <button class="ex-chip" id="btnBoneSide" onclick="showAnatomyImg('bone-side')">측면</button>
      </div>
    </div>
    <div class="anatomy-view">
      <img id="anatomyImg" src="./images/anatomy/muscle-front.png" class="anatomy-img" alt="근육 정면 해부도">
    </div>
  </div>

  </div>

</div><!-- /mainContent -->

<!-- 사진 뷰어 -->
<div id="memberPhotoViewer" class="mv-viewer-bg" onclick="if(event.target===this)closeMemberPhotoViewer()">
  <button class="modal-close-x" onclick="closeMemberPhotoViewer()">✕</button>
  <div class="mv-viewer-title" id="memberViewerTitle">자세 사진</div>
  <div class="mv-viewer-imgs" id="memberViewerImgs"></div>
</div>

<!-- 운동 추가 피커 모달 -->
<div id="wlogPickerBg" class="wlog-picker-bg" onclick="if(event.target===this)wlogCloseExPicker()">
  <div class="wlog-picker">
    <input type="text" class="wlog-picker-search" id="wlogPickerSearch"
           placeholder="운동명 검색" oninput="wlogRenderPicker()" autocomplete="off">
    <div id="wlogPickerList"></div>
  </div>
</div>

<!-- 루틴 피커 모달 -->
<div id="wlogRtPickerBg" class="wlog-rt-modal-bg" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="wlog-rt-modal">
    <div class="wlog-rt-modal-title">루틴 불러오기</div>
    <div id="wlogRtPickerList" style="max-height:300px;overflow-y:auto;margin-bottom:12px"></div>
    <button class="wlog-rt-cancel" onclick="document.getElementById('wlogRtPickerBg').classList.remove('open')" style="width:100%;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;border:none;background:#1a3a1a44;color:#3a5840">닫기</button>
  </div>
</div>

<!-- 루틴 저장 모달 -->
<div id="wlogRtSaveBg" class="wlog-rt-modal-bg" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="wlog-rt-modal">
    <div class="wlog-rt-modal-title">루틴으로 저장</div>
    <input type="text" id="wlogRtSaveName" placeholder="루틴 이름" maxlength="30">
    <div style="font-size:12px;color:#3a5840;margin-bottom:14px" id="wlogRtSaveInfo"></div>
    <div class="wlog-rt-modal-btns">
      <button class="wlog-rt-cancel" onclick="document.getElementById('wlogRtSaveBg').classList.remove('open')">취소</button>
      <button class="wlog-rt-ok" onclick="wlogDoSaveRoutine()">저장</button>
    </div>
  </div>
</div>

<!-- 운동 상세 모달 -->
<div id="exModalBg" class="ex-modal-bg" onclick="if(event.target===this)exCloseModal()">
  <div class="ex-modal">
    <button class="ex-modal-close" onclick="exCloseModal()">✕</button>
    <div id="exModalBody"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
init_db();

(function() {
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', function() { history.pushState(null, '', location.href); });
})();

let _memberToken = null;
let _logsData    = [];

// ── 탭 전환 ──────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── 해부도 토글 ──────────────────────────────────────────────
let _anatomyType = 'muscle';

function setAnatomyType(type) {
  _anatomyType = type;
  const isMuscle = type === 'muscle';
  document.getElementById('anatomyMuscleViews').style.display = isMuscle ? '' : 'none';
  document.getElementById('anatomyBoneViews').style.display   = isMuscle ? 'none' : '';
  document.getElementById('btnTypeMuscle').classList.toggle('active', isMuscle);
  document.getElementById('btnTypeBone').classList.toggle('active', !isMuscle);
  if (isMuscle) {
    document.getElementById('btnMuscleFront').classList.add('active');
    document.getElementById('btnMuscleBack').classList.remove('active');
    showAnatomyImg('muscle-front');
  } else {
    document.getElementById('btnBoneFront').classList.add('active');
    document.getElementById('btnBoneSide').classList.remove('active');
    showAnatomyImg('bone-front');
  }
}

function showAnatomyImg(view) {
  const srcs = {
    'muscle-front': './images/anatomy/muscle-front.png',
    'muscle-back':  './images/anatomy/muscle-back.png',
    'bone-front':   './images/anatomy/skeleton-front.png',
    'bone-side':    './images/anatomy/skeleton-side.png',
  };
  document.getElementById('anatomyImg').src = srcs[view];
  if (_anatomyType === 'muscle') {
    document.getElementById('btnMuscleFront').classList.toggle('active', view === 'muscle-front');
    document.getElementById('btnMuscleBack').classList.toggle('active', view === 'muscle-back');
  } else {
    document.getElementById('btnBoneFront').classList.toggle('active', view === 'bone-front');
    document.getElementById('btnBoneSide').classList.toggle('active', view === 'bone-side');
  }
}

// ── 초기화 ───────────────────────────────────────────────────
async function init() {
  const _params = new URLSearchParams(location.search);
  let token = _params.get('token') || _params.get('t');
  if (token) localStorage.setItem('vg_member_token', token);
  else token = localStorage.getItem('vg_member_token');
  if (!token) { showError(); return; }
  _memberToken = token;

  const { data, error } = await db.rpc('member_get_by_token', { p_token: token });
  if (error || !data || !data.length) { showError(); return; }

  const info = data[0];
  document.getElementById('headerSub').textContent      = `베라짐 ${info.gym_location}`;
  document.getElementById('memberNameHdr').textContent  = info.member_name.replace(/\d+$/, '') + '님';
  document.getElementById('trainerInfoHdr').textContent = info.trainer_name ? `담당 트레이너 · ${info.trainer_name}` : '';

  // 토큰 남은 일수 표시
  const daysEl = document.getElementById('tokenDaysHdr');
  if (info.token_expires_at) {
    const days = Math.ceil((new Date(info.token_expires_at) - Date.now()) / 86400000);
    if (days > 0) {
      daysEl.textContent = `URL ${days}일 남음`;
    } else {
      daysEl.textContent = 'URL 만료됨';
      daysEl.style.color = '#f87171';
    }
  }

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display   = 'block';

  loadLogs(token);
  loadSchedules(token);
}

// ── 수업 기록 로드 ───────────────────────────────────────────
async function loadLogs(token) {
  const { data: logs, error } = await db.rpc('member_get_logs', { p_token: token });
  if (error || !logs) {
    document.getElementById('sessList').innerHTML = `<div class="empty">⚠️<br>수업 기록을 불러오지 못했어요</div>`;
    return;
  }
  const thisMonth = new Date().toISOString().slice(0, 7);
  const monthLogs = logs.filter(s => s.session_date?.startsWith(thisMonth)).length;
  const allExNames = new Set();
  logs.forEach(s => (s.ex_details || []).forEach(e => e.name && allExNames.add(e.name)));
  document.getElementById('statTotal').textContent   = logs.length;
  document.getElementById('statMonth').textContent   = monthLogs;
  document.getElementById('statExTypes').textContent = allExNames.size;
  document.getElementById('logCount').textContent    = logs.length ? `${logs.length}건` : '';
  _logsData = logs;
  const wrap = document.getElementById('sessList');
  if (!logs.length) { wrap.innerHTML = `<div class="empty">아직 수업 기록이 없어요</div>`; return; }
  wrap.innerHTML = logs.map((s, i) => {
    const exCount   = s.ex_count || (s.ex_details?.length) || 0;
    const dateStr   = fmtDate(s.session_date);
    const exPreview = (s.ex_details || []).slice(0, 3).map(e => e.name).filter(Boolean).join(', ');
    return `
      <div class="sess-card">
        <div class="sess-head" onclick="toggleSess(${i}, '${s.log_id}')">
          <div>
            <div class="sess-num-badge">#${logs.length - i}</div>
            <div class="sess-date">${dateStr}</div>
            <div class="sess-sub">운동 ${exCount}종목${exPreview ? ' · ' + exPreview : ''}</div>
          </div>
          <div class="chevron" id="chev${i}">›</div>
        </div>
        <div class="sess-body" id="sessBody${i}">
          ${s.notes ? `<div style="padding:14px 18px 0"><div class="sess-notes"><div class="sess-notes-label">트레이너 총평</div>${esc(s.notes)}</div></div>` : ''}
          ${s.note_photo_path ? `
          <div style="padding:8px 18px 0">
            <div id="notePhotoInline${i}" style="display:none;margin-bottom:8px;position:relative;background:#0d1a0d;border-radius:10px;overflow:hidden;border:1px solid #1a3a1a44;">
              <div style="padding:8px;text-align:center;">
                <img id="notePhotoInlineImg${i}" src="" alt="PT 노트" style="max-width:100%;max-height:55dvh;object-fit:contain;display:block;margin:0 auto;border-radius:6px;">
              </div>
              <button onclick="closeNotePhotoInline(${i})" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border:none;color:#4ade80;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">✕</button>
            </div>
            <button class="mv-photo-btn" id="notePhotoBtn${i}" onclick="toggleNotePhotoInline(${i}, '${s.note_photo_path}')">PT 노트 사진 보기</button>
          </div>` : ''}
          <div id="sessDetail${i}"></div>
        </div>
      </div>`;
  }).join('');
}

async function toggleSess(i, logId) {
  const body   = document.getElementById(`sessBody${i}`);
  const chev   = document.getElementById(`chev${i}`);
  const isOpen = body.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
  if (!isOpen) return;
  const detailEl = document.getElementById(`sessDetail${i}`);
  if (detailEl.dataset.loaded) return;
  detailEl.innerHTML = '<div class="loading" style="padding:16px">불러오는 중...</div>';
  const [{ data: exs, error }, { data: photos }] = await Promise.all([
    db.rpc('member_get_log_detail', { p_token: _memberToken, p_log_id: logId }),
    db.rpc('member_get_log_photos',  { p_token: _memberToken, p_log_id: logId }),
  ]);
  detailEl.dataset.loaded = '1';
  if (error || !exs || !exs.length) {
    detailEl.innerHTML = '<div style="padding:10px 18px 14px;color:#2a4a2a;font-size:13px">운동 기록이 없어요</div>';
    return;
  }
  const photoMap = {};
  (photos || []).forEach(p => { photoMap[p.order_idx ?? 0] = p; });
  detailEl.innerHTML = exs
    .sort((a, b) => (a.order_index ?? 0) - (b.order_index ?? 0))
    .map(ex => {
      const name     = ex.name_ko || ex.custom_name || '운동';
      const category = [ex.part_unified, ex.tool_unified].filter(Boolean).join(' · ');
      const sets     = Array.isArray(ex.sets_data) ? ex.sets_data : [];
      const photo    = photoMap[ex.order_index ?? 0];
      const setsHtml = sets.length ? `
        <table class="sets-table">
          <tr><th>세트</th><th>무게(kg)</th><th>횟수</th></tr>

      const photoBtn = (photo?.start_path || photo?.end_path) ? `

async function loadSchedules(token) {
  const { data: scheds, error } = await db.rpc('member_get_schedules', { p_token: token });
  const wrap = document.getElementById('schedList');
  if (error || !scheds) { wrap.innerHTML = `<div class="empty">⚠️<br>일정을 불러오지 못했어요</div>`; return; }
  if (!scheds.length) { wrap.innerHTML = `<div class="empty">등록된 PT 일정이 없어요</div>`; return; }
  // status 기준으로 분류 (날짜 기준 X — 트레이너 완료/노쇼 처리 즉시 반영)
  const upcoming = scheds.filter(s => s.status === 'scheduled');
  const past     = scheds.filter(s => s.status !== 'scheduled'); // completed, noshow
  const WDAYS    = ['일','월','화','수','목','금','토'];
  const STATUS_LABEL = { scheduled:'예정', completed:'완료', noshow:'노쇼' };
  const STATUS_CLS   = { scheduled:'upcoming', completed:'done', noshow:'done' };
  function renderCard(s) {
    const d = new Date(s.sched_date + 'T00:00:00');
    const sTime = (s.start_time||'').slice(0,5);
    const eTime = (s.end_time||'').slice(0,5);
    const typeCls = s.type === 'SPT' ? 'sched-type-SPT' : 'sched-type-PT';
    const badgeLabel = STATUS_LABEL[s.status] || s.status;
    const badgeCls   = STATUS_CLS[s.status]   || 'done';
    return `<div class="sched-card">
      <div class="sched-date-block">
        <div class="sched-month">${d.getMonth()+1}월</div>
        <div class="sched-day">${d.getDate()}</div>
        <div class="sched-weekday">${WDAYS[d.getDay()]}요일</div>
      </div>
      <div class="sched-info">
        <div><span class="sched-type-badge ${typeCls}">${s.type}</span></div>
        <div class="sched-time">${sTime}${eTime?' – '+eTime:''}</div>
        ${s.trainer_name?`<div class="sched-trainer">트레이너 · ${s.trainer_name}</div>`:''}
        ${s.title?`<div style="font-size:12px;color:#3a5840;margin-top:3px">${s.title}</div>`:''}
      </div>
      <div class="sched-status ${badgeCls}">${badgeLabel}</div>
    </div>`;
  }
  let html = '';
  if (upcoming.length) { html += `<div class="divider-label">예정된 일정</div>` + [...upcoming].reverse().map(renderCard).join(''); }
  if (past.length)     { html += `<div class="divider-label" style="margin-top:${upcoming.length?20:0}px">지난 일정</div>` + past.map(renderCard).join(''); }
  wrap.innerHTML = html;
}

const EX_CACHE_KEY = 'vg_exdb_cache_v2';
const EX_CACHE_TTL = 5 * 60 * 1000;
const EX_TOOLS = ['전체','핀 머신','플레이트 머신','스미스머신','바벨','덤벨','케이블','케틀벨','소도구','밴드','체중','머신'];
const EX_PARTS = ['전체','가슴','등','어깨','팔','코어','하체','전신'];

let _exAll        = [];
let _exFilterTool = '';
let _exFilterPart = '';
let _exShowCount  = 50;
let _exSearchTm   = null;
let _exLoaded     = false;
let _exSubView    = 'all';   // 'all' | 'mine' | 'routine'
let _myExIds      = new Set();
let _myExFavIds   = new Set();
let _myExLoaded   = false;

async function lazyLoadEx() {
  if (_exLoaded) return;
  _exLoaded = true;
  await Promise.all([_loadAllExercises(), _loadMyExercises()]);

}

function exSwitchSub(view) {
  _exSubView = view;
  document.getElementById('exSubBtnAll').classList.toggle('active', view==='all');
  document.getElementById('exSubBtnMine').classList.toggle('active', view==='mine');

// ── 내 운동 데이터 로드 ──────────────────────────────────────
async function _loadMyExercises() {
  if (!_memberToken) return;
  const { data, error } = await db.rpc('member_get_my_exercises', { p_token: _memberToken });
  if (error || !data) return;
  _myExIds = new Set(data.map(e => e.exercise_ref_id));
  _myExFavIds = new Set(data.filter(e => e.is_favorite).map(e => e.exercise_ref_id));
  _myExLoaded = true;
  const countEl = document.getElementById('myExCount');
  if (countEl) countEl.textContent = _myExIds.size;
}

async function exToggleMy(exId, ev) {
  ev.stopPropagation();
  if (!_memberToken) return;
  const { data } = await db.rpc('member_toggle_my_exercise', { p_token: _memberToken, p_exercise_ref_id: exId });
  if (data === 'added') _myExIds.add(exId);
  else if (data === 'removed') { _myExIds.delete(exId); _myExFavIds.delete(exId); }
  document.getElementById('myExCount').textContent = _myExIds.size;
  exRenderList();
}

async function exToggleFav(exId, ev) {
  ev.stopPropagation();
  if (!_memberToken) return;
  const { data } = await db.rpc('member_toggle_exercise_favorite', { p_token: _memberToken, p_exercise_ref_id: exId });
  if (data) _myExFavIds.add(exId); else _myExFavIds.delete(exId);
  exRenderList();
}

async function _loadAllExercises() {
  try {
    const raw = sessionStorage.getItem(EX_CACHE_KEY);
    if (raw) {
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts < EX_CACHE_TTL && data.length > 0) { _exAll = data; return; }
    }
  } catch (_) {}
  const PAGE = 1000;
  let all = [], page = 0;
  while (true) {
    const { data, error } = await db
      .from('exercise_refs')
      .select('id,name_ko,name_en,part_unified,tool_unified,image_url,muscles_detail')
      .eq('is_active', true)
      .order('name_ko', { ascending: true })
      .range(page * PAGE, (page + 1) * PAGE - 1);
    if (error || !data || data.length === 0) break;
    all.push(...data);
    if (data.length < PAGE) break;
    page++;
  }
  _exAll = all;
  try { sessionStorage.setItem(EX_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: all })); } catch (_) {}
}

function exBuildFilters() {
  const makeChips = (elId, arr, curSel, fn) => {
    document.getElementById(elId).innerHTML = arr.map(v => {
      const active = (curSel === v) || (!curSel && v === '전체');
      return `<button class="ex-chip${active?' active':''}" onclick="${fn}('${v}')">${v}</button>`;
    }).join('');
  };
  makeChips('exToolChips', EX_TOOLS, _exFilterTool || '전체', 'exSetTool');
  makeChips('exPartChips', EX_PARTS, _exFilterPart || '전체', 'exSetPart');
}

function exSetTool(v) { _exFilterTool = (v==='전체') ? '' : v; exBuildFilters(); _exShowCount=50; exRenderList(); }
function exSetPart(v) { _exFilterPart = (v==='전체') ? '' : v; exBuildFilters(); _exShowCount=50; exRenderList(); }

function exOnSearch() {
  const val = document.getElementById('exSearchInput').value;
  document.getElementById('exBtnX').style.display = val ? '' : 'none';
  clearTimeout(_exSearchTm);
  _exSearchTm = setTimeout(() => { _exShowCount=50; exRenderList(); }, 150);
}
function exClearSearch() {
  document.getElementById('exSearchInput').value = '';
  document.getElementById('exBtnX').style.display = 'none';
  _exShowCount=50; exRenderList();
}

function exRenderList() {
  const wrap = document.getElementById('exList');
  const q    = document.getElementById('exSearchInput').value.trim().toLowerCase();
  let list   = _exAll;
  // 내 운동 서브탭이면 내 목록만 표시
  if (_exSubView === 'mine') list = list.filter(e => _myExIds.has(e.id));
  if (_exFilterTool) list = list.filter(e => e.tool_unified === _exFilterTool);
  if (_exFilterPart) list = list.filter(e => e.part_unified === _exFilterPart);
  if (q) list = list.filter(e =>
    (e.name_ko||'').toLowerCase().includes(q) ||
    (e.name_en||'').toLowerCase().includes(q)
  );
  // 내 운동: 즐겨찾기 우선 정렬
  if (_exSubView === 'mine') {
    list = [...list].sort((a,b) => {
      const aF = _myExFavIds.has(a.id) ? 0 : 1;
      const bF = _myExFavIds.has(b.id) ? 0 : 1;
      return aF - bF || (a.name_ko||'').localeCompare(b.name_ko||'');
    });
  }
  const base = _exSubView === 'mine' ? _myExIds.size : _exAll.length;
  document.getElementById('exStatBar').innerHTML =
    `<span>${list.length}</span>${list.length===base ? '개 운동' : `개 / 전체 ${base}개`}`;
  if (!list.length) {
    wrap.innerHTML = _exSubView === 'mine'
      ? `<div class="empty">내 운동이 없어요<br><span style="font-size:12px;color:#2a4a2a">전체운동에서 + 버튼으로 추가해보세요</span></div>`
      : `<div class="empty">해당하는 운동이 없어요</div>`;
    return;
  }
  const items = list.slice(0, _exShowCount);
  wrap.innerHTML = items.map(ex => {
    const thumb = ex.image_url
      ? `<div class="ex-thumb"><img src="${ex.image_url}" loading="lazy" onerror="this.parentElement.textContent=''"></div>`
      : `<div class="ex-thumb"></div>`;
    const isMine = _myExIds.has(ex.id);
    const isFav = _myExFavIds.has(ex.id);
    // 전체운동: +/✓ 버튼, 내 운동: ★ 버튼
    let actionBtn = '';
    if (_exSubView === 'all') {
      actionBtn = `<button class="ex-card-add${isMine?' added':''}" onclick="exToggleMy('${ex.id}',event)">${isMine?'✓':'+'}</button>`;
    } else if (_exSubView === 'mine') {
      actionBtn = `<button class="ex-card-add" onclick="exToggleFav('${ex.id}',event)" style="color:${isFav?'#fbbf24':'#3a5840'};border-color:${isFav?'#fbbf2444':'#1a3a1a55'}">${isFav?'★':'☆'}</button>`;
    }
    return `
      <div class="ex-card" onclick="exOpenDetail('${ex.id}')">
        <div class="ex-card-row">
          ${thumb}
          <div class="ex-info">
            <div class="ex-name">${esc(ex.name_ko || ex.name_en)}</div>
            ${(ex.name_en && ex.name_en !== ex.name_ko) ? `<div class="ex-en-name">${esc(ex.name_en)}</div>` : ''}
            <div class="ex-tags">
              ${ex.tool_unified ? `<span class="ex-tag-tool">${esc(ex.tool_unified)}</span>` : ''}
              ${ex.part_unified ? `<span class="ex-tag-part">${esc(ex.part_unified)}</span>` : ''}
            </div>
          </div>
          ${actionBtn}
        </div>
      </div>`;
  }).join('') +
  (list.length > _exShowCount
    ? `<button class="ex-btn-more" onclick="exLoadMore()">더 보기 (${list.length-_exShowCount}개 남음)</button>`
    : '');
}

function exLoadMore() { _exShowCount += 50; exRenderList(); }

function exOpenDetail(id) {
  const ex = _exAll.find(e => String(e.id) === String(id));
  if (!ex) return;
  const imgHtml = ex.image_url
    ? `<img class="ex-modal-img" src="${ex.image_url}" onerror="this.style.display='none'">`
    : `<div class="ex-modal-no-img">🏋️</div>`;
  const muscles = (ex.muscles_detail || '').split('.').map(s => s.trim()).filter(Boolean);
  const muscleHtml = muscles.length
    ? `<div class="ex-modal-sec-title">주요 근육</div>
       <div class="ex-modal-muscles">${muscles.map(m => `<span class="ex-modal-muscle-chip">${m}</span>`).join('')}</div>`
    : '';
  document.getElementById('exModalBody').innerHTML = `
    ${imgHtml}
    <div class="ex-modal-name">${ex.name_ko || ex.name_en}</div>
    ${(ex.name_en && ex.name_en !== ex.name_ko) ? `<div class="ex-modal-en">${ex.name_en}</div>` : ''}
    <div class="ex-modal-tags">
      ${ex.tool_unified ? `<span class="ex-modal-tag-tool">${ex.tool_unified}</span>` : ''}
      ${ex.part_unified ? `<span class="ex-modal-tag-part">${ex.part_unified}</span>` : ''}
    </div>
    ${muscleHtml}`;
  document.getElementById('exModalBg').classList.add('open');
}

  document.getElementById('wlogExList').innerHTML = '';
  document.getElementById('wlogListView').style.display = 'none';
  document.getElementById('wlogWriteView').classList.add('open');
  // 운동DB 데이터 미리 로드
  if (!_exLoaded) { _exLoaded = true; _loadAllExercises().then(() => _loadMyExercises()); }
}

function wlogCancel() {
  if (_wlogExs.length && !confirm('작성을 취소할까요? 내용이 사라져요.')) return;
  document.getElementById('wlogWriteView').classList.remove('open');
  document.getElementById('wlogListView').style.display = '';
}

function wlogRenderExList() {
  const wrap = document.getElementById('wlogExList');
  if (!_wlogExs.length) {
    wrap.innerHTML = '<div class="empty" style="padding:20px 0">운동을 추가해주세요</div>';
    return;
  }
  wrap.innerHTML = _wlogExs.map((ex, i) => {
    const setsHtml = ex.sets.map((s, si) => `
      <div class="wlog-set-row">
        <span class="wlog-set-num">${s.set}</span>
        <input type="number" class="wlog-set-input" value="${s.weight||''}" placeholder="0"
               step="0.5" min="0" onchange="wlogUpdSet(${i},${si},'weight',this.value)">
        <input type="number" class="wlog-set-input" value="${s.reps||''}" placeholder="0"
               min="0" onchange="wlogUpdSet(${i},${si},'reps',this.value)">
        <button class="wlog-set-del" onclick="wlogDelSet(${i},${si})">✕</button>
      </div>`).join('');
    return `
      <div class="wlog-ex-card">
        <div class="wlog-ex-head">
          <span class="wlog-ex-name">${i+1}. ${esc(ex.name)}</span>
          <button class="wlog-ex-del" onclick="wlogDelEx(${i})">✕</button>
        </div>
        <div class="wlog-sets">${setsHtml}
          <button class="wlog-add-set" onclick="wlogAddSet(${i})">+ 세트 추가</button>
        </div>
      </div>`;
  }).join('');
}

function wlogAddEx(refId, name, part, tool, weightMode) {
  _wlogExs.push({
    refId, name, part, tool,
    weight_mode: weightMode || 'total',
    sets: [{ set: 1, weight: 0, reps: 10 }]
  });
  wlogRenderExList();
}

function wlogDelEx(idx) {
  _wlogExs.splice(idx, 1);
  wlogRenderExList();
}

function wlogAddSet(idx) {
  const ex = _wlogExs[idx];
  const last = ex.sets[ex.sets.length - 1] || { weight: 0, reps: 10 };
  ex.sets.push({ set: ex.sets.length + 1, weight: last.weight, reps: last.reps });
  wlogRenderExList();
}

function wlogDelSet(idx, si) {
  const ex = _wlogExs[idx];
  if (ex.sets.length <= 1) return;
  ex.sets.splice(si, 1);
  ex.sets.forEach((s, i) => s.set = i + 1);
  wlogRenderExList();
}

function wlogUpdSet(idx, si, field, val) {
  const ex = _wlogExs[idx];
  if (field === 'weight') ex.sets[si].weight = parseFloat(val) || 0;
  else if (field === 'reps') ex.sets[si].reps = parseInt(val) || 0;
}

// ── 운동 추가 피커 ────────────────────────────────────────────
function wlogOpenExPicker() {
  document.getElementById('wlogPickerSearch').value = '';
  wlogRenderPicker();
  document.getElementById('wlogPickerBg').classList.add('open');
}
function wlogCloseExPicker() {
  document.getElementById('wlogPickerBg').classList.remove('open');
}
function wlogRenderPicker() {
  const q = (document.getElementById('wlogPickerSearch').value || '').trim().toLowerCase();
  let list = _exAll.length ? _exAll : [];
  if (q) list = list.filter(e =>
    (e.name_ko||'').toLowerCase().includes(q) || (e.name_en||'').toLowerCase().includes(q)
  );
  // 내 운동 우선
  list = [...list].sort((a,b) => {
    const aM = _myExIds.has(a.id) ? 0 : 1;
    const bM = _myExIds.has(b.id) ? 0 : 1;
    return aM - bM || (a.name_ko||'').localeCompare(b.name_ko||'');
  });
  const show = list.slice(0, 80);
  document.getElementById('wlogPickerList').innerHTML = show.length
    ? show.map(e => `
      <div class="wlog-picker-item" onclick="wlogPickEx('${e.id}')">
        <div>
          <div class="wlog-picker-name">${_myExIds.has(e.id)?'★ ':''}${esc(e.name_ko||e.name_en)}</div>
          <div class="wlog-picker-sub">${e.tool_unified||''} · ${e.part_unified||''}</div>
        </div>
      </div>`).join('')
    : '<div class="empty" style="padding:20px">운동을 찾을 수 없어요</div>';
}
function wlogPickEx(refId) {
  const ex = _exAll.find(e => e.id === refId);
  if (!ex) return;
  wlogAddEx(refId, ex.name_ko || ex.name_en, ex.part_unified, ex.tool_unified);
  wlogCloseExPicker();
  // 자동 스크롤
  setTimeout(() => {
    const list = document.getElementById('wlogExList');
    list.lastElementChild?.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 100);
}

// ── 루틴 불러오기 ─────────────────────────────────────────────
async function wlogOpenRoutinePicker() {
  const wrap = document.getElementById('wlogRtPickerList');
  wrap.innerHTML = '<div class="loading">불러오는 중...</div>';
  document.getElementById('wlogRtPickerBg').classList.add('open');
  const { data } = await db.rpc('member_get_routines', { p_token: _memberToken });
  if (!data || !data.length) {
    wrap.innerHTML = '<div class="empty" style="padding:16px">저장된 루틴이 없어요</div>';
    return;
  }
  wrap.innerHTML = data.map(r => `
    <div class="wlog-picker-item" onclick="wlogLoadRoutine('${r.id}')">
      <div>
        <div class="wlog-picker-name">${esc(r.name)}</div>
        <div class="wlog-picker-sub">${r.exercise_count}종목</div>
      </div>
    </div>`).join('');
}

async function wlogLoadRoutine(routineId) {
  document.getElementById('wlogRtPickerBg').classList.remove('open');
  const { data } = await db.rpc('member_get_routine_detail', { p_token: _memberToken, p_routine_id: routineId });
  if (!data || !data.length) { if (window.showToast) showToast('루틴이 비어있어요'); return; }
  if (_wlogExs.length && !confirm('현재 운동 목록을 교체할까요?\n(취소 시 뒤에 추가됩니다)')) {
    // 뒤에 추가
    data.forEach(e => wlogAddEx(e.exercise_ref_id, e.name_ko, e.part, e.tool, e.weight_mode));
  } else {
    _wlogExs = data.map(e => ({
      refId: e.exercise_ref_id, name: e.name_ko, part: e.part, tool: e.tool,
      weight_mode: e.weight_mode || 'total',
      sets: [{ set: 1, weight: 0, reps: 10 }]
    }));
  }
  wlogRenderExList();
  if (window.showToast) showToast('루틴을 불러왔어요');
}

// ── 루틴으로 저장 ─────────────────────────────────────────────
function wlogSaveAsRoutine() {
  if (!_wlogExs.length) { if (window.showToast) showToast('운동을 먼저 추가해주세요'); return; }
  document.getElementById('wlogRtSaveName').value = '';
  document.getElementById('wlogRtSaveInfo').textContent = `운동 ${_wlogExs.length}개가 포함됩니다`;
  document.getElementById('wlogRtSaveBg').classList.add('open');
}

async function wlogDoSaveRoutine() {
  const name = document.getElementById('wlogRtSaveName').value.trim();
  if (!name) { if (window.showToast) showToast('루틴 이름을 입력해주세요'); return; }
  const exercises = _wlogExs.map((ex, i) => ({
    exercise_ref_id: ex.refId || '',
    name_ko: ex.name,
    part: ex.part || '',
    tool: ex.tool || '',
    order_index: i,
    weight_mode: ex.weight_mode || 'total'
  }));
  const { data } = await db.rpc('member_save_routine', {
    p_token: _memberToken, p_name: name, p_exercises: exercises
  });
  document.getElementById('wlogRtSaveBg').classList.remove('open');
  if (data) {
    if (window.showToast) showToast(`루틴 "${name}" 저장 완료`);
    _rtLoaded = false; // 루틴 목록 갱신 필요
  }
}

// ── 저장 ──────────────────────────────────────────────────────
async function wlogSave() {
  const date = document.getElementById('wlogDate').value;
  if (!date) { if (window.showToast) showToast('날짜를 선택해주세요'); return; }
  if (!_wlogExs.length) { if (window.showToast) showToast('운동을 추가해주세요'); return; }
  // 입력값 동기화
  document.querySelectorAll('#wlogExList .wlog-set-input').forEach(inp => {
    inp.dispatchEvent(new Event('change'));
  });
  const notes = document.getElementById('wlogNotes').value.trim() || null;
  const exercises = _wlogExs.map((ex, i) => ({
    exercise_ref_id: ex.refId || '',
    custom_name: ex.name,
    sets_data: ex.sets,
    order_index: i,
    weight_mode: ex.weight_mode || 'total'
  }));
  const { data, error } = await db.rpc('member_save_workout_log', {
    p_token: _memberToken,
    p_log_date: date,
    p_notes: notes,
    p_exercises: exercises
  });
  if (error || !data) {
    if (window.showToast) showToast('저장에 실패했어요');
    console.error('wlogSave error:', error);
    return;
  }
  if (window.showToast) showToast('운동일지 저장 완료!');
  // 목록 뷰로 복귀
  document.getElementById('wlogWriteView').classList.remove('open');
  document.getElementById('wlogListView').style.display = '';
  _wlogLoaded = false;
  await wlogLoadList();
}

// ── 통계 탭 ──────────────────────────────────────────────────
let _statsLoaded = false;

async function statsInit() {
  if (_statsLoaded) return;
  _statsLoaded = true;
  await statsLoad();
}

async function statsLoad() {
  const wrap = document.getElementById('statsContent');
  if (!_memberToken) { wrap.innerHTML = '<div class="empty">로그인이 필요합니다</div>'; return; }
  wrap.innerHTML = '<div class="loading">불러오는 중...</div>';
  const { data, error } = await db.rpc('member_get_stats', { p_token: _memberToken });
  if (error || !data) { wrap.innerHTML = '<div class="empty">통계를 불러올 수 없어요</div>'; return; }
  statsRender(data);
}

function statsRender(s) {
  const wrap = document.getElementById('statsContent');
  // 요약 카드
  let html = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-card-num">${s.total_logs||0}</div><div class="stat-card-label">총 운동일지</div></div>
      <div class="stat-card"><div class="stat-card-num">${s.total_exercises||0}</div><div class="stat-card-label">운동 종류</div></div>
      <div class="stat-card"><div class="stat-card-num">${s.logs_this_month||0}</div><div class="stat-card-label">이번 달</div></div>
      <div class="stat-card"><div class="stat-card-num">${s.recent_30d_count||0}</div><div class="stat-card-label">최근 30일</div></div>
    </div>`;

  // 많이 한 운동 TOP 5
  const top = s.top_exercises || [];
  if (top.length) {
    const maxCnt = Math.max(...top.map(t => t.cnt), 1);
    html += `<div class="stat-section">
      <div class="stat-section-title">많이 한 운동 TOP ${top.length}</div>
      ${top.map(t => `
        <div class="stat-bar-row">
          <span class="stat-bar-name">${esc(t.name)}</span>
          <div style="flex:1"><div class="stat-bar-fill" style="width:${Math.round(t.cnt/maxCnt*100)}%"></div></div>
          <span class="stat-bar-cnt">${t.cnt}회</span>
        </div>`).join('')}
    </div>`;
  }

  // 월별 추이
  const trend = s.monthly_trend || [];
  if (trend.length) {
    const maxM = Math.max(...trend.map(t => t.cnt), 1);
    html += `<div class="stat-section">
      <div class="stat-section-title">월별 운동 횟수</div>
      <div class="stat-trend-row">
        ${trend.map(t => {
          const h = Math.max(Math.round(t.cnt / maxM * 80), 2);
          const label = t.month.slice(5); // "MM"
          return `<div class="stat-trend-col">
            <div class="stat-trend-num">${t.cnt}</div>
            <div class="stat-trend-bar" style="height:${h}px"></div>
            <div class="stat-trend-label">${label}월</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // 일지가 없으면 안내
  if (!s.total_logs) {
    html += '<div class="empty" style="margin-top:20px">운동일지를 작성하면 통계가 나타나요</div>';
  }

  // 새로고침 버튼
  html += `<button onclick="_statsLoaded=false;statsInit()" style="display:block;margin:16px auto;background:none;border:1px solid #1a3a1a44;border-radius:8px;padding:8px 20px;color:#3a5840;font-size:12px;cursor:pointer;font-family:inherit">통계 새로고침</button>`;

  wrap.innerHTML = html;
}

// ── 사진 뷰어 ────────────────────────────────────────────────
async function viewMemberPhotos(startPath, endPath, exName) {
  const viewer = document.getElementById('memberPhotoViewer');
  const imgs   = document.getElementById('memberViewerImgs');
  document.getElementById('memberViewerTitle').textContent = exName + ' — 자세 사진';
  imgs.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#555;font-size:13px">불러오는 중...</div>';
  viewer.classList.add('open');
  const labels = ['시작 자세', '끝 자세'];
  const slots = await Promise.all([startPath, endPath].map(async (path, i) => {
    if (!path) return `<div class="mv-photo-slot"><div style="flex:1;display:flex;align-items:center;justify-content:center;color:#444;font-size:12px">미촬영</div><div class="mv-photo-label">${labels[i]}</div></div>`;
    const { data, error } = await db.storage.from('session-photos').createSignedUrl(path, 3600);
    if (error) { console.error('Failed to create signed URL:', error); }
    const url = data?.signedUrl;
    if (!url) return `<div class="mv-photo-slot"><div style="flex:1;display:flex;align-items:center;justify-content:center;color:#f87171;font-size:12px">로드 실패</div><div class="mv-photo-label">${labels[i]}</div></div>`;
    return `<div class="mv-photo-slot"><img src="${url}" alt="${labels[i]}"><div class="mv-photo-label">${labels[i]}</div></div>`;
  }));
  imgs.innerHTML = slots.join('');
}
function closeMemberPhotoViewer() { document.getElementById('memberPhotoViewer').classList.remove('open'); }

// PT 노트 사진 인라인 토글 (signed URL 캐시 포함)
const _notePhotoUrlCache = {};

async function toggleNotePhotoInline(i, path) {
  const container = document.getElementById(`notePhotoInline${i}`);
  const btn       = document.getElementById(`notePhotoBtn${i}`);
  const img       = document.getElementById(`notePhotoInlineImg${i}`);
  if (!container) return;

  // 이미 열려 있으면 닫기
  if (container.style.display !== 'none') {
    container.style.display = 'none';
    if (btn) btn.textContent = 'PT 노트 사진 보기';
    return;
  }

  // 열기
  container.style.display = '';
  if (btn) btn.textContent = '사진 닫기';

  // 이미 이미지가 로드돼 있으면 재사용
  if (img && img.src && img.src !== window.location.href) return;

  // 로딩 표시
  if (img) { img.style.minHeight = '80px'; img.style.opacity = '0.4'; }

  // signed URL 가져오기 (캐시 활용)
  if (!_notePhotoUrlCache[path]) {
    const { data, error } = await db.storage.from('session-photos').createSignedUrl(path, 3600);
    if (error || !data?.signedUrl) {
      container.innerHTML = `
        <div style="padding:16px;text-align:center;color:#f87171;font-size:13px;">사진을 불러올 수 없습니다</div>
        <button onclick="closeNotePhotoInline(${i})" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border:none;color:#4ade80;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>`;
      return;
    }
    _notePhotoUrlCache[path] = data.signedUrl;
  }
  if (img) { img.src = _notePhotoUrlCache[path]; img.style.minHeight = ''; img.style.opacity = '1'; }
}

function closeNotePhotoInline(i) {
  const container = document.getElementById(`notePhotoInline${i}`);
  const btn       = document.getElementById(`notePhotoBtn${i}`);
  if (container) container.style.display = 'none';
  if (btn) btn.textContent = 'PT 노트 사진 보기';
}

// ── 에러 / 날짜 포맷 ──────────────────────────────────────────
function showError() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display   = 'flex';
}
function fmtDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr + 'T00:00:00');
  const DAYS = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
}
