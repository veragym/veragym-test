<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest-admin.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="베라짐 관리자">
<meta name="theme-color" content="#c9a84c">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERA GYM | 관리자</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif; background:#0a0a0a; color:#fff; min-height:100dvh; padding-bottom:80px; }
.header { background:#111108; border-bottom:1px solid #2a2518; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header-title { font-size:16px; font-weight:800; }
.header-title span { color:#c9a84c; }
.header-sub { font-size:11px; color:#555; }
.btn-logout { background:none; border:1px solid #2a2518; border-radius:8px; color:#888; font-size:12px; padding:6px 12px; cursor:pointer; transition:all 0.15s; }
.btn-logout:hover { border-color:#c9a84c44; color:#c9a84c; }
.tabs { display:flex; background:#111108; border-bottom:1px solid #2a2518; position:sticky; top:57px; z-index:99; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab-btn { flex:1; min-width:70px; padding:13px 8px; font-size:12px; font-weight:600; color:#555; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.tab-btn.active { color:#c9a84c; border-bottom-color:#c9a84c; }
.tab-content { display:none; padding:20px 16px; }
.tab-content.active { display:block; }
.sec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.sec-title { font-size:15px; font-weight:700; }
.sec-count { font-size:13px; color:#555; margin-left:6px; }
.btn-add { background:linear-gradient(135deg,#c9a84c,#a8893a); color:#000; border:none; border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; transition:opacity 0.15s; }
.btn-add:hover { opacity:0.88; }
.group-label { font-size:11px; font-weight:700; letter-spacing:1.5px; color:#c9a84c; margin:18px 0 10px; padding-left:2px; display:flex; align-items:center; gap:8px; }
.group-label::after { content:''; flex:1; height:1px; background:#2a2518; }
.card { background:#161610; border:1px solid #2a2518; border-radius:14px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
.avatar { width:42px; height:42px; border-radius:50%; background:#222215; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.info { flex:1; min-width:0; }
.name-row { font-size:15px; font-weight:700; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.badge { font-size:10px; padding:2px 7px; border-radius:20px; font-weight:600; }
.badge-admin { background:#c9a84c22; border:1px solid #c9a84c55; color:#c9a84c; }
.badge-trainer { background:#ffffff11; border:1px solid #333; color:#888; }
.badge-inactive { background:#33000088; border:1px solid #550000; color:#f87171; }
.sub-row { font-size:12px; color:#555; margin-top:3px; }
.actions { display:flex; gap:6px; flex-shrink:0; }
.btn-sm { background:#1a1a14; border:1px solid #2a2518; border-radius:8px; padding:6px 10px; font-size:11px; color:#888; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.btn-sm:hover { border-color:#c9a84c55; color:#c9a84c; }
.btn-danger { border-color:#3a1a1a; color:#666; }
.btn-danger:hover { border-color:#f87171 !important; color:#f87171 !important; }
/* Modal */
.modal-bg { display:none; position:fixed; inset:0; background:#000000cc; z-index:200; align-items:flex-end; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#161610; border-radius:24px 24px 0 0; border-top:1px solid #2a2518; width:100%; max-width:480px; padding:0 24px 40px; max-height:92dvh; overflow-y:auto; animation:slideUp 0.22s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:#2a2518; border-radius:99px; margin:16px auto 20px; }
.modal-title { font-size:17px; font-weight:700; margin-bottom:20px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; color:#888; margin-bottom:6px; font-weight:500; }
.field input, .field select { width:100%; background:#0a0a08; border:1.5px solid #2a2518; border-radius:10px; padding:12px 14px; font-size:14px; color:#fff; outline:none; font-family:inherit; transition:border-color 0.2s; }
.field input:focus, .field select:focus { border-color:#c9a84c; }
.field input::placeholder { color:#444; }
.field select option { background:#161610; }
.field .hint { font-size:11px; color:#555; margin-top:5px; }
.modal-btns { display:flex; gap:10px; margin-top:20px; }
.btn-cancel { flex:1; background:#222215; border:1px solid #2a2518; border-radius:12px; padding:14px; font-size:15px; color:#aaa; cursor:pointer; font-weight:600; }
.btn-save { flex:2; background:linear-gradient(135deg,#c9a84c,#a8893a); border:none; border-radius:12px; padding:14px; font-size:15px; color:#000; font-weight:700; cursor:pointer; }
.btn-save:disabled { opacity:0.4; cursor:default; }
.err-box { display:none; background:#2d1212; border:1px solid #5a2020; border-radius:8px; padding:10px 14px; font-size:13px; color:#f87171; margin-bottom:10px; }
/* Request cards */
.req-card { background:#161610; border:1px solid #2a2518; border-radius:12px; padding:14px 16px; margin-bottom:10px; }
.req-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.req-type { font-size:11px; padding:3px 8px; border-radius:20px; font-weight:600; }
.req-type.db_add { background:#3b82f622; border:1px solid #3b82f644; color:#60a5fa; }
.req-type.bug_report { background:#f87171aa; border:1px solid #f8717155; color:#f87171; }
.req-type.other { background:#aaa2; border:1px solid #555; color:#aaa; }
.req-status { font-size:11px; color:#555; }
.req-status.completed { color:#4ade80; }
.req-content { font-size:14px; line-height:1.5; margin-bottom:8px; }
.req-meta { font-size:11px; color:#444; }
.req-actions { display:flex; gap:8px; margin-top:10px; }
.btn-complete { background:#4ade8022; border:1px solid #4ade8044; border-radius:8px; padding:6px 12px; font-size:12px; color:#4ade80; cursor:pointer; }
.btn-req-del { background:#f8717122; border:1px solid #f8717144; border-radius:8px; padding:6px 12px; font-size:12px; color:#f87171; cursor:pointer; }
/* Misc */
.loading { text-align:center; padding:40px; color:#555; }
.empty { text-align:center; padding:40px; color:#444; font-size:14px; }
/* 지점별 카운트 칩 */
.branch-chip { background:#161610; border:1.5px solid #2a2518; border-radius:10px; padding:8px 14px; cursor:pointer; transition:all 0.15s; min-width:80px; text-align:center; }
.branch-chip:hover, .branch-chip.active { border-color:#c9a84c88; background:#1e1c10; }
.branch-chip-name { font-size:11px; color:#888; margin-bottom:2px; }
.branch-chip-count { font-size:18px; font-weight:800; color:#c9a84c; }
.branch-chip-label { font-size:10px; color:#555; }
/* 계층형 행 */
.hier-row { background:#161610; border:1px solid #2a2518; border-radius:12px; padding:13px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:border-color 0.15s; }
.hier-row:hover { border-color:#c9a84c55; }
.hier-icon { font-size:20px; flex-shrink:0; }
.hier-info { flex:1; min-width:0; }
.hier-name { font-size:14px; font-weight:700; }
.hier-sub { font-size:11px; color:#555; margin-top:2px; }
.hier-arrow { color:#444; font-size:14px; flex-shrink:0; }
/* 브레드크럼 */
.breadcrumb { display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-size:12px; color:#666; margin-bottom:12px; }
.bc-item { cursor:pointer; color:#c9a84c88; transition:color 0.15s; }
.bc-item:hover { color:#c9a84c; }
.bc-sep { color:#333; }
.bc-current { color:#888; cursor:default; }
/* 메모 모달 */
.memo-modal { background:#161610; border-radius:24px 24px 0 0; border-top:1px solid #2a2518; width:100%; max-width:480px; padding:0 24px 40px; max-height:80dvh; overflow-y:auto; animation:slideUp 0.22s ease; }
.memo-name { font-size:18px; font-weight:800; margin-bottom:4px; }
.memo-meta { font-size:12px; color:#666; margin-bottom:18px; }
.memo-body { font-size:14px; color:#ccc; line-height:1.7; background:#0f0f0a; border-radius:10px; padding:14px; min-height:60px; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#2a2518; color:#c9a84c; border:1px solid #c9a84c44; border-radius:10px; padding:10px 18px; font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:9999; white-space:nowrap; }
.spinner { display:inline-block; width:13px; height:13px; border:2px solid rgba(0,0,0,0.2); border-top-color:#000; border-radius:50%; animation:spin 0.7s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }
/* ── 운동DB 필터 ── */
.ex-search { width:100%; background:#161610; border:1.5px solid #2a2518; border-radius:10px; padding:11px 40px 11px 14px; font-size:14px; color:#fff; outline:none; font-family:inherit; transition:border-color 0.2s; display:block; margin-bottom:12px; }
.ex-search:focus { border-color:#c9a84c66; }
.ex-search::placeholder { color:#444; }
.ex-filter-row { margin-bottom:10px; }
.ex-filter-label { font-size:10px; color:#555; letter-spacing:1.2px; margin-bottom:6px; font-weight:600; }
.ex-chip { background:#161610; border:1.5px solid #2a2518; border-radius:20px; padding:5px 13px; font-size:12px; color:#666; cursor:pointer; transition:all 0.15s; white-space:nowrap; font-family:inherit; }
.ex-chip:hover { border-color:#c9a84c55; color:#aaa; }
.ex-chip.active { background:#c9a84c22; border-color:#c9a84c88; color:#c9a84c; font-weight:700; }
.ex-card { background:#161610; border:1px solid #2a2518; border-radius:10px; padding:12px 14px; margin-bottom:7px; }
.ex-name { font-size:14px; font-weight:600; }
.ex-en { font-size:11px; color:#555; margin-top:2px; }
.ex-tags { margin-top:5px; display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.ex-tag-tool { background:#c9a84c18; border:1px solid #c9a84c33; border-radius:6px; padding:2px 8px; font-size:10px; color:#c9a84c99; }
.ex-tag-part { background:transparent; border:1px solid #2a2518; border-radius:6px; padding:2px 8px; font-size:10px; color:#555; }
.ex-tag-muscle { font-size:10px; color:#3d3d2d; }
.ex-more-btn { width:100%; background:#161610; border:1px solid #2a2518; border-radius:10px; padding:12px; color:#666; font-size:13px; cursor:pointer; margin-top:4px; font-family:inherit; transition:all 0.15s; }
.ex-more-btn:hover { border-color:#c9a84c44; color:#c9a84c; }
/* 이미지 업로드 */
.img-upload-zone { border:2px dashed #2a2518; border-radius:12px; padding:20px; text-align:center; cursor:pointer; transition:border-color 0.2s; margin-bottom:4px; }
.img-upload-zone:hover, .img-upload-zone.drag { border-color:#c9a84c66; }
.img-upload-zone img { max-height:120px; border-radius:8px; object-fit:cover; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">VERA<span>GYM</span> 관리자</div>
    <div class="header-sub" id="adminName">불러오는 중...</div>
  </div>
  <button class="btn-logout" onclick="doLogout()">로그아웃</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('trainers',this)">트레이너</button>
  <button class="tab-btn"        onclick="switchTab('members',this)">전체 회원</button>
  <button class="tab-btn"        onclick="switchTab('exercise',this)">운동DB</button>
  <button class="tab-btn"        onclick="switchTab('requests',this)">요청사항</button>
</div>

<!-- 트레이너 관리 -->
<div id="tab-trainers" class="tab-content active">
  <div class="sec-header">
    <div><span class="sec-title">트레이너 관리</span><span class="sec-count" id="trainerCount"></span></div>
    <button class="btn-add" onclick="openAddTrainer()">+ 추가</button>
  </div>
  <div id="trainerList"><div class="loading">불러오는 중...</div></div>
</div>

<!-- 전체 회원 -->
<div id="tab-members" class="tab-content">
  <div class="sec-header">
    <div><span class="sec-title">전체 회원</span><span class="sec-count" id="memberCount"></span></div>
    <button class="btn-add" onclick="openAddMember()">+ 추가</button>
  </div>
  <!-- 지점별 요약 카운트 -->
  <div id="branchSummary" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px"></div>
  <!-- 계층형 뷰 breadcrumb -->
  <div id="memberBreadcrumb" style="display:none;font-size:12px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap"></div>
  <!-- 계층형 리스트 -->
  <div id="memberList"><div class="loading">불러오는 중...</div></div>
</div>

<!-- 운동 DB -->
<div id="tab-exercise" class="tab-content">
  <div class="sec-header" style="margin-bottom:14px">
    <div><span class="sec-title">운동 DB</span><span class="sec-count" id="exerciseCount"></span></div>
    <div style="display:flex;gap:8px">
      <button class="btn-add" onclick="exportExerciseExcel()" style="background:#1e1c10;border:1px solid #c9a84c44;color:#c9a84c;font-weight:600">↓ Excel</button>
    </div>
  </div>
  <!-- 검색 -->
  <div style="position:relative">
    <input id="exSearch" class="ex-search" type="text" placeholder="운동명 검색 (한/영)" oninput="filterExercise()">
    <button id="exClear" onclick="clearExSearch()" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:0;line-height:1">✕</button>
  </div>
  <!-- 도구 필터 -->
  <div class="ex-filter-row">
    <div class="ex-filter-label">TOOL</div>
    <div id="toolFilter" style="display:flex;flex-wrap:wrap;gap:5px"></div>
  </div>
  <!-- 부위 필터 -->
  <div class="ex-filter-row" style="margin-bottom:14px">
    <div class="ex-filter-label">부위</div>
    <div id="partFilter" style="display:flex;flex-wrap:wrap;gap:5px"></div>
  </div>
  <!-- 결과 -->
  <div id="exerciseList"><div class="loading">불러오는 중...</div></div>
</div>

<!-- 요청사항 -->
<div id="tab-requests" class="tab-content">
  <div class="sec-header">
    <span class="sec-title">트레이너 요청사항</span><span class="sec-count" id="reqCount"></span>
  </div>
  <div id="reqList"><div class="loading">불러오는 중...</div></div>
</div>

<div id="toast" class="toast"></div>

<!-- 회원 메모 모달 -->
<div id="memoModal" class="modal-bg" onclick="closeModal('memoModal',event)">
  <div class="memo-modal">
    <div class="modal-handle"></div>
    <div class="memo-name" id="memoMemberName"></div>
    <div class="memo-meta" id="memoMemberMeta"></div>
    <div style="font-size:12px;color:#888;margin-bottom:8px">트레이너 메모</div>
    <div class="memo-body" id="memoContent"></div>
    <button class="btn-cancel" style="margin-top:16px;width:100%" onclick="closeModal('memoModal')">닫기</button>
  </div>
</div>

<!-- 운동 상세 모달 -->
<div id="exDetailModal" class="modal-bg" onclick="closeModal('exDetailModal',event)">
  <div class="modal" style="padding-bottom:36px">
    <div class="modal-handle"></div>
    <!-- 이미지 -->
    <div id="exDetailImg" style="margin-bottom:16px;border-radius:14px;overflow:hidden;background:#111;min-height:60px;display:flex;align-items:center;justify-content:center"></div>
    <!-- 이름 -->
    <div id="exDetailNameKo" style="font-size:20px;font-weight:800;margin-bottom:4px"></div>
    <div id="exDetailNameEn" style="font-size:13px;color:#555;margin-bottom:16px"></div>
    <!-- 태그 -->
    <div id="exDetailTags" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px"></div>
    <!-- 주요근육 -->
    <div style="font-size:11px;color:#666;letter-spacing:1px;margin-bottom:8px">주요 근육</div>
    <div id="exDetailMuscles" style="font-size:14px;color:#bbb;line-height:1.8;background:#0f0f0a;border-radius:10px;padding:14px;min-height:40px"></div>
    <button class="btn-cancel" style="margin-top:18px;width:100%" onclick="closeModal('exDetailModal')">닫기</button>
  </div>
</div>


<!-- 비밀번호 변경 모달 -->
<div id="changePwModal" class="modal-bg" onclick="closeModal('changePwModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="changePwTitle">비밀번호 변경</div>
    <div class="err-box" id="changePwErr"></div>
    <div class="field">
      <label>새 비밀번호 <span style="color:#f87171">*</span></label>
      <input id="newPw" type="text" placeholder="4자 이상 입력" autocomplete="off"
             style="letter-spacing:2px;font-family:monospace">
      <div class="hint">변경 후 트레이너에게 새 비밀번호를 알려주세요</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('changePwModal')">취소</button>
      <button class="btn-save" id="btnChangePw" onclick="doChangePw()">변경</button>
    </div>
  </div>
</div>

<!-- 트레이너 추가 모달 -->
<div id="addModal" class="modal-bg" onclick="closeModal('addModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">트레이너 추가</div>
    <div class="err-box" id="addErr"></div>
    <div class="field">
      <label>이름 <span style="color:#f87171">*</span></label>
      <input id="tName" type="text" placeholder="홍길동" autocomplete="off">
      <div class="hint">로그인 시 사용 (중복 불가)</div>
    </div>
    <div class="field">
      <label>비밀번호 <span style="color:#f87171">*</span></label>
      <input id="tPw" type="password" placeholder="4자 이상" autocomplete="new-password">
    </div>
    <div class="field">
      <label>지점</label>
      <select id="tGym">
        <option value="미사점">미사점</option>
        <option value="동탄점">동탄점</option>
      </select>
    </div>
    <div class="field" id="roleField" style="display:none">
      <label>권한</label>
      <select id="tRole">
        <option value="false">트레이너</option>
        <option value="true">관리자</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('addModal')">취소</button>
      <button class="btn-save" id="btnAdd" onclick="addTrainer()">추가</button>
    </div>
  </div>
</div>

<!-- 회원 추가 모달 -->
<div id="addMemberModal" class="modal-bg" onclick="closeModal('addMemberModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">회원 추가</div>
    <div class="err-box" id="addMemberErr"></div>
    <div style="font-size:11px;color:#c9a84c;background:#1e1a0a;border:1px solid #c9a84c22;border-radius:8px;padding:9px 12px;margin-bottom:14px">
      이름 + 전화번호 뒷 4자리로 회원명이 자동 생성됩니다
    </div>
    <div id="addMemberNamePreview" style="display:none;font-size:13px;color:#888;margin-bottom:12px;padding:8px 12px;background:#111108;border-radius:8px">
      생성될 회원명: <span id="addMemberNamePreviewVal" style="color:#c9a84c;font-weight:700"></span>
    </div>
    <div class="field">
      <label>이름 <span style="color:#f87171">*</span></label>
      <input id="amName" type="text" placeholder="홍길동" autocomplete="off" oninput="updateMemberNamePreview()">
    </div>
    <div class="field">
      <label>전화번호 <span style="color:#f87171">*</span></label>
      <input id="amPhone" type="tel" placeholder="010-1234-5678" oninput="updateMemberNamePreview()">
    </div>
    <div class="field">
      <label>지점</label>
      <select id="amGym">
        <option value="미사점">미사점</option>
        <option value="동탄점">동탄점</option>
      </select>
    </div>
    <div style="font-size:11px;color:#555;letter-spacing:1px;font-weight:600;margin:16px 0 12px;display:flex;align-items:center;gap:8px">
      PT 상품 <span style="flex:1;height:1px;background:#2a2518;display:block"></span>
    </div>
    <div class="field">
      <label>계약일 <span style="color:#f87171">*</span></label>
      <input id="amContractDate" type="date">
    </div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1">
        <label>총 횟수 <span style="color:#f87171">*</span></label>
        <input id="amTotal" type="number" min="1" placeholder="30" oninput="syncRemaining()">
      </div>
      <div class="field" style="flex:1">
        <label>잔여 횟수</label>
        <input id="amRemaining" type="number" min="0" placeholder="자동입력">
      </div>
    </div>
    <div class="field">
      <label>계약트레이너</label>
      <select id="amContractTrainer"></select>
    </div>
    <div class="field">
      <label>담당트레이너</label>
      <select id="amAssignedTrainer"></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('addMemberModal')">취소</button>
      <button class="btn-save" id="btnAddMember" onclick="addMember()">추가</button>
    </div>
  </div>
</div>

<!-- 담당트레이너 변경 모달 -->
<div id="changeTrainerModal" class="modal-bg" onclick="closeModal('changeTrainerModal',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">담당트레이너 변경</div>
    <div class="err-box" id="ctErr"></div>
    <div class="field">
      <label>계약트레이너 <span style="color:#555;font-weight:400">(변경 불가)</span></label>
      <div id="ctContractTrainerName" style="background:#0a0a08;border:1.5px solid #1a1a14;border-radius:10px;padding:12px 14px;font-size:14px;color:#555;cursor:not-allowed"></div>
    </div>
    <div class="field">
      <label>담당트레이너 <span style="color:#f87171">*</span></label>
      <select id="ctTrainerSel"></select>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <input type="checkbox" id="ctSyncMember" checked style="width:auto;height:auto;flex-shrink:0;accent-color:#c9a84c">
      <label for="ctSyncMember" style="font-size:12px;color:#888;margin-bottom:0;cursor:pointer;line-height:1.4">
        회원의 담당트레이너도 함께 변경<br>
        <span style="color:#555;font-size:11px">(목록 분류에 반영됩니다)</span>
      </label>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('changeTrainerModal')">취소</button>
      <button class="btn-save" id="btnCtSave" onclick="saveChangeTrainer()">변경</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
// ── 누락된 유틸 함수 ─────────────────────────────────────────
const EDGE_BASE         = SUPA_URL + '/functions/v1';
const SUPABASE_ANON_KEY = SUPA_ANON;

function preventBackExit() {
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => history.pushState(null, '', location.href));
}
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id, e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById(id).classList.remove('open');
}
// ─────────────────────────────────────────────────────────────
init_db();
preventBackExit();

let me = null;   // 현재 로그인한 관리자 정보

async function init() {
  me = await requireAdmin();
  if (!me) return;

  document.getElementById('adminName').textContent =
    me.is_super ? '최고 관리자' : `${me.name} (${me.gym_location})`;

  loadTrainers();
}

// ── 트레이너 목록 ────────────────────────────────────────────
async function loadTrainers() {
  const { data, error } = await db.from('trainers')
    .select('*').order('is_admin', { ascending: false }).order('created_at');
  if (error) { showToast('불러오기 실패'); return; }

  const admins   = data.filter(t => t.is_admin);
  const trainers = data.filter(t => !t.is_admin);
  document.getElementById('trainerCount').textContent = `(${data.length}명)`;

  const wrap = document.getElementById('trainerList');
  if (!data.length) { wrap.innerHTML = '<div class="empty">등록된 계정이 없어요</div>'; return; }

  const card = t => `
    <div class="card">
      <div class="avatar">${(t.name||'?').charAt(0)}</div>
      <div class="info">
        <div class="name-row">
          ${t.name}
          <span class="badge ${t.is_admin ? 'badge-admin' : 'badge-trainer'}">${t.is_admin ? '관리자' : '트레이너'}</span>
          ${!t.is_active ? '<span class="badge badge-inactive">비활성</span>' : ''}
        </div>
        <div class="sub-row">${t.gym_location}${t.plain_pw ? ` · <span style="letter-spacing:1px;font-family:monospace">${t.plain_pw}</span>` : ''}</div>
      </div>
      <div class="actions">
        <button class="btn-sm" onclick="openChangePw('${t.id}','${t.name}')">비번변경</button>
        <button class="btn-sm" onclick="toggleActive('${t.id}','${t.name}',${t.is_active})">
          ${t.is_active ? '비활성화' : '활성화'}
        </button>
        ${!t.is_admin && me?.is_super ? `<button class="btn-sm btn-danger" onclick="deleteTrainer('${t.id}','${t.name}')">삭제</button>` : ''}
      </div>
    </div>`;

  let html = '';
  if (admins.length)   html += `<div class="group-label">관리자 (${admins.length})</div>` + admins.map(card).join('');
  if (trainers.length) html += `<div class="group-label">트레이너 (${trainers.length})</div>` + trainers.map(card).join('');
  else html += '<div style="text-align:center;padding:16px;color:#444;font-size:13px">트레이너 없음 — 위에서 추가하세요</div>';
  wrap.innerHTML = html;
}

function openAddTrainer() {
  document.getElementById('tName').value = '';
  document.getElementById('tPw').value = '';
  document.getElementById('tRole').value = 'false';
  document.getElementById('addErr').style.display = 'none';
  document.getElementById('roleField').style.display = me?.is_super ? '' : 'none';
  openModal('addModal');
}

async function addTrainer() {
  const name    = document.getElementById('tName').value.trim();
  const pw      = document.getElementById('tPw').value;
  const gym     = document.getElementById('tGym').value;
  const isAdmin = document.getElementById('tRole').value === 'true';
  const btn     = document.getElementById('btnAdd');

  document.getElementById('addErr').style.display = 'none';
  if (!name)       { showAddErr('이름을 입력해주세요'); return; }
  if (pw.length<4) { showAddErr('비밀번호는 4자 이상이어야 합니다'); return; }

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>추가 중...';

  try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) throw new Error('세션이 만료됐습니다. 다시 로그인해주세요.');

    const res = await fetch(`${EDGE_BASE}/create-trainer`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ name, password: pw, gym_location: gym, is_admin: isAdmin }),
    });

    const result = await res.json();
    if (!res.ok || result.error) throw new Error(result.error || '추가 실패');

    closeModal('addModal');
    showToast(`${name} ${isAdmin ? '관리자' : '트레이너'} 추가 완료!`);
    loadTrainers();
  } catch(e) {
    showAddErr(e.message);
  } finally {
    btn.disabled = false; btn.textContent = '추가';
  }
}

function showAddErr(msg) {
  const el = document.getElementById('addErr');
  el.textContent = msg; el.style.display = 'block';
}

// ── 비밀번호 변경 ─────────────────────────────────────────────
let _changePwTargetId = null;
function openChangePw(id, name) {
  _changePwTargetId = id;
  document.getElementById('changePwTitle').textContent = `${name} 비밀번호 변경`;
  document.getElementById('newPw').value = '';
  document.getElementById('changePwErr').style.display = 'none';
  openModal('changePwModal');
}

async function doChangePw() {
  const newPw = document.getElementById('newPw').value.trim();
  const btn   = document.getElementById('btnChangePw');
  document.getElementById('changePwErr').style.display = 'none';
  if (!newPw || newPw.length < 4) {
    const el = document.getElementById('changePwErr');
    el.textContent = '4자 이상 입력해주세요'; el.style.display = 'block'; return;
  }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>변경 중...';
  try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) throw new Error('세션이 만료됐습니다');
    const res = await fetch(`${EDGE_BASE}/update-trainer-pw`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ trainer_id: _changePwTargetId, new_password: newPw }),
    });
    const result = await res.json();
    if (!res.ok || result.error) throw new Error(result.error || '변경 실패');
    closeModal('changePwModal');
    showToast(`${result.name} 비밀번호 변경 완료!`);
    loadTrainers();
  } catch(e) {
    const el = document.getElementById('changePwErr');
    el.textContent = e.message; el.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '변경';
  }
}

async function toggleActive(id, name, isActive) {
  if (!confirm(`"${name}"을(를) ${isActive ? '비활성화' : '활성화'}할까요?`)) return;
  const { error } = await db.from('trainers').update({ is_active: !isActive }).eq('id', id);
  if (error) { showToast('변경 실패'); return; }
  showToast(`${name} ${isActive ? '비활성화' : '활성화'} 완료`);
  loadTrainers();
}

async function deleteTrainer(id, name) {
  if (!confirm(`"${name}" 트레이너를 삭제할까요?\n되돌릴 수 없습니다.`)) return;
  const { error } = await db.from('trainers').delete().eq('id', id);
  if (error) { showToast('삭제 실패: ' + error.message); return; }
  showToast(`${name} 삭제 완료`);
  loadTrainers();
}

// ── 전체 회원 (계층형) ────────────────────────────────────────
let _allTrainers = [];
let _allMembers  = [];

async function loadMembers() {
  const [trRes, mbRes] = await Promise.all([
    db.from('trainers').select('id,name,gym_location,is_active,is_admin').order('name'),
    db.from('members').select('id,name,gym_location,notes,is_active,trainer_id,phone').order('name'),
  ]);
  if (trRes.error || mbRes.error) { showToast('불러오기 실패'); return; }
  _allTrainers = trRes.data || [];
  _allMembers  = mbRes.data || [];

  // 전체 회원 수
  document.getElementById('memberCount').textContent = `(${_allMembers.length}명)`;

  // 지점별 요약 칩
  const branchMap = {};
  _allMembers.forEach(m => {
    const loc = m.gym_location || '미지정';
    branchMap[loc] = (branchMap[loc] || 0) + 1;
  });
  const total = _allMembers.length;
  const chips = Object.entries(branchMap).sort((a,b) => b[1]-a[1]).map(([loc, cnt]) => `
    <div class="branch-chip" onclick="showBranch('${loc}')">
      <div class="branch-chip-name">${loc}</div>
      <div class="branch-chip-count">${cnt}</div>
      <div class="branch-chip-label">명</div>
    </div>`).join('');
  document.getElementById('branchSummary').innerHTML = `
    <div class="branch-chip" onclick="showAllBranches()">
      <div class="branch-chip-name">전체</div>
      <div class="branch-chip-count">${total}</div>
      <div class="branch-chip-label">명</div>
    </div>${chips}`;

  showAllBranches();
}

function setBreadcrumb(items) {
  // items: [{label, onclick}] — 마지막은 현재 위치
  const bc = document.getElementById('memberBreadcrumb');
  if (!items.length) { bc.style.display = 'none'; return; }
  bc.style.display = 'flex';
  bc.innerHTML = '<div class="breadcrumb">' +
    items.map((it, i) => {
      if (i === items.length - 1)
        return `<span class="bc-current">${it.label}</span>`;
      return `<span class="bc-item" onclick="${it.onclick}">${it.label}</span><span class="bc-sep">›</span>`;
    }).join('') +
    '</div>';
}

function showAllBranches() {
  const branchMap = {};
  _allMembers.forEach(m => {
    const loc = m.gym_location || '미지정';
    if (!branchMap[loc]) branchMap[loc] = [];
    branchMap[loc].push(m);
  });
  setBreadcrumb([{label:'전 지점', onclick:'showAllBranches()'}]);
  const wrap = document.getElementById('memberList');
  if (!Object.keys(branchMap).length) { wrap.innerHTML = '<div class="empty">등록된 회원이 없어요</div>'; return; }
  wrap.innerHTML = Object.entries(branchMap).sort((a,b) => b[1].length - a[1].length).map(([loc, mbs]) => {
    const trainerCount = [...new Set(mbs.map(m => m.trainer_id).filter(Boolean))].length;
    return `<div class="hier-row" onclick="showBranch('${loc}')">
      <div class="hier-info">
        <div class="hier-name">${loc}</div>
        <div class="hier-sub">트레이너 ${trainerCount}명 · 회원 ${mbs.length}명</div>
      </div>
      <div class="hier-arrow">›</div>
    </div>`;
  }).join('');
}

function showBranch(branch) {
  // 해당 지점의 트레이너 목록 (회원이 있는 트레이너)
  const branchMembers = _allMembers.filter(m => (m.gym_location || '미지정') === branch);
  const trainerIds = [...new Set(branchMembers.map(m => m.trainer_id).filter(Boolean))];
  const trainerList = trainerIds.map(tid => _allTrainers.find(t => t.id === tid)).filter(Boolean);
  // 미배정 회원
  const unassigned = branchMembers.filter(m => !m.trainer_id);

  setBreadcrumb([
    {label:'전 지점', onclick:'showAllBranches()'},
    {label: branch, onclick:`showBranch('${branch}')`},
  ]);
  const wrap = document.getElementById('memberList');
  let html = '';
  if (trainerList.length) {
    html += trainerList.map(t => {
      const cnt = branchMembers.filter(m => m.trainer_id === t.id).length;
      return `<div class="hier-row" onclick="showTrainer('${t.id}','${branch}')">
        <div class="hier-icon">${(t.name||'?').charAt(0)}</div>
        <div class="hier-info">
          <div class="hier-name">${t.name}</div>
          <div class="hier-sub">담당 회원 ${cnt}명${!t.is_active ? ' · 비활성' : ''}</div>
        </div>
        <div class="hier-arrow">›</div>
      </div>`;
    }).join('');
  }
  if (unassigned.length) {
    html += `<div class="hier-row" onclick="showTrainer('__unassigned__','${branch}')">`
      <div class="hier-info">
        <div class="hier-name">미배정</div>
        <div class="hier-sub">트레이너 미배정 회원 ${unassigned.length}명</div>
      </div>
      <div class="hier-arrow">›</div>
    </div>`;
  }
  if (!html) html = '<div class="empty">회원이 없어요</div>';
  wrap.innerHTML = html;
}

function showTrainer(trainerId, branch) {
  const members = trainerId === '__unassigned__'
    ? _allMembers.filter(m => !m.trainer_id && (m.gym_location || '미지정') === branch)
    : _allMembers.filter(m => m.trainer_id === trainerId && (m.gym_location || '미지정') === branch);
  const trainer = _allTrainers.find(t => t.id === trainerId);
  const trainerName = trainer?.name || '미배정';

  setBreadcrumb([
    {label:'전 지점', onclick:'showAllBranches()'},
    {label: branch, onclick:`showBranch('${branch}')`},
    {label: trainerName, onclick:`showTrainer('${trainerId}','${branch}')`},
  ]);
  const wrap = document.getElementById('memberList');
  if (!members.length) { wrap.innerHTML = '<div class="empty">담당 회원이 없어요</div>'; return; }
  wrap.innerHTML = members.map(m => `
    <div class="hier-row" onclick="showMemberDetail('${m.id}','${trainerId}','${branch}')">
      <div class="hier-icon">${(m.name||'?').charAt(0)}</div>
      <div class="hier-info">
        <div class="hier-name">${m.name}${!m.is_active ? ' <span style="font-size:10px;color:#f87171">비활성</span>' : ''}</div>
        <div class="hier-sub">${m.phone ? m.phone.slice(0,3)+'****'+m.phone.slice(-4) : '전화번호 없음'} · 상품 보기</div>
      </div>
      <div class="hier-arrow">›</div>
    </div>`).join('');
}

function showMemberMemo(memberId) {
  const m = _allMembers.find(x => x.id === memberId);
  if (!m) return;
  const trainer = _allTrainers.find(t => t.id === m.trainer_id);
  document.getElementById('memoMemberName').textContent = m.name;
  document.getElementById('memoMemberMeta').textContent =
    `${m.gym_location || ''} · 담당: ${trainer?.name || '미배정'}`;
  document.getElementById('memoContent').textContent = m.notes || '(메모 없음)';
  openModal('memoModal');
}

// ── 회원 상세 (상품 목록 + 담당트레이너 변경) ─────────────────
let _navState = null; // { memberId, trainerId, branch }

async function showMemberDetail(memberId, trainerId, branch) {
  const m = _allMembers.find(x => x.id === memberId);
  const trainer = _allTrainers.find(t => t.id === trainerId);
  const trainerName = trainerId === '__unassigned__' ? '미배정' : (trainer?.name || '미배정');
  _navState = { memberId, trainerId, branch };

  setBreadcrumb([
    { label: '전 지점',   onclick: 'showAllBranches()' },
    { label: branch,      onclick: `showBranch('${branch}')` },
    { label: trainerName, onclick: `showTrainer('${trainerId}','${branch}')` },
    { label: m?.name || '회원', onclick: `showMemberDetail('${memberId}','${trainerId}','${branch}')` },
  ]);

  const wrap = document.getElementById('memberList');
  wrap.innerHTML = '<div class="loading">상품 불러오는 중...</div>';

  const { data: products, error } = await db
    .from('pt_products')
    .select('id,contract_date,total_sessions,remaining_sessions,contract_trainer_id,assigned_trainer_id,notes,is_active,re_registration_num')
    .eq('member_id', memberId)
    .order('contract_date', { ascending: false });

  if (error) { wrap.innerHTML = '<div class="empty">상품 불러오기 실패</div>'; return; }
  if (!products?.length) { wrap.innerHTML = '<div class="empty">등록된 상품이 없어요</div>'; return; }

  wrap.innerHTML = products.map(p => {
    const cTr  = _allTrainers.find(t => t.id === p.contract_trainer_id);
    const aTr  = _allTrainers.find(t => t.id === p.assigned_trainer_id);
    const cId  = p.contract_trainer_id || '';
    const aId  = p.assigned_trainer_id || '';
    const regLabel = p.re_registration_num > 0
      ? `<span style="font-size:10px;color:#c9a84c88;margin-left:8px">재등록 ${p.re_registration_num}회</span>`
      : '';
    return `
      <div class="hier-row" style="flex-direction:column;align-items:stretch;gap:10px;cursor:default">
        <div>
          <div class="hier-name" style="display:flex;align-items:center;flex-wrap:wrap">
            ${p.contract_date}${regLabel}
            ${!p.is_active ? '<span style="font-size:10px;color:#f87171;margin-left:8px">비활성</span>' : ''}
          </div>
          <div class="hier-sub" style="margin-top:4px">
            총 ${p.total_sessions}회 · 잔여 <span style="color:#c9a84c">${p.remaining_sessions}회</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:#666">
          <div>계약트레이너 <span style="color:#555;margin-left:4px">${cTr?.name || '미지정'}</span></div>
          <div style="display:flex;align-items:center;gap:6px">
            담당트레이너 <span style="color:#c9a84c;margin-left:4px">${aTr?.name || '미배정'}</span>
            <button class="btn-sm" style="font-size:10px;padding:3px 9px"
              onclick="openChangeTrainer('${p.id}','${cId}','${aId}','${memberId}')">변경</button>
          </div>
        </div>
        ${p.notes ? `<div style="font-size:12px;color:#444;background:#0f0f0a;border-radius:8px;padding:8px 10px">${p.notes}</div>` : ''}
      </div>`;
  }).join('');
}

// ── 담당트레이너 변경 ─────────────────────────────────────────
let _ctProductId = null;
let _ctMemberId  = null;

function openChangeTrainer(productId, contractTrainerId, assignedTrainerId, memberId) {
  _ctProductId = productId;
  _ctMemberId  = memberId;
  // 계약트레이너 표시 (읽기전용)
  const cTr = _allTrainers.find(t => t.id === contractTrainerId);
  document.getElementById('ctContractTrainerName').textContent = cTr?.name || '미지정';
  // 담당트레이너 선택
  const sel = document.getElementById('ctTrainerSel');
  sel.innerHTML = '<option value="">미배정</option>' +
    _allTrainers.filter(t => !t.is_admin && t.is_active).map(t =>
      `<option value="${t.id}"${t.id === assignedTrainerId ? ' selected' : ''}>${t.name}</option>`
    ).join('');
  document.getElementById('ctErr').style.display = 'none';
  document.getElementById('ctSyncMember').checked = true;
  openModal('changeTrainerModal');
}

async function saveChangeTrainer() {
  const newTrainerId = document.getElementById('ctTrainerSel').value || null;
  const syncMember   = document.getElementById('ctSyncMember').checked;
  const btn = document.getElementById('btnCtSave');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>저장 중...';
  try {
    // pt_products.assigned_trainer_id 업데이트
    const { error: e1 } = await db.from('pt_products')
      .update({ assigned_trainer_id: newTrainerId }).eq('id', _ctProductId);
    if (e1) throw e1;
    // members.trainer_id 동기화 (체크박스 선택 시)
    if (syncMember) {
      const { error: e2 } = await db.from('members')
        .update({ trainer_id: newTrainerId }).eq('id', _ctMemberId);
      if (e2) throw e2;
    }
    closeModal('changeTrainerModal');
    showToast('담당트레이너 변경 완료!');
    // 로컬 _allMembers 갱신 후 현재 화면 재렌더
    const { data } = await db.from('members')
      .select('id,name,gym_location,notes,is_active,trainer_id,phone').order('name');
    if (data) _allMembers = data;
    if (_navState) showMemberDetail(_navState.memberId, _navState.trainerId, _navState.branch);
  } catch(e) {
    const el = document.getElementById('ctErr');
    el.textContent = e.message || '저장 실패'; el.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '변경';
  }
}

// ── 회원 추가 ─────────────────────────────────────────────────
function openAddMember() {
  document.getElementById('amName').value = '';
  document.getElementById('amPhone').value = '';
  document.getElementById('amContractDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('amTotal').value = '';
  document.getElementById('amRemaining').value = '';
  document.getElementById('addMemberErr').style.display = 'none';
  document.getElementById('addMemberNamePreview').style.display = 'none';
  // 트레이너 목록 채우기
  const trOpts = '<option value="">미지정</option>' +
    _allTrainers.filter(t => !t.is_admin && t.is_active)
      .map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  document.getElementById('amContractTrainer').innerHTML = trOpts;
  document.getElementById('amAssignedTrainer').innerHTML =
    '<option value="">미배정</option>' +
    _allTrainers.filter(t => !t.is_admin && t.is_active)
      .map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  openModal('addMemberModal');
}

function updateMemberNamePreview() {
  const name  = document.getElementById('amName').value.trim();
  const phone = document.getElementById('amPhone').value.replace(/\D/g, '');
  const last4 = phone.slice(-4);
  const prev  = document.getElementById('addMemberNamePreview');
  if (name && last4.length === 4) {
    document.getElementById('addMemberNamePreviewVal').textContent = name + last4;
    prev.style.display = 'block';
  } else {
    prev.style.display = 'none';
  }
}

function syncRemaining() {
  const t = document.getElementById('amTotal').value;
  const r = document.getElementById('amRemaining');
  if (!r.value) r.value = t;
}

async function addMember() {
  const rawName      = document.getElementById('amName').value.trim();
  const rawPhone     = document.getElementById('amPhone').value.trim();
  const phone        = rawPhone.replace(/\D/g, '');
  const gym          = document.getElementById('amGym').value;
  const contractDate = document.getElementById('amContractDate').value;
  const total        = parseInt(document.getElementById('amTotal').value);
  const remaining    = parseInt(document.getElementById('amRemaining').value || document.getElementById('amTotal').value);
  const contractTr   = document.getElementById('amContractTrainer').value || null;
  const assignedTr   = document.getElementById('amAssignedTrainer').value || null;
  const btn          = document.getElementById('btnAddMember');

  document.getElementById('addMemberErr').style.display = 'none';
  if (!rawName)           { showAmErr('이름을 입력해주세요'); return; }
  if (phone.length < 4)   { showAmErr('전화번호를 입력해주세요 (최소 4자리)'); return; }
  if (!contractDate)      { showAmErr('계약일을 입력해주세요'); return; }
  if (!total || total < 1){ showAmErr('총 횟수를 입력해주세요'); return; }

  const last4 = phone.slice(-4);
  let displayName = rawName + last4;

  // 동명이인 충돌 처리 (같은 이름+뒷4자리이지만 다른 전화번호)
  const collision = _allMembers.find(m => m.name === displayName && m.phone !== rawPhone);
  if (collision) {
    let suffix = 1;
    while (_allMembers.find(m => m.name === displayName + suffix)) suffix++;
    displayName = displayName + suffix;
  }

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>추가 중...';
  try {
    // 1. 회원 INSERT
    const { data: newMember, error: e1 } = await db.from('members')
      .insert({ name: displayName, phone: rawPhone, gym_location: gym,
                trainer_id: assignedTr, is_active: true })
      .select('id').single();
    if (e1) throw e1;

    // 2. PT 상품 INSERT
    const { error: e2 } = await db.from('pt_products').insert({
      member_id: newMember.id, contract_date: contractDate,
      total_sessions: total, remaining_sessions: remaining,
      contract_trainer_id: contractTr, assigned_trainer_id: assignedTr,
      is_active: true, re_registration_num: 0,
    });
    if (e2) throw e2;

    closeModal('addMemberModal');
    showToast(`${displayName} 회원 추가 완료!`);
    await loadMembers(); // 전체 목록 갱신
  } catch(e) {
    showAmErr(e.message || '추가 실패');
  } finally {
    btn.disabled = false; btn.textContent = '추가';
  }
}

function showAmErr(msg) {
  const el = document.getElementById('addMemberErr');
  el.textContent = msg; el.style.display = 'block';
}

// ── 운동 DB ──────────────────────────────────────────────────
let _allExercises  = [];
let _exFiltered    = [];
let _exShowCount   = 50;
let _exToolFilter  = '전체';
let _exPartFilter  = '전체';
const EX_TOOLS = ['전체','체중','덤벨','바벨','케이블','밴드','케틀벨','머신','소도구'];
const EX_PARTS = ['전체','가슴','등','어깨','팔','코어','하체','전신'];

async function loadExercise() {
  // 이미 로드된 경우 필터만 다시 렌더
  if (_allExercises.length) { _buildExFilters(); filterExercise(); return; }
  document.getElementById('exerciseList').innerHTML = '<div class="loading">불러오는 중...</div>';
  const { data, error } = await db.from('exercise_refs')
    .select('id,name_ko,name_en,tool_unified,part_unified,muscles_detail,image_url')
    .eq('is_active', true).order('name_ko');
  if (error || !data) { document.getElementById('exerciseList').innerHTML = '<div class="empty">불러오기 실패</div>'; return; }
  _allExercises = data;
  document.getElementById('exerciseCount').textContent = `(총 ${data.length}개)`;
  _buildExFilters();
  filterExercise();
}

function _buildExFilters() {
  const chip = (arr, sel, fn) => arr.map(v =>
    `<button class="ex-chip${sel===v?' active':''}" onclick="${fn}('${v}')">${v}</button>`).join('');
  document.getElementById('toolFilter').innerHTML = chip(EX_TOOLS, _exToolFilter, 'setExTool');
  document.getElementById('partFilter').innerHTML = chip(EX_PARTS, _exPartFilter, 'setExPart');
}

function setExTool(v) { _exToolFilter = v; _buildExFilters(); filterExercise(); }
function setExPart(v) { _exPartFilter = v; _buildExFilters(); filterExercise(); }

function clearExSearch() {
  document.getElementById('exSearch').value = '';
  document.getElementById('exClear').style.display = 'none';
  filterExercise();
}

function filterExercise() {
  const q = (document.getElementById('exSearch')?.value || '').trim().toLowerCase();
  document.getElementById('exClear').style.display = q ? '' : 'none';
  let list = _allExercises;
  if (_exToolFilter !== '전체') list = list.filter(e => e.tool_unified === _exToolFilter);
  if (_exPartFilter !== '전체') list = list.filter(e => e.part_unified === _exPartFilter);
  if (q) list = list.filter(e =>
    e.name_ko?.toLowerCase().includes(q) || e.name_en?.toLowerCase().includes(q));
  _exFiltered = list;
  _exShowCount = 50;
  const total = _allExercises.length;
  document.getElementById('exerciseCount').textContent =
    list.length === total ? `(총 ${total}개)` : `(${list.length} / ${total}개)`;
  _renderExList();
}

function _renderExList() {
  const wrap = document.getElementById('exerciseList');
  const list = _exFiltered;
  if (!list.length) { wrap.innerHTML = '<div class="empty">검색 결과가 없어요</div>'; return; }
  const items = list.slice(0, _exShowCount);
  wrap.innerHTML = items.map(r => `
    <div class="ex-card" onclick="openExDetail('${r.id}')" style="cursor:pointer">
      <div style="display:flex;align-items:center;gap:12px">
        ${r.image_url
          ? `<img src="${r.image_url}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#222" loading="lazy" onerror="this.style.display='none'">`
          : `<div style="width:56px;height:56px;border-radius:8px;background:#1a1a12;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;color:#444">(이미지)</div>`}
        <div style="flex:1;min-width:0">
          <div class="ex-name">${r.name_ko}</div>
          ${r.name_en ? `<div class="ex-en">${r.name_en}</div>` : ''}
          <div class="ex-tags">
            ${r.tool_unified ? `<span class="ex-tag-tool">${r.tool_unified}</span>` : ''}
            ${r.part_unified ? `<span class="ex-tag-part">${r.part_unified}</span>` : ''}
            ${r.muscles_detail ? `<span class="ex-tag-muscle">${r.muscles_detail.slice(0,35)}${r.muscles_detail.length>35?'…':''}</span>` : ''}
          </div>
        </div>
        <div style="color:#333;font-size:13px;flex-shrink:0">›</div>
      </div>
    </div>`).join('') +
    (list.length > _exShowCount ? `<button class="ex-more-btn" onclick="loadMoreEx()">더 보기 (${list.length - _exShowCount}개 남음)</button>` : '');
}

function loadMoreEx() { _exShowCount += 50; _renderExList(); }

function openExDetail(id) {
  const r = _allExercises.find(e => e.id === id);
  if (!r) return;

  // 이미지
  const imgWrap = document.getElementById('exDetailImg');
  if (r.image_url) {
    imgWrap.innerHTML = `<img src="${r.image_url}" style="width:100%;max-height:260px;object-fit:cover;display:block" onerror="this.parentElement.innerHTML='<div style=\\'padding:24px;color:#444;font-size:14px;text-align:center\\'>이미지 없음</div>'">`;
    imgWrap.style.display = '';
  } else {
    imgWrap.innerHTML = '<div style="padding:24px;color:#444;font-size:14px;text-align:center">이미지 없음</div>';
    imgWrap.style.display = '';
  }

  // 이름
  document.getElementById('exDetailNameKo').textContent = r.name_ko || '';
  document.getElementById('exDetailNameEn').textContent  = r.name_en  || '';

  // 태그 (도구 + 부위)
  document.getElementById('exDetailTags').innerHTML = [
    r.tool_unified ? `<span class="ex-tag-tool" style="font-size:12px;padding:4px 12px">${r.tool_unified}</span>` : '',
    r.part_unified ? `<span class="ex-tag-part" style="font-size:12px;padding:4px 12px;color:#aaa">${r.part_unified}</span>` : '',
  ].join('');

  // 주요근육 — · 구분자를 줄바꿈으로 표시
  const muscles = r.muscles_detail || '정보 없음';
  document.getElementById('exDetailMuscles').innerHTML =
    muscles.split('·').map(m => m.trim()).filter(Boolean)
      .map(m => `<span style="display:inline-block;background:#1a1a12;border:1px solid #2a2518;border-radius:8px;padding:4px 12px;margin:3px;font-size:13px">${m}</span>`)
      .join('') || '<span style="color:#444">정보 없음</span>';

  openModal('exDetailModal');
}


// ── 운동DB Excel 내보내기 ─────────────────────────────────────
async function exportExerciseExcel() {
  showToast('Excel 생성 중...');
  const { data } = await db.from('exercise_refs')
    .select('name_ko,name_en,tool_unified,part_unified,muscles_detail')
    .eq('is_active', true).order('name_ko');
  if (!data?.length) { showToast('데이터 없음'); return; }

  // TSV로 만들어서 다운로드 (xlsx 라이브러리 없이)
  const header = ['한글 운동이름','영문 운동이름','도구_통합','부위_통합','주요 근육'];
  const rows   = data.map(r => [r.name_ko, r.name_en||'', r.tool_unified||'', r.part_unified||'', r.muscles_detail||'']);
  const tsv    = [header, ...rows].map(r => r.map(c => `"${c.replace(/"/g,'""')}"`).join('\t')).join('\n');
  const blob   = new Blob(['\uFEFF' + tsv], { type: 'text/tab-separated-values;charset=utf-8' });
  const a      = document.createElement('a');
  a.href       = URL.createObjectURL(blob);
  a.download   = `운동DB_${new Date().toISOString().slice(0,10)}.tsv`;
  a.click();
  showToast('다운로드 완료 (Excel에서 열기 가능)');
}

// ── 요청사항 ─────────────────────────────────────────────────
async function loadRequests() {
  const { data, error } = await db.from('requests')
    .select('*, trainers(name)')
    .order('created_at', { ascending: false });
  if (error) { showToast('불러오기 실패'); return; }

  const visible   = data.filter(r => r.status !== 'deleted');
  const pending   = visible.filter(r => r.status === 'pending');
  const completed = visible.filter(r => r.status === 'completed');
  document.getElementById('reqCount').textContent = pending.length ? `(미처리 ${pending.length}건)` : `(${visible.length}건)`;

  const wrap = document.getElementById('reqList');
  if (!visible.length) { wrap.innerHTML = '<div class="empty">요청사항이 없어요</div>'; return; }

  const TYPE_LABEL = { db_add: 'DB 추가', bug_report: '버그 신고', other: '기타' };
  const card = r => `
    <div class="req-card">
      <div class="req-header">
        <span class="req-type ${r.type}">${TYPE_LABEL[r.type] || r.type}</span>
        <span class="req-status ${r.status === 'completed' ? 'completed' : ''}">${r.status === 'pending' ? '처리중' : '완료'}</span>
      </div>
      <div class="req-content">${r.content}</div>
      <div class="req-meta">${r.trainers?.name || '알수없음'} · ${new Date(r.created_at).toLocaleDateString('ko-KR')}</div>
      <div class="req-actions">
        ${r.status === 'pending' ? `<button class="btn-complete" onclick="completeReq('${r.id}')">완료 처리</button>` : ''}
        <button class="btn-req-del" onclick="deleteReq('${r.id}')">삭제</button>
      </div>
    </div>`;

  wrap.innerHTML =
    (pending.length   ? `<div class="group-label">미처리 (${pending.length})</div>` + pending.map(card).join('') : '') +
    (completed.length ? `<div class="group-label">완료 (${completed.length})</div>` + completed.map(card).join('') : '');
}

async function completeReq(id) {
  const { error } = await db.from('requests').update({ status: 'completed' }).eq('id', id);
  if (error) { showToast('처리 실패'); return; }
  showToast('완료 처리했습니다');
  loadRequests();
}
async function deleteReq(id) {
  if (!confirm('이 요청을 삭제할까요?')) return;
  const { error } = await db.from('requests').update({ status: 'deleted' }).eq('id', id);
  if (error) { showToast('삭제 실패'); return; }
  showToast('삭제됐습니다');
  loadRequests();
}

// ── 탭 전환 ──────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  btn.classList.add('active');
  if (id === 'members')  loadMembers();
  if (id === 'exercise') loadExercise();
  if (id === 'requests') loadRequests();
}

async function doLogout() {
  await db.auth.signOut();
  localStorage.removeItem('vg_trainer');
  location.replace('admin-login.html');
}
